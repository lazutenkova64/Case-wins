<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>case-wins · Классический раунд & 1 на 1</title>
  <style>
    :root {
      --bg: #050706;
      --panel: #0c0f0d;
      --card: #121714;
      --gold: #1a3a2a;
      --accent: #151d18;
      --text: #a0a8a0;
      --dark-green: #0f2a1a;
      --mid-green: #1e4d2e;
      --light-gray: #7a827a;
      --surface: #141c17;
      --border: #1f2a22;
      --muted-green: #1a3322;
    }
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      background: var(--bg);
      font-family: 'Segoe UI', 'Inter', system-ui, -apple-system, sans-serif;
      color: var(--text);
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      display: flex;
    }
    .app {
      display: flex;
      width: 100%;
      height: 100%;
      gap: 8px;
      padding: 8px;
    }
    .sidebar {
      width: 210px;
      background: var(--panel);
      border-radius: 20px;
      padding: 16px 12px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      border: 1px solid var(--border);
      flex-shrink: 0;
    }
    .profile {
      display: flex;
      align-items: center;
      gap: 10px;
      background: var(--surface);
      padding: 12px;
      border-radius: 24px;
      border: 1px solid var(--border);
    }
    .avatar-circle {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: linear-gradient(135deg, #1a3a2a, #0f2a1a);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      flex-shrink: 0;
      border: 2px solid var(--border);
    }
    .nav-btn {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 11px 16px;
      border-radius: 22px;
      cursor: pointer;
      text-align: left;
      font-weight: 600;
      font-size: 13px;
      transition: all 0.2s;
    }
    .nav-btn:hover {
      border-color: var(--mid-green);
      background: #18221c;
    }
    .nav-btn.active {
      background: var(--dark-green);
      color: #d0d8d0;
      border-color: var(--mid-green);
      box-shadow: 0 0 10px rgba(30, 77, 46, 0.3);
    }
    .main-area {
      flex: 1;
      display: flex;
      gap: 10px;
      min-width: 0;
      overflow-y: auto;
      overflow-x: hidden;
    }
    .classic-section {
      flex: 1;
      background: var(--card);
      border-radius: 24px;
      padding: 18px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      border: 1px solid var(--border);
      min-width: 0;
    }
    .classic-header {
      text-align: center;
      font-weight: 700;
      font-size: 15px;
      color: var(--light-gray);
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    .bank-display {
      text-align: center;
      font-size: 20px;
      font-weight: 800;
      color: #b0b8b0;
      text-shadow: 0 0 6px rgba(26, 58, 42, 0.4);
    }
    .place-bet-btn {
      width: 100%;
      background: linear-gradient(135deg, #1a3a2a, #0f2a1a);
      border: 2px solid var(--border);
      color: #d0d8d0;
      font-weight: 800;
      padding: 13px;
      border-radius: 25px;
      cursor: pointer;
      font-size: 15px;
      letter-spacing: 1px;
      transition: all 0.3s;
      text-transform: uppercase;
    }
    .place-bet-btn:hover {
      border-color: var(--mid-green);
      box-shadow: 0 0 16px rgba(26, 58, 42, 0.5);
      transform: translateY(-1px);
    }
    .place-bet-btn:disabled {
      background: #1e2420;
      border-color: #2a302c;
      color: #666;
      cursor: not-allowed;
      box-shadow: none;
      transform: none;
    }
    .items-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      min-height: 24px;
    }
    .item-chip {
      background: var(--surface);
      padding: 8px 14px;
      border-radius: 18px;
      font-size: 13px;
      display: flex;
      align-items: center;
      gap: 6px;
      border: 1px solid var(--border);
      color: var(--light-gray);
    }
    .roulette-wrapper {
      position: relative;
      height: 60px;
      overflow: hidden;
      margin: 0;
      display: flex;
      align-items: center;
      background: transparent;
    }
    .timer-bar {
      position: absolute;
      top: 0;
      left: 0;
      height: 4px;
      background: var(--mid-green);
      z-index: 6;
      transition: width 1s linear;
      border-radius: 2px;
      box-shadow: 0 0 6px rgba(30, 77, 46, 0.5);
    }
    .timer-progress-container {
      width: 66%;
      height: 8px;
      background: var(--surface);
      border-radius: 10px;
      overflow: hidden;
      margin: 0 auto;
      border: 1px solid var(--border);
    }
    .timer-progress-fill {
      height: 100%;
      background: var(--mid-green);
      width: 100%;
      transition: width 1s linear;
      border-radius: 10px;
    }
    .roulette-arrow-top {
      position: absolute;
      left: 50%;
      top: 8px;
      transform: translateX(-50%);
      font-size: 18px;
      color: #b0b8b0;
      z-index: 5;
      pointer-events: none;
      filter: drop-shadow(0 0 4px rgba(0,0,0,0.8));
    }
    .ticker-viewport {
      width: 100%;
      height: 100%;
      overflow: hidden;
      position: relative;
      display: flex;
      align-items: center;
    }
    .ticker-track {
      display: flex;
      gap: 4px;
      position: absolute;
      left: 0;
      will-change: transform;
    }
    .ticket-avatar-small {
      width: 48px;
      height: 48px;
      background: var(--surface);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      border: 2px solid var(--border);
      flex-shrink: 0;
    }
    .winner-avatar-center {
      width: 60px;
      height: 60px;
      background: var(--surface);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 30px;
      border: 3px solid var(--mid-green);
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      z-index: 3;
      box-shadow: 0 0 20px rgba(26, 58, 42, 0.6);
    }
    .bets-table {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .bet-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: var(--surface);
      border-radius: 14px;
      padding: 10px 14px;
      border: 1px solid var(--border);
    }
    .bet-user {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .onevsone-section {
      flex: 1;
      background: var(--card);
      border-radius: 24px;
      padding: 18px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      border: 1px solid var(--border);
      min-width: 0;
    }
    .rooms-scroll {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .room-card {
      background: var(--surface);
      border-radius: 18px;
      padding: 14px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      border: 1px solid var(--border);
      transition: all 0.2s;
    }
    .room-card:hover {
      border-color: var(--mid-green);
    }
    .room-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .btn {
      background: var(--mid-green);
      border: 1px solid var(--border);
      color: #d0d8d0;
      font-weight: 700;
      padding: 8px 16px;
      border-radius: 20px;
      cursor: pointer;
      font-size: 12px;
      transition: all 0.2s;
    }
    .btn:hover {
      background: var(--dark-green);
      box-shadow: 0 0 8px rgba(26, 58, 42, 0.4);
    }
    .btn:disabled {
      background: #1e2420;
      border-color: #2a302c;
      color: #666;
      cursor: not-allowed;
    }
    .btn-secondary {
      background: #1a221e;
      border-color: var(--border);
    }
    .inventory-panel {
      width: 210px;
      background: var(--panel);
      border-radius: 20px;
      padding: 16px 12px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      border: 1px solid var(--border);
      flex-shrink: 0;
    }
    .inv-grid {
      display: grid;
      grid-template-columns: repeat(2,1fr);
      gap: 6px;
    }
    .inv-slot {
      aspect-ratio: 1;
      background: var(--surface);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 26px;
      border: 1px solid var(--border);
      transition: all 0.2s;
    }
    .inv-slot:hover {
      border-color: var(--mid-green);
    }
    .bet-input-inv {
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 10px;
      border-radius: 15px;
      color: #d0d8d0;
      text-align: center;
      font-weight: bold;
      font-size: 14px;
    }
    .bet-input-inv:focus {
      outline: none;
      border-color: var(--mid-green);
    }
    .spectator-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background: rgba(0,0,0,0.92);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
    }
    .spectator-card {
      background: var(--card);
      border-radius: 28px;
      padding: 24px;
      width: 550px;
      border: 2px solid var(--mid-green);
      display: flex;
      flex-direction: column;
      gap: 14px;
      box-shadow: 0 0 40px rgba(26, 58, 42, 0.3);
    }
    .spec-bet-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: var(--surface);
      border-radius: 14px;
      padding: 12px 16px;
      border: 1px solid var(--border);
    }
    .online-dot {
      display: inline-block;
      width: 8px;
      height: 8px;
      background: var(--mid-green);
      border-radius: 50%;
      margin-right: 4px;
      box-shadow: 0 0 6px var(--mid-green);
    }
  </style>
</head>
<body>
<div class="app">
  <div class="sidebar">
    <div class="profile">
      <span class="avatar-circle" id="profileAvatar">🐺</span>
      <div>
        <div id="profileName" style="font-weight: 600;">PlayerOne</div>
        <div style="color: #7a827a; font-size: 12px;"><span class="online-dot"></span>Онлайн</div>
      </div>
    </div>
    <button class="nav-btn active">🏠 Главная</button>
    <button class="nav-btn">📜 История игр</button>
    <button class="nav-btn">❓ FAQ</button>
    <button class="nav-btn">💬 Поддержка</button>
  </div>
  <div class="main-area" id="mainScrollArea">
    <div class="classic-section" id="classicBlock">
      <div class="classic-header">🏆 КЛАССИЧЕСКИЙ РАУНД</div>
      <div class="bank-display" id="classicBankDisplay">Банк: 0</div>
      <button class="place-bet-btn" id="classicPlaceBetBtn">🎯 ПОСТАВИТЬ</button>
      <div class="items-row" id="classicItemsRow"></div>
      <div class="timer-progress-container" id="classicTimerProgressContainer">
        <div class="timer-progress-fill" id="classicTimerProgressFill" style="width: 100%;"></div>
      </div>
      <div class="roulette-wrapper" id="rouletteWrapper">
        <div class="timer-bar" id="timerBar" style="width: 100%;"></div>
        <div class="roulette-arrow-top" id="rouletteArrowTop" style="display:none;">▼</div>
        <div class="ticker-viewport" id="tickerViewport">
          <div class="ticker-track" id="tickerTrack"></div>
        </div>
      </div>
      <div class="bets-table" id="betsTable"></div>
    </div>
    <div class="onevsone-section">
      <div style="display:flex;justify-content:space-between;align-items:center;">
        <h3 style="color:#b0b8b0;">🎲 ИГРА 1 НА 1</h3>
        <button class="btn" id="createRoomBtn">+ Создать</button>
      </div>
      <div class="rooms-scroll" id="roomsList"></div>
    </div>
  </div>
  <div class="inventory-panel">
    <h3 style="color:#b0b8b0;">🎒 Инвентарь</h3>
    <div class="inv-grid">
      <div class="inv-slot">🔹</div><div class="inv-slot">🔹</div>
      <div class="inv-slot">🔹</div><div class="inv-slot">🔹</div>
    </div>
    <div style="color:var(--light-gray);">💰 Скины: <span style="color:#b0b8b0;">0</span></div>
    <button class="btn" style="width:100%;">🛒 Купить</button>
    <button class="btn btn-secondary" style="width:100%;">💸 Продать</button>
    <input type="number" class="bet-input-inv" id="classicBetInput" value="10" min="1" placeholder="Сумма ставки">
  </div>
</div>
<div id="spectatorContainer"></div>

<script>
  (() => {
    const state = {
      user: { name: 'PlayerOne', balance: 1000, avatar: '🐺' },
      classicBets: [],
      classicTimer: 3,
      classicInterval: null,
      classicSpinning: false,
      tickerAnimationId: null,
      rooms: [],
      nextRoomId: 1,
      roomAnimations: {}
    };

    const profileAvatar = document.getElementById('profileAvatar');
    const profileName = document.getElementById('profileName');
    const classicBankDisplay = document.getElementById('classicBankDisplay');
    const classicPlaceBetBtn = document.getElementById('classicPlaceBetBtn');
    const classicBetInput = document.getElementById('classicBetInput');
    const classicItemsRow = document.getElementById('classicItemsRow');
    const tickerTrack = document.getElementById('tickerTrack');
    const tickerViewport = document.getElementById('tickerViewport');
    const rouletteArrowTop = document.getElementById('rouletteArrowTop');
    const timerBar = document.getElementById('timerBar');
    const classicTimerProgressFill = document.getElementById('classicTimerProgressFill');
    const betsTable = document.getElementById('betsTable');
    const roomsList = document.getElementById('roomsList');
    const spectatorContainer = document.getElementById('spectatorContainer');

    function totalBank() { return state.classicBets.reduce((s,b)=>s+b.amount,0); }

    function buildTicketArray(bets) {
      const tickets = [];
      bets.forEach(b => {
        for (let i = 0; i < b.amount; i++) tickets.push(b.user.avatar);
      });
      if (tickets.length === 0) tickets.push('❓');
      return tickets;
    }

    function updateUI() {
      profileAvatar.textContent = state.user.avatar;
      profileName.textContent = state.user.name;
      classicBankDisplay.textContent = `Банк: ${totalBank()}`;
      renderItemsRow();
      renderBetsTable();
      renderRooms();
    }

    function renderItemsRow() {
      classicItemsRow.innerHTML = state.classicBets.map(b => 
        `<span class="item-chip">${b.user.avatar} ${b.user.name}: ${b.amount}</span>`
      ).join('');
    }

    function renderBetsTable() {
      const total = totalBank() || 1;
      betsTable.innerHTML = state.classicBets.map(b => {
        const percent = ((b.amount / total) * 100).toFixed(1);
        return `<div class="bet-row">
          <div class="bet-user"><span class="avatar-circle" style="width:30px;height:30px;font-size:16px;">${b.user.avatar}</span> ${b.user.name}</div>
          <span style="color:var(--light-gray);">${b.amount}</span>
          <span style="color:var(--light-gray);">Билеты: ${b.amount}</span>
          <span style="color:#b0b8b0;font-weight:700;">${percent}%</span>
        </div>`;
      }).join('');
    }

    function animateRoulette(trackElement, viewportElement, arrowElement, barElement, tickets, winnerAvatar, callback, progressFillElement) {
      const animId = trackElement.id;
      if (state.roomAnimations[animId]) {
        cancelAnimationFrame(state.roomAnimations[animId]);
      }
      trackElement.innerHTML = '';
      const repeatedTickets = [];
      for (let i = 0; i < 60; i++) {
        tickets.forEach(av => repeatedTickets.push(av));
      }
      repeatedTickets.forEach(av => {
        const el = document.createElement('div');
        el.className = 'ticket-avatar-small';
        el.textContent = av;
        trackElement.appendChild(el);
      });
      let pos = 0;
      let speed = 0.3;
      const startTime = Date.now();
      const phase1 = 2000;
      const phase2 = 6000;
      const phase3 = 17000;
      const maxSpeed = 4.5;
      const viewWidth = viewportElement.clientWidth;
      const itemWidth = 52;

      if (barElement) {
        barElement.style.width = '100%';
        barElement.style.transition = 'width 17s linear';
        setTimeout(() => { barElement.style.width = '0%'; }, 50);
      }

      if (progressFillElement) {
        progressFillElement.style.transition = 'width 3s linear';
        progressFillElement.style.width = '0%';
      }

      function step() {
        const elapsed = Date.now() - startTime;
        if (elapsed < phase1) {
          speed = 0.3 + (elapsed / phase1) * (maxSpeed - 0.3);
        } else if (elapsed < phase2) {
          speed = maxSpeed;
        } else if (elapsed < phase3) {
          const decelProgress = (elapsed - phase2) / (phase3 - phase2);
          speed = maxSpeed * (1 - decelProgress);
        } else {
          const winnerEl = document.createElement('div');
          winnerEl.className = 'winner-avatar-center';
          winnerEl.textContent = winnerAvatar;
          viewportElement.appendChild(winnerEl);
          if (arrowElement) arrowElement.style.display = 'block';
          if (callback) setTimeout(callback, 3000);
          return;
        }
        pos -= speed;
        trackElement.style.transform = `translateX(${pos}px)`;
        state.roomAnimations[animId] = requestAnimationFrame(step);
      }
      state.roomAnimations[animId] = requestAnimationFrame(step);
    }

    function startClassicCountdown() {
      if (state.classicBets.length < 2) return;
      clearClassicInterval();
      state.classicTimer = 3;
      classicTimerProgressFill.style.transition = 'none';
      classicTimerProgressFill.style.width = '100%';
      setTimeout(() => {
        classicTimerProgressFill.style.transition = 'width 3s linear';
        classicTimerProgressFill.style.width = '0%';
      }, 20);
      state.classicInterval = setInterval(() => {
        state.classicTimer--;
        if (state.classicTimer <= 0) {
          clearClassicInterval();
          runClassicGame();
        }
      }, 1000);
    }

    function runClassicGame() {
      state.classicSpinning = true;
      classicPlaceBetBtn.disabled = true;
      rouletteArrowTop.style.display = 'block';
      timerBar.style.display = 'block';
      const tickets = buildTicketArray(state.classicBets);
      const allUsers = [];
      state.classicBets.forEach(b => { for(let i=0;i<b.amount;i++) allUsers.push(b.user); });
      const winner = allUsers[Math.floor(Math.random() * allUsers.length)];
      animateRoulette(tickerTrack, tickerViewport, rouletteArrowTop, timerBar, tickets, winner.avatar, () => {
        const bank = totalBank();
        if (winner.name === state.user.name) state.user.balance += bank;
        state.classicBets = [];
        state.classicSpinning = false;
        classicPlaceBetBtn.disabled = false;
        rouletteArrowTop.style.display = 'none';
        timerBar.style.display = 'none';
        timerBar.style.width = '100%';
        timerBar.style.transition = 'none';
        classicTimerProgressFill.style.transition = 'none';
        classicTimerProgressFill.style.width = '100%';
        const existingWinner = document.querySelector('#tickerViewport .winner-avatar-center');
        if (existingWinner) existingWinner.remove();
        tickerTrack.innerHTML = '';
        tickerTrack.style.transform = 'translateX(0px)';
        updateUI();
      }, classicTimerProgressFill);
    }

    function clearClassicInterval() {
      if (state.classicInterval) { clearInterval(state.classicInterval); state.classicInterval = null; }
    }

    classicPlaceBetBtn.addEventListener('click', ()=>{
      if (state.classicSpinning) return;
      const amt = parseInt(classicBetInput.value, 10);
      if (isNaN(amt) || amt <= 0) return;
      if (state.user.balance < amt) return alert('Недостаточно монет');
      state.user.balance -= amt;
      state.classicBets.push({ user: {...state.user}, amount: amt });
      updateUI();
      if (state.classicBets.length >= 2 && !state.classicInterval) startClassicCountdown();
    });

    function createRoom() {
      const bet = parseInt(classicBetInput.value, 10);
      if (isNaN(bet) || bet <= 0) return;
      if (state.user.balance < bet) return alert('Недостаточно средств');
      state.user.balance -= bet;
      const roomId = state.nextRoomId++;
      const room = {
        id: roomId,
        creator: {...state.user},
        bet,
        opponent: null,
        status: 'waiting',
        timer: 3,
        intervalId: null,
        winner: null,
        trackId: `roomTrack${roomId}`,
        viewportId: `roomViewport${roomId}`,
        arrowId: `roomArrow${roomId}`,
        barId: `roomBar${roomId}`,
        progressId: `roomProgress${roomId}`
      };
      state.rooms.push(room);
      updateUI();
    }

    function joinRoom(roomId) {
      const room = state.rooms.find(r=>r.id===roomId);
      if (!room || room.status!=='waiting') return;
      if (state.user.balance < room.bet) return alert('Недостаточно монет');
      state.user.balance -= room.bet;
      room.opponent = {...state.user};
      room.status = 'countdown';
      room.timer = 3;
      startRoomCountdown(room);
      updateUI();
    }

    function startRoomCountdown(room) {
      clearRoomInterval(room);
      const progressFill = document.getElementById(room.progressId);
      if (progressFill) {
        progressFill.style.transition = 'none';
        progressFill.style.width = '100%';
        setTimeout(() => {
          progressFill.style.transition = 'width 3s linear';
          progressFill.style.width = '0%';
        }, 20);
      }
      room.intervalId = setInterval(() => {
        room.timer--;
        updateUI();
        if (room.timer <= 0) {
          clearRoomInterval(room);
          runRoomGame(room);
        }
      }, 1000);
    }

    function runRoomGame(room) {
      room.status = 'spinning';
      updateUI();
      const bets = [
        { user: room.creator, amount: room.bet },
        { user: room.opponent, amount: room.bet }
      ];
      const tickets = buildTicketArray(bets);
      const allUsers = [];
      for(let i=0;i<room.bet;i++) allUsers.push(room.creator);
      for(let i=0;i<room.bet;i++) allUsers.push(room.opponent);
      const winner = allUsers[Math.floor(Math.random()*allUsers.length)];
      room.winner = winner;
      setTimeout(() => {
        const trackEl = document.getElementById(room.trackId);
        const viewportEl = document.getElementById(room.viewportId);
        const arrowEl = document.getElementById(room.arrowId);
        const barEl = document.getElementById(room.barId);
        if (trackEl && viewportEl) {
          animateRoulette(trackEl, viewportEl, arrowEl, barEl, tickets, winner.avatar, () => {
            room.status = 'finished';
            if (room.winner.name === state.user.name) state.user.balance += room.bet*2;
            updateUI();
            setTimeout(()=>{
              state.rooms = state.rooms.filter(r=>r.id!==room.id);
              updateUI();
            }, 5000);
          }, null);
        }
      }, 100);
    }

    function clearRoomInterval(room) {
      if (room.intervalId) {
        clearInterval(room.intervalId);
        room.intervalId = null;
      }
    }

    function renderRooms() {
      roomsList.innerHTML = '';
      if (!state.rooms.length) {
        roomsList.innerHTML = '<div style="color:var(--light-gray);padding:12px;text-align:center;">Нет активных комнат</div>';
        return;
      }
      state.rooms.forEach(room => {
        const d = document.createElement('div');
        d.className = 'room-card';
        d.innerHTML = `
          <div class="room-header">
            <div style="display:flex;align-items:center;gap:8px;">
              <span class="avatar-circle" style="width:30px;height:30px;font-size:16px;">${room.creator.avatar}</span>
              <span style="font-weight:600;">${room.creator.name}</span>
              <span style="color:#b0b8b0;">${room.bet}</span>
              ${room.opponent ? `<span style="color:var(--light-gray);">VS</span><span class="avatar-circle" style="width:30px;height:30px;font-size:16px;">${room.opponent.avatar}</span><span style="font-weight:600;">${room.opponent.name}</span>` : '<span style="color:var(--light-gray);">ожидание...</span>'}
            </div>
            <div style="display:flex;gap:6px;align-items:center;">
              <span style="font-size:12px;color:var(--light-gray);">${room.status==='waiting'?'Ожидание':room.status==='countdown'?`⏳ ${room.timer}с`:room.status==='spinning'?'🎰 Крутим...':'✔ Завершено'}</span>
              <button class="btn join-btn" data-id="${room.id}" ${room.status!=='waiting'?'disabled':''}>Играть</button>
              <button class="btn btn-secondary watch-btn" data-id="${room.id}">👁</button>
            </div>
          </div>
          <div class="timer-progress-container" style="width:50%;margin:0 auto;">
            <div class="timer-progress-fill" id="${room.progressId}" style="width:100%;"></div>
          </div>
          <div class="roulette-wrapper" style="height:55px;">
            <div class="timer-bar" id="${room.barId}" style="width:100%;${room.status==='spinning'?'display:block;':'display:none;'}"></div>
            <div class="roulette-arrow-top" id="${room.arrowId}" style="display:${room.status==='spinning'?'block':'none'};">▼</div>
            <div class="ticker-viewport" id="${room.viewportId}">
              <div class="ticker-track" id="${room.trackId}"></div>
            </div>
          </div>`;
        roomsList.appendChild(d);
      });
      document.querySelectorAll('.join-btn').forEach(b=>b.addEventListener('click',e=>joinRoom(parseInt(e.target.dataset.id))));
      document.querySelectorAll('.watch-btn').forEach(b=>b.addEventListener('click',e=>{
        const room = state.rooms.find(r=>r.id===parseInt(e.target.dataset.id));
        if (room) openSpectator(room);
      }));
    }

    function openSpectator(room) {
      const totalBet = room.bet * 2;
      const creatorPercent = ((room.bet / totalBet) * 100).toFixed(1);
      const opponentPercent = room.opponent ? ((room.bet / totalBet) * 100).toFixed(1) : '0.0';
      spectatorContainer.innerHTML = `<div class="spectator-overlay"><div class="spectator-card">
        <h2 style="color:#b0b8b0;">👁 Комната #${room.id}</h2>
        <div class="spec-bet-row">
          <div class="bet-user"><span class="avatar-circle" style="width:30px;height:30px;font-size:16px;">${room.creator.avatar}</span> <span style="font-weight:600;">${room.creator.name}</span></div>
          <span style="color:var(--light-gray);">${room.bet}</span>
          <span style="color:var(--light-gray);">Билеты: 1-${room.bet}</span>
          <span style="color:#b0b8b0;font-weight:700;">${creatorPercent}%</span>
        </div>
        ${room.opponent ? `<div class="spec-bet-row">
          <div class="bet-user"><span class="avatar-circle" style="width:30px;height:30px;font-size:16px;">${room.opponent.avatar}</span> <span style="font-weight:600;">${room.opponent.name}</span></div>
          <span style="color:var(--light-gray);">${room.bet}</span>
          <span style="color:var(--light-gray);">Билеты: ${room.bet+1}-${room.bet*2}</span>
          <span style="color:#b0b8b0;font-weight:700;">${opponentPercent}%</span>
        </div>` : '<div style="color:var(--light-gray);text-align:center;padding:12px;">Ожидание второго игрока...</div>'}
        <button class="btn" onclick="this.parentElement.parentElement.remove()" style="width:100%;">Закрыть</button>
      </div></div>`;
    }

    document.getElementById('createRoomBtn').addEventListener('click', createRoom);
    updateUI();
  })();
</script>
</body>
</html>
