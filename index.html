<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, shrink-to-fit=no">
  <title>case-wins · 1 на 1 · Классический раунд</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #0c0f14;
      font-family: 'Segoe UI', 'Inter', system-ui, -apple-system, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 1rem;
      color: #e0e0e0;
    }

    .app {
      max-width: 750px;
      width: 100%;
      background: #1a1d25;
      border-radius: 2rem 2rem 1.8rem 1.8rem;
      padding: 1.5rem 1.2rem 2rem;
      box-shadow: 0 20px 35px rgba(0,0,0,0.6);
      border: 1px solid #2c303a;
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
    }

    .header-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      color: #b3b9c5;
      font-weight: 600;
      font-size: 0.85rem;
      letter-spacing: 0.4px;
      background: #21242e;
      padding: 0.5rem 1rem;
      border-radius: 3rem;
    }

    .online-badge {
      display: flex;
      align-items: center;
      gap: 0.3rem;
      background: #2a2f3a;
      padding: 0.3rem 0.9rem;
      border-radius: 2rem;
    }

    .online-dot {
      width: 8px;
      height: 8px;
      background: #3acf6e;
      border-radius: 50%;
      box-shadow: 0 0 8px #3acf6e;
    }

    .brand {
      font-weight: 800;
      font-size: 1.3rem;
      background: linear-gradient(135deg, #f0b34b, #ec8f4c);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .classic-round-card {
      background: linear-gradient(145deg, #232732, #1b1f28);
      border-radius: 2rem;
      padding: 1.2rem 1rem 1.5rem;
      border: 1px solid #353b48;
      display: flex;
      flex-direction: column;
      gap: 1rem;
      box-shadow: inset 0 1px 2px rgba(255,255,255,0.05);
    }

    .round-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-weight: 700;
      color: #cbd0d9;
    }

    .bank {
      background: #2c313d;
      padding: 0.4rem 1.2rem;
      border-radius: 2rem;
      color: #f5ba4b;
      font-weight: bold;
    }

    .wheel-area {
      background: #10131c;
      border-radius: 1.5rem;
      padding: 1.5rem 0.5rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      border: 1px solid #3e4350;
      position: relative;
    }

    .spinner-container {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: center;
      gap: 1rem;
      margin: 0.5rem 0;
    }

    .avatar-slot {
      width: 65px;
      height: 65px;
      border-radius: 50%;
      background: #2d3240;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2rem;
      border: 2px solid #f0b34b;
      box-shadow: 0 0 12px rgba(240,179,75,0.4);
      background-size: cover;
      background-position: center;
      transition: 0.2s;
    }

    .vs-text {
      font-weight: 800;
      font-size: 1.5rem;
      color: #b7bac5;
    }

    .timer-badge {
      background: #ffb443;
      color: #0c0f14;
      font-weight: 800;
      padding: 0.35rem 1.2rem;
      border-radius: 2rem;
      font-size: 1.2rem;
    }

    .bet-panel {
      display: flex;
      gap: 1rem;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
    }

    .coin-input {
      background: #2b2f3a;
      border: none;
      color: white;
      padding: 0.7rem 1rem;
      border-radius: 2.5rem;
      width: 130px;
      outline: none;
      font-weight: bold;
      text-align: center;
    }

    .btn {
      background: #f5a623;
      border: none;
      color: #0a0c12;
      font-weight: 800;
      padding: 0.7rem 1.8rem;
      border-radius: 2.5rem;
      cursor: pointer;
      transition: 0.2s;
      letter-spacing: 0.5px;
      display: flex;
      align-items: center;
      gap: 0.3rem;
    }

    .btn:disabled {
      background: #5a5f6b;
      color: #2a2a2a;
      cursor: not-allowed;
    }

    .games-list {
      display: flex;
      flex-direction: column;
      gap: 0.6rem;
      max-height: 380px;
      overflow-y: auto;
      padding-right: 0.2rem;
    }

    .room-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: #232731;
      border-radius: 2rem;
      padding: 0.7rem 1.2rem;
      border: 1px solid #363c4a;
    }

    .room-user {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      font-weight: 600;
    }

    .room-avatar {
      width: 34px;
      height: 34px;
      background: #444b5a;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .actions {
      display: flex;
      gap: 0.6rem;
      align-items: center;
    }

    .icon-btn {
      background: transparent;
      border: none;
      color: #a7adb9;
      font-size: 1.2rem;
      cursor: pointer;
    }

    .register-block {
      background: #212530;
      border-radius: 2rem;
      padding: 1.3rem;
      display: flex;
      flex-direction: column;
      gap: 0.8rem;
      margin-top: 0.2rem;
    }

    input {
      background: #2e3340;
      border: 1px solid #454b58;
      padding: 0.8rem;
      border-radius: 2rem;
      color: white;
      outline: none;
    }

    .flex-row {
      display: flex;
      gap: 1rem;
      align-items: center;
    }

    .hidden {
      display: none;
    }

    .result-message {
      font-weight: bold;
      color: #f5ba4b;
    }
  </style>
</head>
<body>
<div class="app">
  <div class="header-bar">
    <span class="brand">case-wins</span>
    <div class="online-badge">
      <span class="online-dot"></span> Онлайн: <span id="onlineCount">1082</span>
    </div>
  </div>

  <!-- Классический раунд (левая область для ставок) -->
  <div class="classic-round-card" id="classicRoundCard">
    <div class="round-header">
      <span>🏆 КЛАССИЧЕСКИЙ РАУНД</span>
      <span class="bank">Банк: <span id="classicBank">11.00</span>$</span>
    </div>
    <div class="wheel-area" id="wheelArea">
      <div class="spinner-container" id="spinnerDisplay">
        <div class="avatar-slot" id="leftAvatar">❓</div>
        <span class="vs-text">VS</span>
        <div class="avatar-slot" id="rightAvatar">❓</div>
      </div>
      <div id="classicTimerDisplay" class="timer-badge">⏳ 30</div>
      <div id="classicResultMsg" class="result-message"></div>
    </div>
    <div class="bet-panel">
      <input type="number" id="classicBetInput" class="coin-input" placeholder="Монеты" value="10" min="1">
      <button id="placeClassicBetBtn" class="btn">🎯 Поставить</button>
      <button id="resetClassicBtn" class="btn" style="background:#3a4050;">Сброс</button>
    </div>
    <div style="font-size:0.8rem; color:#a0a6b2;">Ставка даёт билеты (1 монета = 1 билет)</div>
  </div>

  <!-- Игра 1 на 1: список комнат -->
  <div style="display: flex; justify-content: space-between; align-items: center;">
    <h3 style="color:#f0b34b;">🎲 ИГРА 1 НА 1</h3>
    <button id="createRoomBtn" class="btn">➕ Создать комнату</button>
  </div>
  <div class="games-list" id="roomsContainer"></div>

  <!-- Регистрация / пользователь -->
  <div class="register-block" id="authBlock">
    <div style="font-weight: bold;">👤 Профиль</div>
    <div class="flex-row">
      <input type="text" id="usernameInput" placeholder="Твой ник" value="PlayerOne">
      <button id="registerBtn" class="btn">Войти</button>
    </div>
    <div id="userInfoDisplay" style="font-size:0.9rem;">Не авторизован</div>
  </div>
  <div style="color:#7b8290; text-align:center; font-size:0.8rem;">case-wins · 1 монета = 1 билет</div>
</div>

<script>
  (function() {
    // ---------- СОСТОЯНИЕ ----------
    const state = {
      currentUser: null, // { name, balance, avatarEmoji }
      classicBets: [],   // { user, amount }
      classicTimer: null,
      classicSeconds: 30,
      classicIntervalId: null,
      classicSpinning: false,
      rooms: [],
      nextRoomId: 1
    };

    // Пример аватарок (эмодзи + фоны)
    const avatarLibrary = ['🐺','🦊','🐸','🐷','🐙','🐲','🦅','🐼','🐨','🐯'];
    function randomAvatar() {
      return avatarLibrary[Math.floor(Math.random() * avatarLibrary.length)];
    }

    // ---------- DOM элементы ----------
    const classicBankSpan = document.getElementById('classicBank');
    const leftAvatarDiv = document.getElementById('leftAvatar');
    const rightAvatarDiv = document.getElementById('rightAvatar');
    const classicTimerDisplay = document.getElementById('classicTimerDisplay');
    const classicResultMsg = document.getElementById('classicResultMsg');
    const placeClassicBetBtn = document.getElementById('placeClassicBetBtn');
    const resetClassicBtn = document.getElementById('resetClassicBtn');
    const classicBetInput = document.getElementById('classicBetInput');
    const roomsContainer = document.getElementById('roomsContainer');
    const createRoomBtn = document.getElementById('createRoomBtn');
    const usernameInput = document.getElementById('usernameInput');
    const registerBtn = document.getElementById('registerBtn');
    const userInfoDisplay = document.getElementById('userInfoDisplay');
    const onlineCountSpan = document.getElementById('onlineCount');

    // ---------- УТИЛИТЫ ----------
    function updateUI() {
      renderClassicRound();
      renderRooms();
      updateUserDisplay();
      // Онлайн имитация
      onlineCountSpan.textContent = 1082 + state.rooms.length;
    }

    function updateUserDisplay() {
      if (state.currentUser) {
        userInfoDisplay.innerHTML = `🔹 ${state.currentUser.name} | Баланс: ${state.currentUser.balance} 💰`;
      } else {
        userInfoDisplay.innerHTML = 'Не авторизован';
      }
    }

    // Генерация случайного победителя на основе билетов
    function determineWinnerByTickets(bets) {
      if (!bets.length) return null;
      const tickets = [];
      bets.forEach(bet => {
        for (let i = 0; i < bet.amount; i++) {
          tickets.push(bet.user);
        }
      });
      if (tickets.length === 0) return null;
      const winnerIndex = Math.floor(Math.random() * tickets.length);
      return tickets[winnerIndex];
    }

    // Завершение классического раунда (прокрутка)
    function finishClassicRound() {
      if (state.classicSpinning) return;
      if (state.classicBets.length < 2) {
        classicResultMsg.textContent = 'Нужно минимум 2 участника!';
        return;
      }
      state.classicSpinning = true;
      clearClassicTimer();

      const winner = determineWinnerByTickets(state.classicBets);
      if (!winner) {
        state.classicSpinning = false;
        return;
      }

      // Отображаем аватарки участников (первые два для визуала, но победитель может быть любой)
      const participants = [...new Set(state.classicBets.map(b => b.user))];
      if (participants.length >= 2) {
        leftAvatarDiv.textContent = participants[0].avatarEmoji || '❓';
        rightAvatarDiv.textContent = participants[1].avatarEmoji || '❓';
      } else if (participants.length === 1) {
        leftAvatarDiv.textContent = participants[0].avatarEmoji;
        rightAvatarDiv.textContent = '👤';
      }

      // Симуляция анимации (короткая задержка)
      classicTimerDisplay.textContent = '🎰 Крутим...';
      setTimeout(() => {
        classicResultMsg.textContent = `Победитель: ${winner.name} (выигрыш ${state.classicBets.reduce((acc,b)=>acc+b.amount,0)}💰)`;
        // Начисляем выигрыш победителю (банк = сумма ставок)
        const totalBank = state.classicBets.reduce((sum, b) => sum + b.amount, 0);
        const winnerObj = state.currentUser && state.currentUser.name === winner.name ? state.currentUser : winner;
        if (state.currentUser && state.currentUser.name === winner.name) {
          state.currentUser.balance += totalBank;
        }
        // Сброс классических ставок
        state.classicBets = [];
        state.classicSpinning = false;
        state.classicSeconds = 30;
        classicTimerDisplay.textContent = '⏳ 30';
        updateUI();
      }, 1800);
    }

    function clearClassicTimer() {
      if (state.classicIntervalId) {
        clearInterval(state.classicIntervalId);
        state.classicIntervalId = null;
      }
    }

    function startClassicCountdown() {
      if (state.classicBets.length < 2) return;
      if (state.classicSpinning) return;
      clearClassicTimer();
      state.classicSeconds = 30;
      classicTimerDisplay.textContent = `⏳ ${state.classicSeconds}`;
      state.classicIntervalId = setInterval(() => {
        state.classicSeconds--;
        classicTimerDisplay.textContent = `⏳ ${state.classicSeconds}`;
        if (state.classicSeconds <= 0) {
          clearClassicTimer();
          finishClassicRound();
        }
      }, 1000);
    }

    function addClassicBet(user, amount) {
      if (!user) return alert('Сначала войдите в профиль!');
      if (state.classicSpinning) return alert('Идёт прокрутка, подождите.');
      if (amount <= 0 || isNaN(amount)) return alert('Введите корректное количество монет');
      if (user.balance < amount) return alert('Недостаточно монет');

      user.balance -= amount;
      state.classicBets.push({ user, amount });
      updateUI();

      if (state.classicBets.length >= 2 && !state.classicIntervalId && !state.classicSpinning) {
        startClassicCountdown();
      }
    }

    function renderClassicRound() {
      const totalBank = state.classicBets.reduce((acc, b) => acc + b.amount, 0);
      classicBankSpan.textContent = totalBank.toFixed(2);
      if (!state.classicSpinning && state.classicBets.length === 0) {
        leftAvatarDiv.textContent = '❓';
        rightAvatarDiv.textContent = '❓';
        classicResultMsg.textContent = '';
      }
    }

    // ---------- КОМНАТЫ 1 НА 1 ----------
    function createRoom(creator, betAmount) {
      if (!creator) return alert('Авторизуйтесь');
      if (betAmount <= 0 || creator.balance < betAmount) return alert('Недостаточно средств');
      creator.balance -= betAmount;
      const room = {
        id: state.nextRoomId++,
        creator: creator,
        bet: betAmount,
        opponent: null,
        status: 'waiting', // waiting, countdown, finished
        timer: 10,
        intervalId: null,
        winner: null
      };
      state.rooms.push(room);
      updateUI();
    }

    function joinRoom(roomId, opponent) {
      const room = state.rooms.find(r => r.id === roomId);
      if (!room || room.status !== 'waiting') return alert('Комната недоступна');
      if (!opponent) return alert('Войдите в профиль');
      const diff = Math.abs(room.bet - room.bet); // ставка второго должна быть такой же? По условию "разница не более 20 шт"
      // Но логика: второй игрок ставит столько же монет? Для 1на1 обычно ставки равны. Реализуем: opponent ставит room.bet монет.
      if (opponent.balance < room.bet) return alert('У вас недостаточно монет для этой ставки');
      // Проверка разницы: если бы противник ставил свою сумму, но здесь ставка фиксирована создателем.
      // Для упрощения: второй игрок ставит ровно столько же.
      opponent.balance -= room.bet;
      room.opponent = opponent;
      room.status = 'countdown';
      room.timer = 10;
      updateUI();
      startRoomCountdown(room);
    }

    function startRoomCountdown(room) {
      if (room.intervalId) clearInterval(room.intervalId);
      room.intervalId = setInterval(() => {
        room.timer--;
        updateUI();
        if (room.timer <= 0) {
          clearInterval(room.intervalId);
          finishRoomGame(room);
        }
      }, 1000);
    }

    function finishRoomGame(room) {
      if (room.status === 'finished') return;
      const participants = [room.creator, room.opponent].filter(Boolean);
      if (participants.length < 2) {
        room.status = 'finished';
        updateUI();
        return;
      }
      // Билеты: каждый получает билеты = своя ставка (room.bet)
      const tickets = [];
      tickets.push(...Array(room.bet).fill(room.creator));
      tickets.push(...Array(room.bet).fill(room.opponent));
      const winner = tickets[Math.floor(Math.random() * tickets.length)];
      room.winner = winner;
      room.status = 'finished';
      const totalPrize = room.bet * 2;
      if (winner) {
        winner.balance += totalPrize;
      }
      clearInterval(room.intervalId);
      updateUI();
      // Удаляем комнату через некоторое время
      setTimeout(() => {
        state.rooms = state.rooms.filter(r => r.id !== room.id);
        updateUI();
      }, 4000);
    }

    function renderRooms() {
      roomsContainer.innerHTML = '';
      if (!state.rooms.length) {
        roomsContainer.innerHTML = '<div style="padding:1rem;color:#7f8690;">Нет активных комнат</div>';
        return;
      }
      state.rooms.forEach(room => {
        const div = document.createElement('div');
        div.className = 'room-row';
        const creatorName = room.creator.name;
        const opponentName = room.opponent ? room.opponent.name : 'ожидание...';
        const statusText = room.status === 'waiting' ? '🔵 Ожидание' : (room.status === 'countdown' ? `⏳ Идет... ${room.timer}s` : (room.winner ? `🏆 ${room.winner.name} победил` : 'Завершено'));
        const btnDisabled = room.status !== 'waiting' || !state.currentUser || state.currentUser.name === room.creator.name;
        div.innerHTML = `
          <div class="room-user">
            <span class="room-avatar">${room.creator.avatarEmoji || '👤'}</span>
            <span><strong>${creatorName}</strong> ставка ${room.bet}💰</span>
            ${room.opponent ? `<span style="margin-left:0.5rem;">VS ${room.opponent.avatarEmoji||'👤'} ${opponentName}</span>` : ''}
          </div>
          <div class="actions">
            <span style="color:#f0b34b; margin-right:0.5rem;">${statusText}</span>
            <button class="btn" data-join="${room.id}" ${btnDisabled ? 'disabled' : ''} style="padding:0.4rem 1.2rem;">
              ${room.status === 'waiting' ? 'Играть' : (room.status==='countdown'?'Идет...':'👁')}
            </button>
            <button class="icon-btn" title="смотреть">👁</button>
          </div>
        `;
        roomsContainer.appendChild(div);
      });

      document.querySelectorAll('[data-join]').forEach(btn => {
        btn.addEventListener('click', (e) => {
          const roomId = parseInt(e.currentTarget.getAttribute('data-join'));
          if (state.currentUser) {
            joinRoom(roomId, state.currentUser);
          } else {
            alert('Сначала войдите в профиль');
          }
        });
      });
    }

    // ---------- РЕГИСТРАЦИЯ / ВХОД ----------
    function loginUser(name) {
      if (!name.trim()) return;
      const existing = state.currentUser;
      if (existing && existing.name === name) return;
      state.currentUser = {
        name: name.trim(),
        balance: 250,
        avatarEmoji: randomAvatar()
      };
      updateUI();
    }

    // ---------- ОБРАБОТЧИКИ ----------
    registerBtn.addEventListener('click', () => {
      loginUser(usernameInput.value);
    });

    placeClassicBetBtn.addEventListener('click', () => {
      if (!state.currentUser) return alert('Авторизуйтесь!');
      const amount = parseInt(classicBetInput.value, 10);
      addClassicBet(state.currentUser, amount);
      classicBetInput.value = 10;
    });

    resetClassicBtn.addEventListener('click', () => {
      if (state.classicSpinning) return;
      clearClassicTimer();
      // Возврат монет? По упрощению не возвращаем, но сбрасываем список (для демо)
      state.classicBets = [];
      state.classicSeconds = 30;
      classicTimerDisplay.textContent = '⏳ 30';
      updateUI();
    });

    createRoomBtn.addEventListener('click', () => {
      if (!state.currentUser) return alert('Войдите в профиль');
      const bet = parseInt(prompt('Введите ставку (монеты):', '15'), 10);
      if (bet && bet > 0) {
        createRoom(state.currentUser, bet);
      }
    });

    // Инициализация демо-пользователем
    window.addEventListener('load', () => {
      loginUser('PlayerOne');
      // Добавим пару комнат для примера
      if (state.currentUser) {
        const demoCreator = { name: 'Shuka', balance: 999, avatarEmoji: '🐺' };
        state.rooms.push({
          id: state.nextRoomId++,
          creator: demoCreator,
          bet: 15,
          opponent: null,
          status: 'waiting',
          timer: 10,
          intervalId: null,
          winner: null
        });
      }
      updateUI();
    });

  })();
</script>
</body>
</html>
