<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>CS2 Case Opening — Реалистичная анимация</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      background: radial-gradient(circle at 20% 20%, #1a1f2b, #0a0d14);
      min-height: 100vh;
      color: #e0e0e0;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 30px 15px;
    }
    .app {
      max-width: 1050px;
      width: 100%;
      background: rgba(14, 17, 23, 0.85);
      backdrop-filter: blur(30px);
      border-radius: 40px;
      padding: 24px 22px 30px;
      box-shadow: 0 30px 45px rgba(0,0,0,0.8);
      border: 1px solid rgba(220, 180, 40, 0.2);
    }
    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 18px;
      margin-bottom: 28px;
      border-bottom: 1px solid rgba(255,200,0,0.15);
      padding-bottom: 18px;
    }
    h1 {
      background: linear-gradient(180deg, #f9e076, #c5921a);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      font-weight: 900;
      font-size: 2.2rem;
      letter-spacing: 1px;
    }
    .nav {
      display: flex;
      gap: 8px;
      background: #151a24;
      border-radius: 50px;
      padding: 5px;
    }
    .nav-btn {
      background: transparent;
      border: none;
      color: #aaa;
      font-weight: 700;
      padding: 13px 26px;
      border-radius: 40px;
      cursor: pointer;
      transition: 0.2s;
      font-size: 15px;
    }
    .nav-btn.active {
      background: #f0b90b;
      color: #0a0a0a;
      box-shadow: 0 0 20px rgba(240,185,11,0.5);
    }
    button {
      background: #232b38;
      border: none;
      color: #eee;
      padding: 11px 21px;
      border-radius: 30px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }
    button:hover {
      filter: brightness(1.3);
    }
    button.primary {
      background: linear-gradient(180deg, #f5cb42, #c5851b);
      color: #111;
      font-weight: 800;
    }
    button.danger {
      background: #4a2e2e;
      color: #faa;
    }
    input {
      background: #151b25;
      border: 1px solid #3f4858;
      padding: 12px 18px;
      border-radius: 30px;
      color: white;
      margin-right: 8px;
      outline: none;
    }
    .balance {
      font-size: 1.3rem;
      font-weight: bold;
      color: #f0b90b;
      background: #0f1219;
      padding: 8px 22px;
      border-radius: 30px;
    }
    .cases-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(230px, 1fr));
      gap: 25px;
    }
    .case-card {
      background: #181e29;
      border-radius: 28px;
      padding: 22px 12px;
      text-align: center;
      border: 1px solid #303a4c;
      cursor: pointer;
      transition: 0.25s;
    }
    .case-card:hover {
      border-color: #f0b90b;
      transform: translateY(-6px);
      box-shadow: 0 18px 30px rgba(0,0,0,0.6);
    }
    .case-img {
      font-size: 68px;
      margin-bottom: 6px;
    }
    .inventory-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 16px;
      margin-top: 15px;
    }
    .item-card {
      background: #1b2130;
      border-radius: 18px;
      padding: 12px 18px;
      display: flex;
      align-items: center;
      gap: 12px;
      border-left: 6px solid;
    }
    .rarity-common { border-left-color: #9e9e9e; }
    .rarity-mil { border-left-color: #4b69ff; }
    .rarity-restricted { border-left-color: #8845ff; }
    .rarity-classified { border-left-color: #d32ce6; }
    .rarity-covert { border-left-color: #eb4b4b; }
    .rarity-gold { border-left-color: #f3b23f; }

    /* Модалка кейса */
    .modal {
      position: fixed;
      top:0; left:0; right:0; bottom:0;
      background: rgba(0,0,0,0.9);
      backdrop-filter: blur(12px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }
    .modal-box {
      background: #111520;
      border: 2px solid #f0b90b;
      border-radius: 36px;
      padding: 24px 28px;
      max-width: 780px;
      width: 95%;
      text-align: center;
      box-shadow: 0 0 60px rgba(240,185,11,0.3);
    }
    .roulette-area {
      position: relative;
      height: 130px;
      background: #0a0d14;
      border-radius: 24px;
      margin: 25px 0 15px;
      overflow: hidden;
      border: 1px solid #2f3745;
    }
    .pointer {
      position: absolute;
      left: 50%;
      top: 0;
      bottom: 0;
      width: 3px;
      background: #f0b90b;
      box-shadow: 0 0 25px #f0b90b, 0 0 8px #fff;
      z-index: 20;
      transform: translateX(-50%);
      border-radius: 3px;
    }
    .items-track {
      display: flex;
      align-items: center;
      height: 100%;
      transition: transform 0.8s cubic-bezier(0.15, 0.8, 0.2, 1);
      will-change: transform;
    }
    .roulette-item {
      flex: 0 0 150px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 8px 4px;
      color: #ddd;
      font-weight: 600;
      background: rgba(30,35,48,0.7);
      margin: 0 4px;
      border-radius: 18px;
      border: 1px solid #3e4657;
    }
    .roulette-item .emoji {
      font-size: 42px;
      display: block;
      line-height: 1;
    }
    .controls {
      display: flex;
      gap: 15px;
      justify-content: center;
      align-items: center;
      flex-wrap: wrap;
      margin-top: 10px;
    }
    .result-text {
      font-size: 1.2rem;
      margin-top: 12px;
      font-weight: bold;
    }
  </style>
</head>
<body>
<div class="app">
  <div class="top-bar">
    <h1>🔫 CASE OPENER</h1>
    <div id="authBlock" style="display: flex; gap: 10px; align-items: center;"></div>
  </div>

  <div id="loginPanel" style="display: none; margin-bottom: 25px; background:#151b26; border-radius: 24px; padding: 20px;"></div>

  <div id="mainUI" style="display: none;">
    <div style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap:15px;">
      <div class="nav">
        <button class="nav-btn active" id="tabCases">📦 Кейсы</button>
        <button class="nav-btn" id="tabInventory">🎒 Инвентарь</button>
      </div>
      <div class="balance">💰 <span id="balanceValue">0</span> ₽</div>
    </div>

    <div id="casesView" style="margin-top: 25px;"></div>
    <div id="inventoryView" style="display: none; margin-top: 25px;"></div>
  </div>
</div>

<!-- Модальное окно открытия кейса -->
<div class="modal" id="caseModal" style="display: none;">
  <div class="modal-box">
    <h2 id="modalTitle" style="color:#f0b90b;"></h2>
    <div class="roulette-area" id="rouletteContainer">
      <div class="pointer"></div>
      <div class="items-track" id="rouletteTrack"></div>
    </div>
    <div class="controls">
      <button class="primary" id="btnOpenNormal" style="font-size:18px; padding:14px 32px;">🔓 Открыть (6 сек)</button>
      <button id="btnOpenFast" style="font-size:16px; padding:12px 25px; background:#3a4050;">⚡ Fast (3.5 сек)</button>
      <button id="btnCloseModal" style="background:#2a2f3c;">Закрыть</button>
    </div>
    <div class="result-text" id="resultMessage"></div>
  </div>
</div>

<script>
  (() => {
    // База предметов
    const ITEMS = [
      { id:'awp_dragon', name:'AWP | Dragon Lore', rarity:'covert', price:13500, emoji:'🐉' },
      { id:'ak_fire', name:'AK-47 | Fire Serpent', rarity:'covert', price:10200, emoji:'🔥' },
      { id:'m4_howl', name:'M4A4 | Howl', rarity:'covert', price:15800, emoji:'🐺' },
      { id:'knife_karambit', name:'Karambit | Doppler', rarity:'gold', price:47000, emoji:'🔪' },
      { id:'glock_fade', name:'Glock-18 | Fade', rarity:'restricted', price:3400, emoji:'🌈' },
      { id:'deagle_blaze', name:'Desert Eagle | Blaze', rarity:'mil', price:5300, emoji:'🔥' },
      { id:'usp_kill', name:'USP-S | Kill Confirmed', rarity:'covert', price:8200, emoji:'💀' },
      { id:'ak_vulcan', name:'AK-47 | Vulcan', rarity:'classified', price:6700, emoji:'🌋' },
      { id:'m4_neo', name:'M4A1-S | Hyper Beast', rarity:'classified', price:4500, emoji:'👾' },
      { id:'awp_asiimov', name:'AWP | Asiimov', rarity:'classified', price:5800, emoji:'⬜' },
      { id:'p250_sand', name:'P250 | Sand Dune', rarity:'common', price:20, emoji:'🏜️' },
      { id:'mp7_forest', name:'MP7 | Forest DDPAT', rarity:'common', price:40, emoji:'🌿' },
      { id:'nova_walnut', name:'Nova | Walnut', rarity:'common', price:50, emoji:'🪵' },
      { id:'five_seven', name:'Five-SeveN | Case Hardened', rarity:'mil', price:2700, emoji:'🔫' },
      { id:'tec9_toxic', name:'Tec-9 | Toxic', rarity:'restricted', price:1300, emoji:'☣️' }
    ];

    const CASES = [
      { id:'gamma', name:'Gamma Case', price:350, image:'📦', items:[
        {itemId:'glock_fade',weight:8},{itemId:'awp_asiimov',weight:5},{itemId:'ak_vulcan',weight:5},
        {itemId:'deagle_blaze',weight:9},{itemId:'five_seven',weight:17},{itemId:'p250_sand',weight:28},{itemId:'mp7_forest',weight:28}
      ]},
      { id:'legend', name:'Legend Case', price:650, image:'🧰', items:[
        {itemId:'awp_dragon',weight:2},{itemId:'ak_fire',weight:3},{itemId:'m4_howl',weight:3},
        {itemId:'usp_kill',weight:8},{itemId:'m4_neo',weight:10},{itemId:'tec9_toxic',weight:17},
        {itemId:'nova_walnut',weight:27},{itemId:'p250_sand',weight:30}
      ]},
      { id:'knife', name:'Knife Dream', price:1300, image:'💎', items:[
        {itemId:'knife_karambit',weight:1},{itemId:'awp_dragon',weight:4},{itemId:'deagle_blaze',weight:10},
        {itemId:'ak_vulcan',weight:14},{itemId:'glock_fade',weight:20},{itemId:'mp7_forest',weight:25},{itemId:'p250_sand',weight:26}
      ]}
    ];

    const USERS_KEY = 'cs2_users_final';
    const CURRENT_KEY = 'cs2_current_final';
    let currentUser = null;
    let activeCase = null;
    let isSpinning = false;
    let spinTimer = null;

    function getUsers() { return JSON.parse(localStorage.getItem(USERS_KEY) || '{}'); }
    function saveUsers(u) { localStorage.setItem(USERS_KEY, JSON.stringify(u)); }
    function getItem(id) { return ITEMS.find(i => i.id === id); }

    function login(username) {
      const users = getUsers();
      if (!users[username]) users[username] = { balance: 5000, inventory: [] };
      saveUsers(users);
      currentUser = { username, balance: users[username].balance, inventory: users[username].inventory || [] };
      localStorage.setItem(CURRENT_KEY, username);
      refreshUI();
    }
    function logout() {
      currentUser = null;
      localStorage.removeItem(CURRENT_KEY);
      refreshUI();
    }
    function persistUser() {
      if (!currentUser) return;
      const users = getUsers();
      users[currentUser.username] = { balance: currentUser.balance, inventory: currentUser.inventory };
      saveUsers(users);
    }

    function openCaseModal(caseData) {
      if (!currentUser) return alert('Войдите в аккаунт');
      if (currentUser.balance < caseData.price) return alert('Недостаточно средств');
      if (isSpinning) return;
      activeCase = caseData;
      document.getElementById('modalTitle').textContent = caseData.name;
      document.getElementById('resultMessage').textContent = '';
      buildRouletteTrack(caseData);
      document.getElementById('caseModal').style.display = 'flex';
      document.getElementById('btnOpenNormal').disabled = false;
      document.getElementById('btnOpenFast').disabled = false;
    }

    function buildRouletteTrack(caseData) {
      const track = document.getElementById('rouletteTrack');
      let html = '';
      // Строим ~50 копий элементов для плавной длинной ленты
      for (let i = 0; i < 45; i++) {
        caseData.items.forEach(entry => {
          const item = getItem(entry.itemId);
          if (item) {
            html += `<div class="roulette-item"><span class="emoji">${item.emoji}</span><span>${item.name.split('|')[0].trim()}</span></div>`;
          }
        });
      }
      track.innerHTML = html;
      track.style.transition = 'none';
      track.style.transform = 'translateX(0)';
      // Принудительный reflow
      track.offsetHeight;
    }

    function spin(durationSec) {
      if (!activeCase || isSpinning || !currentUser) return;
      if (currentUser.balance < activeCase.price) {
        alert('Недостаточно средств');
        return;
      }

      isSpinning = true;
      document.getElementById('btnOpenNormal').disabled = true;
      document.getElementById('btnOpenFast').disabled = true;
      document.getElementById('resultMessage').textContent = '⏳ Крутим...';

      // Списание
      currentUser.balance -= activeCase.price;
      persistUser();
      updateBalance();

      // Определяем победителя
      const totalWeight = activeCase.items.reduce((s, it) => s + it.weight, 0);
      let rand = Math.random() * totalWeight;
      let winEntry = null;
      for (let e of activeCase.items) {
        rand -= e.weight;
        if (rand <= 0) { winEntry = e; break; }
      }
      const winItem = getItem(winEntry.itemId);

      // Ищем индекс в треке (первое совпадение по тексту)
      const trackItems = document.querySelectorAll('#rouletteTrack .roulette-item');
      let targetIndex = -1;
      const searchText = winItem.name.split('|')[0].trim();
      for (let i = 0; i < trackItems.length; i++) {
        if (trackItems[i].textContent.includes(searchText)) {
          targetIndex = i;
          break;
        }
      }
      if (targetIndex === -1) targetIndex = Math.floor(Math.random() * trackItems.length);

      const itemWidth = 158; // flex-basis 150 + margin 8
      const containerWidth = document.getElementById('rouletteContainer').clientWidth;
      const centerOffset = (containerWidth / 2) - (itemWidth / 2);
      // Финальная позиция: элемент под стрелкой
      let targetPos = -(targetIndex * itemWidth) + centerOffset;
      // Добавляем несколько полных прокруток ленты для эффекта
      const totalTrackWidth = trackItems.length * itemWidth;
      const extraTurns = 3; // минимум 3 полных оборота
      targetPos -= extraTurns * totalTrackWidth;

      const track = document.getElementById('rouletteTrack');
      track.style.transition = `transform ${durationSec}s cubic-bezier(0.12, 0.78, 0.22, 1)`;
      track.style.transform = `translateX(${targetPos}px)`;

      // По окончании анимации
      if (spinTimer) clearTimeout(spinTimer);
      spinTimer = setTimeout(() => {
        // Добавляем предмет
        currentUser.inventory.push({
          uid: Date.now() + Math.random().toString(36),
          itemId: winItem.id,
          acquired: new Date().toISOString()
        });
        persistUser();
        document.getElementById('resultMessage').innerHTML = `🎉 Выпало: ${winItem.emoji} <strong>${winItem.name}</strong> (${winItem.price} ₽)`;
        isSpinning = false;
        document.getElementById('btnOpenNormal').disabled = false;
        document.getElementById('btnOpenFast').disabled = false;
        updateBalance();
        renderInventoryView();
        spinTimer = null;
      }, durationSec * 1000 + 100);
    }

    function closeModal() {
      if (isSpinning) return; // запрет закрытия во время вращения
      document.getElementById('caseModal').style.display = 'none';
      activeCase = null;
      if (spinTimer) clearTimeout(spinTimer);
      renderCasesView();
    }

    function sellItem(uid) {
      if (!currentUser) return;
      const idx = currentUser.inventory.findIndex(i => i.uid === uid);
      if (idx === -1) return;
      const invEntry = currentUser.inventory[idx];
      const item = getItem(invEntry.itemId);
      if (!item) return;
      currentUser.balance += item.price;
      currentUser.inventory.splice(idx, 1);
      persistUser();
      updateBalance();
      renderInventoryView();
    }

    function renderCasesView() {
      const container = document.getElementById('casesView');
      container.innerHTML = '<div class="cases-grid">' + CASES.map(c => `
        <div class="case-card" onclick="window.siteOpenCase('${c.id}')">
          <div class="case-img">${c.image}</div>
          <h3>${c.name}</h3>
          <p style="margin:5px 0;">Цена: <strong>${c.price} ₽</strong></p>
        </div>
      `).join('') + '</div>';
    }

    function renderInventoryView() {
      const invDiv = document.getElementById('inventoryView');
      if (!currentUser || currentUser.inventory.length === 0) {
        invDiv.innerHTML = '<p style="color:#888; padding:20px;">🎒 Инвентарь пуст. Откройте кейсы!</p>';
        return;
      }
      let html = '<div class="inventory-grid">';
      currentUser.inventory.forEach(inv => {
        const item = getItem(inv.itemId);
        if (!item) return;
        html += `
          <div class="item-card rarity-${item.rarity}">
            <span style="font-size:36px;">${item.emoji}</span>
            <div style="flex:1;">
              <strong>${item.name}</strong>
              <div style="color:#f0b90b; font-weight:bold;">${item.price} ₽</div>
            </div>
            <button onclick="window.siteSellItem('${inv.uid}')">Продать</button>
          </div>`;
      });
      html += '</div>';
      invDiv.innerHTML = html;
    }

    function updateBalance() {
      document.getElementById('balanceValue').textContent = currentUser ? currentUser.balance : 0;
    }

    function refreshUI() {
      const authBlock = document.getElementById('authBlock');
      const loginPanel = document.getElementById('loginPanel');
      const mainUI = document.getElementById('mainUI');

      if (currentUser) {
        authBlock.innerHTML = `
          <span style="font-weight:bold;">👤 ${currentUser.username}</span>
          <button class="danger" onclick="window.siteLogout()">Выйти</button>
        `;
        loginPanel.style.display = 'none';
        mainUI.style.display = 'block';
        updateBalance();
        renderCasesView();
        renderInventoryView();
      } else {
        authBlock.innerHTML = '';
        loginPanel.style.display = 'block';
        mainUI.style.display = 'none';
        loginPanel.innerHTML = `
          <div style="display:flex; align-items:center; gap:10px; flex-wrap:wrap;">
            <input type="text" id="usernameInput" placeholder="Введите никнейм" maxlength="14">
            <button class="primary" onclick="window.siteLogin()">Войти / Создать</button>
          </div>
          <p style="color:#aaa; margin-top:8px;">Новый аккаунт получит 5 000 ₽</p>
        `;
      }
    }

    // Переключение вкладок
    document.getElementById('tabCases').addEventListener('click', () => {
      document.getElementById('casesView').style.display = 'block';
      document.getElementById('inventoryView').style.display = 'none';
      document.getElementById('tabCases').classList.add('active');
      document.getElementById('tabInventory').classList.remove('active');
    });
    document.getElementById('tabInventory').addEventListener('click', () => {
      document.getElementById('casesView').style.display = 'none';
      document.getElementById('inventoryView').style.display = 'block';
      document.getElementById('tabInventory').classList.add('active');
      document.getElementById('tabCases').classList.remove('active');
      renderInventoryView();
    });

    document.getElementById('btnCloseModal').addEventListener('click', closeModal);
    document.getElementById('btnOpenNormal').addEventListener('click', () => spin(6));
    document.getElementById('btnOpenFast').addEventListener('click', () => spin(3.5));

    window.siteLogin = () => {
      const input = document.getElementById('usernameInput');
      if (input && input.value.trim().length >= 2) login(input.value.trim());
    };
    window.siteLogout = () => logout();
    window.siteOpenCase = (caseId) => {
      const c = CASES.find(c => c.id === caseId);
      if (c) openCaseModal(c);
    };
    window.siteSellItem = (uid) => sellItem(uid);

    // Восстановление сессии
    const savedUser = localStorage.getItem(CURRENT_KEY);
    if (savedUser) {
      const users = getUsers();
      if (users[savedUser]) {
        currentUser = {
          username: savedUser,
          balance: users[savedUser].balance,
          inventory: users[savedUser].inventory || []
        };
      }
    }
    refreshUI();
  })();
</script>
</body>
</html>
