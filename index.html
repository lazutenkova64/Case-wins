<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>case-wins · Классический раунд & 1 на 1</title>
  <style>
    :root {
      --bg: #0a0d12;
      --panel: #131720;
      --card: #1a1f2b;
      --gold: #f0b34b;
      --accent: #2a3040;
      --text: #cfd4dc;
    }
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      background: var(--bg);
      font-family: 'Segoe UI', 'Inter', system-ui, sans-serif;
      color: var(--text);
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      display: flex;
    }
    .app {
      display: flex;
      width: 100%;
      height: 100%;
      gap: 8px;
      padding: 8px;
    }
    /* Левая панель навигации */
    .sidebar {
      width: 210px;
      background: var(--panel);
      border-radius: 20px;
      padding: 16px 12px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      border: 1px solid #2c3140;
      flex-shrink: 0;
    }
    .profile {
      display: flex;
      align-items: center;
      gap: 10px;
      background: #1e2330;
      padding: 10px;
      border-radius: 30px;
    }
    .avatar-big {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: var(--gold);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
    }
    .online-dot {
      color: #3acf6e;
      font-size: 12px;
    }
    .nav-btn {
      background: #1e2330;
      border: none;
      color: var(--text);
      padding: 11px 16px;
      border-radius: 25px;
      font-weight: 600;
      cursor: pointer;
      text-align: left;
      transition: 0.2s;
      font-size: 14px;
    }
    .nav-btn.active {
      background: var(--gold);
      color: #000;
      font-weight: 700;
    }
    .sub-menu {
      margin-left: 16px;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .sub-item {
      background: transparent;
      border: none;
      color: #a0a6b5;
      padding: 6px 12px;
      border-radius: 15px;
      cursor: pointer;
      text-align: left;
    }
    /* Центральная зона: классический + 1 на 1 */
    .main-area {
      flex: 1;
      display: flex;
      gap: 12px;
      min-width: 0;
    }
    /* Классический раунд слева */
    .classic-section {
      flex: 1;
      background: var(--card);
      border-radius: 24px;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      border: 1px solid #2f3645;
    }
    .classic-wheel {
      flex: 1;
      background: #0b0f17;
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
      min-height: 200px;
    }
    .rolling-track {
      display: flex;
      gap: 20px;
      align-items: center;
      justify-content: center;
      font-size: 60px;
      transition: transform 0.05s linear;
      will-change: transform;
    }
    .rolling-avatar {
      width: 90px;
      height: 90px;
      background: #232838;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 3px solid #f0b34b;
      box-shadow: 0 0 18px rgba(240,179,75,0.5);
      flex-shrink: 0;
    }
    .vs-divider {
      font-weight: 900;
      font-size: 28px;
      color: #f0b34b;
      margin: 0 8px;
    }
    .classic-info {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-weight: bold;
    }
    .timer-countdown {
      background: #f0b34b;
      color: #000;
      padding: 6px 18px;
      border-radius: 25px;
      font-weight: 800;
    }
    /* 1 на 1 справа */
    .onevsone-section {
      flex: 1;
      background: var(--card);
      border-radius: 24px;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      border: 1px solid #2f3645;
    }
    .rooms-scroll {
      flex: 1;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 8px;
      padding-right: 4px;
    }
    .room-card {
      background: #1e2330;
      border-radius: 18px;
      padding: 12px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border: 1px solid #353d4e;
    }
    .room-players {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .mini-avatar {
      width: 32px;
      height: 32px;
      background: #3f4758;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .btn {
      background: #f0b34b;
      border: none;
      color: #000;
      font-weight: 700;
      padding: 8px 18px;
      border-radius: 25px;
      cursor: pointer;
      font-size: 13px;
    }
    .btn:disabled {
      background: #5c6170;
      color: #222;
    }
    .inventory-panel {
      width: 220px;
      background: var(--panel);
      border-radius: 20px;
      padding: 16px 12px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      border: 1px solid #2c3140;
      flex-shrink: 0;
    }
    .inv-grid {
      display: grid;
      grid-template-columns: repeat(2,1fr);
      gap: 8px;
    }
    .inv-slot {
      aspect-ratio: 1;
      background: #1e2330;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      border: 1px solid #3a4050;
    }
    input {
      background: #1e2330;
      border: 1px solid #3d4455;
      padding: 10px;
      border-radius: 25px;
      color: white;
      text-align: center;
      width: 80px;
    }
  </style>
</head>
<body>
<div class="app" id="appRoot">
  <!-- Левая навигация -->
  <div class="sidebar">
    <div class="profile">
      <span class="avatar-big" id="profileAvatar">🐺</span>
      <div>
        <div id="profileName">PlayerOne</div>
        <div class="online-dot">● Онлайн 1082</div>
      </div>
    </div>
    <button class="nav-btn active">🏠 Главная</button>
    <button class="nav-btn" id="historyBtn">📜 История игр</button>
    <div class="sub-menu" id="historySub" style="display:none;">
      <button class="sub-item">Классические игры</button>
      <button class="sub-item">Мои классические</button>
      <button class="sub-item">1 на 1 (участвовал)</button>
    </div>
    <button class="nav-btn">❓ FAQ</button>
  </div>

  <!-- Центр: классический раунд + 1 на 1 -->
  <div class="main-area">
    <!-- Классический раунд -->
    <div class="classic-section" id="classicBlock">
      <div class="classic-info">
        <span>🏆 КЛАССИЧЕСКИЙ РАУНД</span>
        <span>Банк: <span id="classicBankDisplay">0</span>$</span>
      </div>
      <div class="classic-wheel" id="classicWheelContainer">
        <div class="rolling-track" id="classicRollingTrack">
          <div class="rolling-avatar">❓</div>
          <span class="vs-divider">VS</span>
          <div class="rolling-avatar">❓</div>
        </div>
      </div>
      <div style="display: flex; justify-content: space-between; align-items: center;">
        <span class="timer-countdown" id="classicTimerText">⏳ 3</span>
        <span id="classicResultMessage" style="color:#f0b34b;"></span>
      </div>
      <div style="display: flex; gap: 8px; align-items: center;">
        <input type="number" id="classicBetInput" value="5" min="1">
        <button class="btn" id="placeClassicBetBtn">Поставить</button>
        <button class="btn" id="resetClassicBtn" style="background:#3e4455;">Сброс</button>
      </div>
    </div>

    <!-- 1 на 1 -->
    <div class="onevsone-section">
      <div style="display: flex; justify-content: space-between; align-items: center;">
        <h3>🎲 ИГРА 1 НА 1</h3>
        <button class="btn" id="createRoomBtn">➕ Создать</button>
      </div>
      <div class="rooms-scroll" id="roomsList"></div>
    </div>
  </div>

  <!-- Инвентарь -->
  <div class="inventory-panel">
    <h3>🎒 Инвентарь</h3>
    <div class="inv-grid">
      <div class="inv-slot">🔹</div><div class="inv-slot">🔹</div>
      <div class="inv-slot">🔹</div><div class="inv-slot">🔹</div>
    </div>
    <div>💰 Скины: <span id="skinValue">0</span>$</div>
    <button class="btn">Купить скины</button>
    <button class="btn" style="background:#3e4455;">Продать</button>
  </div>
</div>

<script>
  (() => {
    const avatars = ['🐺','🦊','🐸','🐷','🐙','🐲','🦅','🐼','🐨','🐯','🐮','🐭'];
    function randAvatar() { return avatars[Math.floor(Math.random()*avatars.length)]; }

    const state = {
      user: { name: 'PlayerOne', balance: 500, avatar: '🐺' },
      classicBets: [],
      classicTimer: 3,
      classicInterval: null,
      classicSpinning: false,
      rooms: [],
      nextRoomId: 1,
      history: { classic: [], myClassic: [], oneVsOne: [] }
    };

    // DOM
    const profileAvatar = document.getElementById('profileAvatar');
    const profileName = document.getElementById('profileName');
    const classicBankDisplay = document.getElementById('classicBankDisplay');
    const classicRollingTrack = document.getElementById('classicRollingTrack');
    const classicTimerText = document.getElementById('classicTimerText');
    const classicResultMessage = document.getElementById('classicResultMessage');
    const classicBetInput = document.getElementById('classicBetInput');
    const roomsList = document.getElementById('roomsList');
    const historyBtn = document.getElementById('historyBtn');
    const historySub = document.getElementById('historySub');

    function updateUI() {
      profileAvatar.textContent = state.user.avatar;
      profileName.textContent = state.user.name;
      const bank = state.classicBets.reduce((s,b)=>s+b.amount,0);
      classicBankDisplay.textContent = bank.toFixed(0);
      renderRooms();
    }

    // Анимация рулетки (как кейсы)
    function animateClassicRoll(winnerAvatar, callback) {
      const track = classicRollingTrack;
      let steps = 0;
      const maxSteps = 28; // ~4-5 секунд
      const interval = setInterval(() => {
        const leftAv = randAvatar();
        const rightAv = randAvatar();
        track.innerHTML = `
          <div class="rolling-avatar">${leftAv}</div>
          <span class="vs-divider">VS</span>
          <div class="rolling-avatar">${rightAv}</div>
        `;
        steps++;
        if (steps >= maxSteps) {
          clearInterval(interval);
          // Финальная остановка на победителе
          track.innerHTML = `
            <div class="rolling-avatar">${winnerAvatar}</div>
            <span class="vs-divider">VS</span>
            <div class="rolling-avatar">${winnerAvatar}</div>
          `;
          setTimeout(() => {
            if (callback) callback();
          }, 3000);
        }
      }, 140);
    }

    function startClassicCountdown() {
      if (state.classicBets.length < 2) return;
      clearClassicInterval();
      state.classicTimer = 3;
      classicTimerText.textContent = `⏳ ${state.classicTimer}`;
      state.classicInterval = setInterval(() => {
        state.classicTimer--;
        classicTimerText.textContent = `⏳ ${state.classicTimer}`;
        if (state.classicTimer <= 0) {
          clearClassicInterval();
          runClassicGame();
        }
      }, 1000);
    }

    function runClassicGame() {
      if (state.classicSpinning) return;
      state.classicSpinning = true;
      const tickets = [];
      state.classicBets.forEach(b => { for(let i=0;i<b.amount;i++) tickets.push(b.user); });
      const winner = tickets.length ? tickets[Math.floor(Math.random()*tickets.length)] : null;
      const totalBank = state.classicBets.reduce((s,b)=>s+b.amount,0);
      animateClassicRoll(winner?.avatar || '❓', () => {
        if (winner) {
          winner.balance += totalBank;
          if (winner.name === state.user.name) state.user.balance = winner.balance;
          classicResultMessage.textContent = `${winner.name} выиграл ${totalBank}$`;
          state.history.classic.push({winner:winner.name, bank:totalBank});
          state.history.myClassic.push({winner:winner.name, bank:totalBank});
        }
        state.classicBets = [];
        state.classicSpinning = false;
        classicTimerText.textContent = '⏳ 3';
        updateUI();
        setTimeout(()=>{ classicResultMessage.textContent = ''; }, 3000);
      });
    }

    function clearClassicInterval() {
      if (state.classicInterval) { clearInterval(state.classicInterval); state.classicInterval = null; }
    }

    document.getElementById('placeClassicBetBtn').addEventListener('click', ()=>{
      if (!state.user) return;
      const amt = parseInt(classicBetInput.value,10);
      if (isNaN(amt)||amt<=0) return;
      if (state.user.balance < amt) return alert('Недостаточно монет');
      state.user.balance -= amt;
      state.classicBets.push({ user: {...state.user}, amount: amt });
      updateUI();
      if (state.classicBets.length >= 2 && !state.classicInterval && !state.classicSpinning) {
        startClassicCountdown();
      }
    });
    document.getElementById('resetClassicBtn').addEventListener('click', ()=>{
      if (state.classicSpinning) return;
      clearClassicInterval();
      state.classicBets = [];
      classicTimerText.textContent = '⏳ 3';
      updateUI();
    });

    // Комнаты 1 на 1
    function createRoom() {
      const bet = parseInt(prompt('Ставка монет:','15'),10);
      if (!bet || bet<=0 || state.user.balance < bet) return alert('Недостаточно средств');
      state.user.balance -= bet;
      state.rooms.push({
        id: state.nextRoomId++,
        creator: {...state.user},
        bet,
        opponent: null,
        status: 'waiting',
        timer: 3,
        intervalId: null
      });
      updateUI();
    }

    function joinRoom(roomId) {
      const room = state.rooms.find(r=>r.id===roomId);
      if (!room || room.status!=='waiting') return;
      if (state.user.balance < room.bet) return alert('Недостаточно монет');
      state.user.balance -= room.bet;
      room.opponent = {...state.user};
      room.status = 'countdown';
      room.timer = 3;
      startRoomCountdown(room);
      updateUI();
    }

    function startRoomCountdown(room) {
      clearRoomInterval(room);
      room.intervalId = setInterval(() => {
        room.timer--;
        updateUI();
        if (room.timer <= 0) {
          clearRoomInterval(room);
          finishRoom(room);
        }
      }, 1000);
    }

    function finishRoom(room) {
      const tickets = [];
      for(let i=0;i<room.bet;i++) tickets.push(room.creator);
      for(let i=0;i<room.bet;i++) tickets.push(room.opponent);
      const winner = tickets[Math.floor(Math.random()*tickets.length)];
      room.status = 'finished';
      room.winner = winner;
      const prize = room.bet*2;
      if (winner.name === state.user.name) state.user.balance += prize;
      state.history.oneVsOne.push({vs:`${room.creator.name} vs ${room.opponent.name}`, winner:winner.name});
      updateUI();
      setTimeout(()=>{
        state.rooms = state.rooms.filter(r=>r.id!==room.id);
        updateUI();
      }, 5000);
    }

    function clearRoomInterval(room) {
      if (room.intervalId) { clearInterval(room.intervalId); room.intervalId = null; }
    }

    function renderRooms() {
      roomsList.innerHTML = '';
      if (!state.rooms.length) {
        roomsList.innerHTML = '<div style="color:#7f8690; padding:12px;">Нет активных комнат</div>';
        return;
      }
      state.rooms.forEach(room => {
        const div = document.createElement('div');
        div.className = 'room-card';
        const status = room.status==='waiting'?'Ожидание':(room.status==='countdown'?`Идет... ${room.timer}с`:'Завершено');
        div.innerHTML = `
          <div class="room-players">
            <span class="mini-avatar">${room.creator.avatar}</span>
            <span>${room.creator.name} (${room.bet}$)</span>
            ${room.opponent ? `<span>VS ${room.opponent.avatar} ${room.opponent.name}</span>` : ''}
          </div>
          <div style="display:flex; gap:6px; align-items:center;">
            <span>${status}</span>
            <button class="btn join-btn" data-id="${room.id}" ${room.status!=='waiting'?'disabled':''}>Играть</button>
            <button class="btn watch-btn" data-id="${room.id}" style="background:#4a5068;">👁</button>
          </div>
        `;
        roomsList.appendChild(div);
      });
      document.querySelectorAll('.join-btn').forEach(b=>b.addEventListener('click',e=>joinRoom(parseInt(e.target.dataset.id))));
      document.querySelectorAll('.watch-btn').forEach(b=>b.addEventListener('click',e=>{
        alert('Режим наблюдения: смотрите за комнатой #'+e.target.dataset.id);
      }));
    }

    document.getElementById('createRoomBtn').addEventListener('click', createRoom);
    historyBtn.addEventListener('click', ()=>{
      historySub.style.display = historySub.style.display==='none'?'flex':'none';
    });

    updateUI();
  })();
</script>
</body>
</html>
