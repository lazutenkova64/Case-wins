<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>case-wins</title>
<style>
body{margin:0;font-family:Arial;background:#1b1e24;color:#fff}
.sidebar{width:250px;background:#111;position:fixed;height:100%;padding:20px}
.main{margin-left:250px;padding:20px}
.btn{background:#6cff00;border:none;padding:10px 20px;color:#000;cursor:pointer}
.btn.gray{background:#555;color:#aaa}
.room{background:#222;padding:10px;margin:10px 0;border-radius:8px}
input{padding:10px;margin:5px 0;width:100%}
.hidden{display:none}
</style>
</head>
<body>

<div class="sidebar">
<h2>CASE-WINS</h2>
<div id="auth">
<input id="login" placeholder="Логин">
<input id="pass" type="password" placeholder="Пароль">
<button class="btn" onclick="register()">Регистрация</button>
<button class="btn" onclick="loginUser()">Вход</button>
</div>
<div id="userPanel" class="hidden">
<p id="username"></p>
<p>Монеты: <span id="coins">100</span></p>
</div>
</div>

<div class="main">
<h2>Классический раунд</h2>
<div id="classic">
<p>Банк: <span id="bank">0</span></p>
<input id="bet" placeholder="Ставка">
<button class="btn" onclick="placeBet()">Поставить</button>
<p id="timer">Ожидание игроков...</p>
</div>

<h2>Игра 1 на 1</h2>
<div>
<input id="roomBet" placeholder="Ставка">
<button class="btn" onclick="createRoom()">Создать</button>
</div>
<div id="rooms"></div>
</div>

<script>
let users = JSON.parse(localStorage.getItem('users')||"[]");
let currentUser = null;
let classicPlayers=[];
let classicTimer=null;
let classicTime=30;

function register(){
let l=login.value,p=pass.value;
users.push({l,p,coins:100});
localStorage.setItem('users',JSON.stringify(users));
alert('зарегистрирован');
}

function loginUser(){
let l=login.value,p=pass.value;
let u=users.find(x=>x.l==l&&x.p==p);
if(u){
currentUser=u;
auth.classList.add('hidden');
userPanel.classList.remove('hidden');
username.innerText=u.l;
coins.innerText=u.coins;
}
}

function placeBet(){
let amount=+bet.value;
if(currentUser.coins<amount)return;
currentUser.coins-=amount;
coins.innerText=currentUser.coins;
classicPlayers.push({user:currentUser,amount});
bank.innerText=classicPlayers.reduce((a,b)=>a+b.amount,0);
if(classicPlayers.length==2 && !classicTimer){
startClassic();
}
}

function startClassic(){
classicTime=30;
classicTimer=setInterval(()=>{
classicTime--;
timer.innerText='До конца: '+classicTime;
if(classicTime<=0){
clearInterval(classicTimer);
spinClassic();
}
},1000);
}

function spinClassic(){
let total=classicPlayers.reduce((a,b)=>a+b.amount,0);
let ticket=Math.random()*total;
let sum=0;
let winner;
classicPlayers.forEach(p=>{
sum+=p.amount;
if(ticket<=sum && !winner)winner=p;
});
winner.user.coins+=total;
alert('Победил '+winner.user.l);
classicPlayers=[];
bank.innerText=0;
timer.innerText='Ожидание игроков...';
}

let rooms=[];

function createRoom(){
let bet=+roomBet.value;
if(currentUser.coins<bet)return;
currentUser.coins-=bet;
coins.innerText=currentUser.coins;
rooms.push({host:currentUser,bet,guest:null,status:'wait',time:10});
renderRooms();
}

function joinRoom(i){
let r=rooms[i];
if(Math.abs(r.bet-roomBet.value)>20)return;
if(currentUser.coins<r.bet)return;
currentUser.coins-=r.bet;
r.guest=currentUser;
r.status='start';
startRoom(i);
renderRooms();
}

function startRoom(i){
let r=rooms[i];
let t=setInterval(()=>{
r.time--;
renderRooms();
if(r.time<=0){
clearInterval(t);
spinRoom(r);
}
},1000);
}

function spinRoom(r){
let total=r.bet*2;
let ticket=Math.random()*total;
let winner = ticket<=r.bet ? r.host : r.guest;
winner.coins+=total;
alert('Победил '+winner.l);
rooms=rooms.filter(x=>x!=r);
renderRooms();
}

function renderRooms(){
roomsDiv.innerHTML='';
rooms.forEach((r,i)=>{
let div=document.createElement('div');
div.className='room';
div.innerHTML=`
<p>${r.host.l} vs ${r.guest?r.guest.l:'???'}</p>
<p>Ставка:


${r.bet}</p>
<p>${r.status=='start'?'Идет '+r.time:'Ожидание'}</p>
<button class="btn ${r.status=='start'?'gray':''}" onclick="joinRoom(${i})">${r.status=='start'?'Идет...':'Играть'}</button>
`;
roomsDiv.appendChild(div);
});
}
</script>

</body>
</html>
