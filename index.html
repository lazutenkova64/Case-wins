<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>CS2 Case Opening — Multi‑open + Upgrade</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: radial-gradient(circle at 20% 20%, #1a1f2b, #0a0d14);
      min-height: 100vh;
      color: #e0e0e0;
      font-family: 'Segoe UI', system-ui, sans-serif;
      display: flex;
      justify-content: center;
      padding: 20px 15px;
    }
    .app {
      max-width: 1100px;
      width: 100%;
      background: rgba(14, 17, 23, 0.85);
      backdrop-filter: blur(25px);
      border-radius: 40px;
      padding: 24px 22px 30px;
      box-shadow: 0 30px 45px rgba(0,0,0,0.8);
      border: 1px solid rgba(220,180,40,0.2);
    }
    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 18px;
      margin-bottom: 28px;
      border-bottom: 1px solid rgba(255,200,0,0.15);
      padding-bottom: 18px;
    }
    h1 {
      background: linear-gradient(180deg, #f9e076, #c5921a);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      font-weight: 900; font-size: 2.2rem; letter-spacing: 1px;
    }
    .nav { display: flex; gap: 8px; background: #151a24; border-radius: 50px; padding: 5px; }
    .nav-btn {
      background: transparent; border: none; color: #aaa; font-weight: 700;
      padding: 13px 26px; border-radius: 40px; cursor: pointer; transition: 0.2s; font-size: 15px;
    }
    .nav-btn.active { background: #f0b90b; color: #0a0a0a; box-shadow: 0 0 20px rgba(240,185,11,0.5); }
    button {
      background: #232b38; border: none; color: #eee; padding: 11px 21px;
      border-radius: 30px; font-weight: 600; cursor: pointer; transition: 0.2s;
    }
    button:hover { filter: brightness(1.3); }
    button.primary { background: linear-gradient(180deg, #f5cb42, #c5851b); color: #111; font-weight: 800; }
    button.danger { background: #4a2e2e; color: #faa; }
    input {
      background: #151b25; border: 1px solid #3f4858; padding: 12px 18px;
      border-radius: 30px; color: white; margin-right: 8px; outline: none;
    }
    .balance { font-size: 1.3rem; font-weight: bold; color: #f0b90b; background: #0f1219; padding: 8px 22px; border-radius: 30px; }
    .cases-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(230px, 1fr)); gap: 25px; }
    .case-card {
      background: #181e29; border-radius: 28px; padding: 22px 12px; text-align: center;
      border: 1px solid #303a4c; cursor: pointer; transition: 0.25s;
    }
    .case-card:hover { border-color: #f0b90b; transform: translateY(-6px); }
    .case-img { font-size: 68px; margin-bottom: 6px; }
    .inventory-grid, .upgrade-select { display: flex; flex-wrap: wrap; gap: 16px; margin-top: 15px; }
    .item-card {
      background: #1b2130; border-radius: 18px; padding: 12px 18px; display: flex;
      align-items: center; gap: 12px; border-left: 6px solid;
    }
    .rarity-common { border-left-color: #9e9e9e; } .rarity-mil { border-left-color: #4b69ff; }
    .rarity-restricted { border-left-color: #8845ff; } .rarity-classified { border-left-color: #d32ce6; }
    .rarity-covert { border-left-color: #eb4b4b; } .rarity-gold { border-left-color: #f3b23f; }

    .modal {
      position: fixed; top:0; left:0; right:0; bottom:0; background: rgba(0,0,0,0.9);
      backdrop-filter: blur(12px); display: flex; align-items: center; justify-content: center; z-index: 1000;
    }
    .modal-box {
      background: #111520; border: 2px solid #f0b90b; border-radius: 36px;
      padding: 24px 28px; width: 95%; max-width: 800px; text-align: center;
      box-shadow: 0 0 60px rgba(240,185,11,0.3); max-height: 90vh; overflow-y: auto;
    }
    .roulette-area {
      position: relative; height: 130px; background: #0a0d14; border-radius: 24px;
      margin: 15px 0; overflow: hidden; border: 1px solid #2f3745;
    }
    .pointer {
      position: absolute; left: 50%; top:0; bottom:0; width: 3px;
      background: #f0b90b; box-shadow: 0 0 30px #f0b90b; z-index: 20; transform: translateX(-50%);
    }
    .items-track {
      display: flex; align-items: center; height: 100%; will-change: transform;
    }
    .roulette-item {
      flex: 0 0 150px; display: flex; flex-direction: column; align-items: center;
      justify-content: center; padding: 8px 4px; color: #ddd; font-weight: 600;
      background: rgba(30,35,48,0.8); margin: 0 4px; border-radius: 18px; border: 1px solid #3e4657;
    }
    .roulette-item .emoji { font-size: 40px; display: block; }
    .controls { display: flex; gap: 15px; justify-content: center; flex-wrap: wrap; margin: 15px 0; }
    .quantity-selector { display: flex; align-items: center; justify-content: center; gap: 10px; margin: 15px 0; }
    .quantity-btn { font-size: 1.5rem; width: 45px; height: 45px; padding: 0; }
    .quantity-value { font-size: 2rem; font-weight: 800; color: #f0b90b; min-width: 50px; }
    .result-text { font-size: 1.2rem; margin-top: 12px; font-weight: bold; min-height: 30px; }
    .upgrade-chance { font-size: 1.4rem; color: #f0b90b; margin: 15px 0; }
  </style>
</head>

  const ITEM_WIDTH = 158;
  const COPIES = 60;
  const SAFE_MARGIN = 8;

  function getUsers() { return JSON.parse(localStorage.getItem(USERS_KEY)||'{}'); }
  function saveUsers(u) { localStorage.setItem(USERS_KEY, JSON.stringify(u)); }

    const users = getUsers();
    if (!users[u]) users[u] = { balance:5000, inventory:[] };

    currentUser = { username:u, balance:users[u].balance, inventory:users[u].inventory||[] };
    localStorage.setItem(CURRENT_KEY, u);
    refreshAll();
  }
  function logout() { currentUser=null; localStorage.removeItem(CURRENT_KEY); refreshAll(); }
  function persist() {
    if(!currentUser) return;
    const users=getUsers();
    users[currentUser.username]={balance:currentUser.balance, inventory:currentUser.inventory};
    saveUsers(users);
  }

  // Построение ленты (общая функция)
  function buildTrack(container, itemsArray) {
    container.innerHTML = '';
    const track = document.createElement('div');
    track.className = 'items-track';
    let html = '';
    for (let i=0; i<COPIES; i++) {
      itemsArray.forEach(obj => {
        html += `<div class="roulette-item"><span class="emoji">${obj.emoji}</span>${obj.name.split('|')[0]}</div>`;
      });
    }
    track.innerHTML = html;
    container.appendChild(track);
    return track;
  }

  function animateTrack(track, targetIndex, itemsCount, durationSec, containerWidth) {
    const centerOffset = (containerWidth/2) - (ITEM_WIDTH/2);
    let targetPos = -(targetIndex * ITEM_WIDTH) + centerOffset;
    const oneSetWidth = itemsCount * ITEM_WIDTH;
    const extraTurns = 2 + Math.floor(Math.random()*2);
    let startPos = targetPos - extraTurns * oneSetWidth;
    const totalWidth = COPIES * itemsCount * ITEM_WIDTH;
    if (startPos < -(totalWidth - containerWidth)) startPos = -(totalWidth - containerWidth);
    track.style.transition = 'none';
    track.style.transform = `translateX(${startPos}px)`;
    track.offsetHeight;
    track.style.transition = `transform ${durationSec}s cubic-bezier(0.12,0.78,0.22,1)`;
    track.style.transform = `translateX(${targetPos}px)`;
  }

  // Мульти-открытие
  function openCaseModal(caseData) {
    if(!currentUser) return alert('Войдите');
    if(isSpinning) return;
    activeCase = caseData;
    document.getElementById('modalTitle').textContent = caseData.name;
    document.getElementById('multiRouletteContainer').innerHTML = '';
    document.getElementById('resultMessage').textContent = '';
    selectedQuantity = 1;
    updateQuantityDisplay();
    document.getElementById('caseModal').style.display = 'flex';
    enableButtons(true);
  }

  let selectedQuantity = 1;
  function updateQuantityDisplay() {
    document.getElementById('qtyValue').textContent = selectedQuantity;
    const total = activeCase ? activeCase.price * selectedQuantity : 0;
    document.getElementById('totalPriceDisplay').textContent = `Общая стоимость: ${total.toLocaleString()} ₽`;
  }

  async function openMultiple(durationSec) {
    if(!activeCase || isSpinning || !currentUser) return;
    const totalCost = activeCase.price * selectedQuantity;
    if(currentUser.balance < totalCost) return alert('Недостаточно средств');
    isSpinning = true;
    enableButtons(false);
    document.getElementById('resultMessage').textContent = `Открываем ${selectedQuantity} кейс(ов)...`;
    currentUser.balance -= totalCost;
    persist();
    updateBalance();

    const container = document.getElementById('multiRouletteContainer');
    container.innerHTML = '';
    const tracks = [];
    const winData = [];

    for (let i=0; i<selectedQuantity; i++) {
      const area = document.createElement('div');
      area.className = 'roulette-area';
      area.style.margin = '8px 0';
      area.innerHTML = '<div class="pointer"></div>';
      container.appendChild(area);
      const items = activeCase.items.map(e => getItem(e.itemId)).filter(Boolean);
      const track = buildTrack(area, items);
      tracks.push({ track, area, items });
      const { winItem, targetIndex } = getRandomWin(activeCase);
      winData.push({ winItem, targetIndex });
    }

    const containerWidth = container.clientWidth || 700;
    const startTransitions = () => {
      tracks.forEach((t, idx) => {
        const { targetIndex } = winData[idx];
        animateTrack(t.track, targetIndex, activeCase.items.length, durationSec, containerWidth);
      });
    };
    requestAnimationFrame(() => { requestAnimationFrame(startTransitions); });

    const timeoutMs = durationSec * 1000 + 300;
    await new Promise(res => spinTimers.push(setTimeout(res, timeoutMs)));
    spinTimers = [];

    winData.forEach(d => {
      currentUser.inventory.push({ uid: Date.now()+Math.random().toString(36), itemId: d.winItem.id, acquired: new Date().toISOString() });
    });
    persist();
    document.getElementById('resultMessage').innerHTML = `✅ Открыто ${selectedQuantity} кейсов!`;
    isSpinning = false;
    enableButtons(true);
    updateBalance();
    renderInventoryView();
  }

  function getRandomWin(caseData) {
    const totalW = caseData.items.reduce((s,it)=>s+it.weight,0);
    let r = Math.random()*totalW;
    let entry = null;
    for(let e of caseData.items) { r-=e.weight; if(r<=0) { entry=e; break; } }
    const winItem = getItem(entry.itemId);
    const itemsCount = caseData.items.length;
    const totalElements = COPIES * itemsCount;
    const minIdx = SAFE_MARGIN * itemsCount;
    const maxIdx = totalElements - SAFE_MARGIN * itemsCount;
    const search = winItem.name.split('|')[0];
    const possible = [];
    for(let i=minIdx; i<maxIdx; i++) {
      const el = document.querySelectorAll('#multiRouletteContainer .items-track')?.[0]?.children?.[i];
      if(el && el.textContent.includes(search)) possible.push(i);
    }
    const targetIndex = possible.length ? possible[Math.floor(Math.random()*possible.length)] : Math.floor(Math.random()*(maxIdx-minIdx))+minIdx;
    return { winItem, targetIndex };
  }

  function enableButtons(enable) {
    document.getElementById('btnOpenNormal').disabled = !enable;
    document.getElementById('btnOpenFast').disabled = !enable;
    document.getElementById('qtyMinus').disabled = !enable;
    document.getElementById('qtyPlus').disabled = !enable;
  }

  // Upgrade
  let upgradeSelectedItem = null;
  let upgradeTargetItem = null;

  function renderUpgradeView() {
    const view = document.getElementById('upgradeView');
    if(!currentUser || currentUser.inventory.length===0) {
      view.innerHTML = '<p>Инвентарь пуст</p>'; return;
    }
    let html = '<h3>Выберите предмет для апгрейда</h3><div class="upgrade-select">';
    currentUser.inventory.forEach(inv => {
      const item = getItem(inv.itemId);
      html += `<div class="item-card rarity-${item.rarity}" onclick="window.selectUpgradeItem('${inv.uid}')" style="cursor:pointer;">
        <span style="font-size:30px;">${item.emoji}</span> ${item.name} (${item.price} ₽)
      </div>`;
    });
    html += '</div><div id="targetSelection" style="margin-top:20px;"></div>';
    html += '<div id="upgradeChanceDisplay" class="upgrade-chance"></div>';
    html += '<div class="controls"><button class="primary" id="startUpgradeNormal">🔄 Upgrade (3.5 сек)</button><button id="startUpgradeFast" style="background:#3a4050;">⚡ Fast (1 сек)</button></div>';
    view.innerHTML = html;
    if(upgradeSelectedItem) highlightSelected();
  }

  function selectUpgradeItem(uid) {
    upgradeSelectedItem = currentUser.inventory.find(i=>i.uid===uid);
    if(!upgradeSelectedItem) return;
    const currentItem = getItem(upgradeSelectedItem.itemId);
    const targets = ITEMS.filter(it => it.price > currentItem.price);
    const targetDiv = document.getElementById('targetSelection');
    targetDiv.innerHTML = '<h3>Выберите цель</h3><div class="upgrade-select">' + targets.map(t => `
      <div class="item-card rarity-${t.rarity}" onclick="window.selectUpgradeTarget('${t.id}')" style="cursor:pointer;">
        <span style="font-size:30px;">${t.emoji}</span> ${t.name} (${t.price} ₽)
      </div>
    `).join('') + '</div>';
    upgradeTargetItem = null;
    updateChanceDisplay();
  }

  function selectUpgradeTarget(itemId) {
    upgradeTargetItem = ITEMS.find(i=>i.id===itemId);
    updateChanceDisplay();
  }

  function updateChanceDisplay() {
    const display = document.getElementById('upgradeChanceDisplay');
    if(!upgradeSelectedItem || !upgradeTargetItem) { display.textContent = ''; return; }
    const cur = getItem(upgradeSelectedItem.itemId);
    const chance = Math.min(100, Math.round((cur.price / upgradeTargetItem.price)*100));
    display.textContent = `Шанс успеха: ${chance}%`;
  }

  function startUpgrade(durationSec) {
    if(!upgradeSelectedItem || !upgradeTargetItem || upgradeActive) return;
    const curItem = getItem(upgradeSelectedItem.itemId);
    const ratio = curItem.price / upgradeTargetItem.price;
    const chance = Math.min(1, ratio);
    const successCount = Math.round(chance * 100);
    const failCount = 100 - successCount;
    const template = [];
    for(let i=0; i<successCount; i++) template.push({ emoji: upgradeTargetItem.emoji, name: 'WIN', id: upgradeTargetItem.id });
    for(let i=0; i<failCount; i++) template.push({ emoji: '💔', name: 'LOSE', id: null });

    document.getElementById('upgradeModal').style.display = 'flex';
    const container = document.getElementById('upgradeRouletteContainer');
    container.innerHTML = '<div class="pointer"></div>';
    const track = buildTrack(container, template);
    const containerWidth = container.clientWidth;
    const totalElements = COPIES * 100;
    const targetIndex = Math.floor(Math.random() * totalElements);
    animateTrack(track, targetIndex, 100, durationSec, containerWidth);
    upgradeActive = true;

    setTimeout(() => {
      const win = template[targetIndex % 100].id !== null;
      if(win) {
        currentUser.inventory = currentUser.inventory.filter(i=>i.uid!==upgradeSelectedItem.uid);
        currentUser.inventory.push({ uid: Date.now()+Math.random().toString(36), itemId: upgradeTargetItem.id, acquired: new Date().toISOString() });
        document.getElementById('upgradeResultMessage').innerHTML = `✅ Успех! Получен ${upgradeTargetItem.emoji} ${upgradeTargetItem.name}`;
      } else {
        currentUser.inventory = currentUser.inventory.filter(i=>i.uid!==upgradeSelectedItem.uid);
        document.getElementById('upgradeResultMessage').innerHTML = '💔 Неудача. Предмет потерян.';
      }
      persist();
      updateBalance();
      renderInventoryView();
      renderUpgradeView();
      upgradeActive = false;
      upgradeSelectedItem = null;
      upgradeTargetItem = null;
    }, durationSec*1000+300);
  }

  function closeUpgradeModal() {
    if(upgradeActive) return;
    document.getElementById('upgradeModal').style.display = 'none';
  }

  window.selectUpgradeItem = selectUpgradeItem;
  window.selectUpgradeTarget = selectUpgradeTarget;

  // Общие функции
  function sellItem(uid) {
    if(!currentUser) return;
    const idx = currentUser.inventory.findIndex(i=>i.uid===uid);
    if(idx===-1) return;
    const item = getItem(currentUser.inventory[idx].itemId);
    currentUser.balance += item.price;
    currentUser.inventory.splice(idx,1);
    persist();
    updateBalance();
    renderInventoryView();
    renderUpgradeView();
  }
  window.sellItem = sellItem;

  function renderCasesView() {
    document.getElementById('casesView').innerHTML = '<div class="cases-grid">' + CASES.map(c=>`
      <div class="case-card" onclick="window.openCaseModal('${c.id}')">
        <div class="case-img">${c.image}</div><h3>${c.name}</h3><p>Цена: <strong>${c.price.toLocaleString()} ₽</strong></p>
      </div>
    `).join('') + '</div>';
  }

  function renderInventoryView() {
    const inv = document.getElementById('inventoryView');
    if(!currentUser || currentUser.inventory.length===0) { inv.innerHTML='<p>🎒 Инвентарь пуст</p>'; return; }
    inv.innerHTML = '<div class="inventory-grid">' + currentUser.inventory.map(inv=>{
      const item = getItem(inv.itemId);
      return `<div class="item-card rarity-${item.rarity}">
        <span style="font-size:30px;">${item.emoji}</span> ${item.name} (${item.price} ₽)
        <button onclick="window.sellItem('${inv.uid}')">Продать</button>
      </div>`;
    }).join('') + '</div>';
  }

  function updateBalance() {
    document.getElementById('balanceValue').textContent = currentUser ? currentUser.balance.toLocaleString() : 0;
  }

  function refreshAll() {
    document.getElementById('authBlock').innerHTML = currentUser ? `<span>👤 ${currentUser.username}</span> <button class="danger" onclick="logout()">Выйти</button>` : '';
    document.getElementById('loginPanel').style.display = currentUser ? 'none' : 'block';
    document.getElementById('mainUI').style.display = currentUser ? 'block' : 'none';
    if(!currentUser) {
      document.getElementById('loginPanel').innerHTML = `<input id="usernameInput" placeholder="Никнейм"><button class="primary" onclick="login(document.getElementById('usernameInput').value.trim())">Войти</button>`;
      return;
    }
    updateBalance();
    renderCasesView();
    renderInventoryView();
    renderUpgradeView();
  }

  document.getElementById('tabCases').addEventListener('click', ()=>{
    document.getElementById('casesView').style.display='block';
    document.getElementById('inventoryView').style.display='none';
    document.getElementById('upgradeView').style.display='none';
    document.getElementById('tabCases').classList.add('active');
    document.getElementById('tabInventory').classList.remove('active');
    document.getElementById('tabUpgrade').classList.remove('active');
  });
  document.getElementById('tabInventory').addEventListener('click', ()=>{
    document.getElementById('casesView').style.display='none';
    document.getElementById('inventoryView').style.display='block';
    document.getElementById('upgradeView').style.display='none';
    document.getElementById('tabInventory').classList.add('active');
    document.getElementById('tabCases').classList.remove('active');
    document.getElementById('tabUpgrade').classList.remove('active');
    renderInventoryView();
  });
  document.getElementById('tabUpgrade').addEventListener('click', ()=>{
    document.getElementById('casesView').style.display='none';
    document.getElementById('inventoryView').style.display='none';
    document.getElementById('upgradeView').style.display='block';
    document.getElementById('tabUpgrade').classList.add('active');
    document.getElementById('tabCases').classList.remove('active');
    document.getElementById('tabInventory').classList.remove('active');
    renderUpgradeView();
  });

  document.getElementById('qtyMinus').addEventListener('click', ()=>{ if(selectedQuantity>1) selectedQuantity--; updateQuantityDisplay(); });
  document.getElementById('qtyPlus').addEventListener('click', ()=>{ if(selectedQuantity<9) selectedQuantity++; updateQuantityDisplay(); });
  document.getElementById('btnOpenNormal').addEventListener('click', ()=> openMultiple(6));
  document.getElementById('btnOpenFast').addEventListener('click', ()=> openMultiple(2));
  document.getElementById('btnCloseModal').addEventListener('click', ()=>{ if(!isSpinning) document.getElementById('caseModal').style.display='none'; });
  document.getElementById('btnCloseUpgradeModal').addEventListener('click', closeUpgradeModal);
  document.addEventListener('click', e => {
    if(e.target.id === 'startUpgradeNormal') startUpgrade(3.5);
    if(e.target.id === 'startUpgradeFast') startUpgrade(1);
  });

  window.openCaseModal = (id) => { const c = CASES.find(c=>c.id===id); if(c) openCaseModal(c); };

  const saved = localStorage.getItem(CURRENT_KEY);
  if(saved) { const users = getUsers(); if(users[saved]) currentUser = { username:saved, balance:users[saved].balance, inventory:users[saved].inventory||[] }; }
  refreshAll();
})();
</script>
</body>
</html>
