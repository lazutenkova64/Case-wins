<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>case-wins · Классический раунд & 1 на 1</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --bg: #06080c;
            --panel: #0f1219;
            --card: #161b24;
            --gold: #f0b34b;
            --accent: #252b38;
            --text: #c8cdd8;
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: var(--bg);
            font-family: 'Segoe UI', 'Inter', system-ui, sans-serif;
            color: var(--text);
            width: 100vw;
            min-height: 100vh;
            overflow-y: auto;
            overflow-x: hidden;
            display: flex;
        }
        .app {
            display: flex;
            width: 100%;
            min-height: 100vh;
            gap: 6px;
            padding: 6px;
        }
        .sidebar {
            width: 200px;
            background: var(--panel);
            border-radius: 18px;
            padding: 14px 10px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            border: 1px solid #252b38;
            flex-shrink: 0;
            position: sticky;
            top: 6px;
            align-self: flex-start;
            height: fit-content;
            max-height: calc(100vh - 12px);
        }
        .profile {
            display: flex;
            align-items: center;
            gap: 10px;
            background: #1a1f2b;
            padding: 10px;
            border-radius: 24px;
            cursor: pointer;
            transition: background 0.2s;
            position: relative;
        }
        .profile:hover {
            background: #252b38;
        }
        .avatar-circle {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            background: var(--gold);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            flex-shrink: 0;
        }
        .nav-btn {
            background: #1a1f2b;
            border: none;
            color: var(--text);
            padding: 10px 14px;
            border-radius: 22px;
            cursor: pointer;
            text-align: left;
            font-weight: 600;
            font-size: 13px;
        }
        .nav-btn.active {
            background: var(--gold);
            color: #000;
        }
        .main-area {
            flex: 1;
            display: flex;
            gap: 8px;
            min-width: 0;
            align-items: flex-start;
        }
        .classic-section {
            flex: 1;
            background: var(--card);
            border-radius: 22px;
            padding: 14px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            border: 1px solid #2a3140;
            min-width: 0;
        }
        .classic-header {
            text-align: center;
            font-weight: 700;
            font-size: 15px;
        }
        .bank-display {
            text-align: center;
            font-size: 18px;
            font-weight: 800;
            color: var(--gold);
        }
        .balance-display {
            font-size: 14px;
            font-weight: 700;
            color: #3acf6e;
        }
        .place-bet-btn {
            width: 100%;
            background: var(--gold);
            border: none;
            color: #000;
            font-weight: 800;
            padding: 12px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 15px;
        }
        .place-bet-btn:disabled {
            background: #5c6170;
            color: #222;
            cursor: not-allowed;
        }
        .roulette-wrapper {
            position: relative;
            height: 70px;
            background: transparent;
            border-radius: 16px;
            overflow: hidden;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px solid #252b38;
        }
        .timer-strip-bg {
            position: absolute;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background: #0d1119;
            z-index: 0;
            border-radius: 14px;
            overflow: hidden;
        }
        .timer-strip-fill {
            position: absolute;
            left: 0;
            top: 0;
            height: 100%;
            width: 100%;
            background: linear-gradient(90deg, #f0b34b, #e6953c, #c77a28);
            z-index: 1;
            border-radius: 14px 0 0 14px;
            transition: width 0.95s cubic-bezier(0.25, 0.1, 0.15, 1.0);
            box-shadow: inset 0 0 30px rgba(255, 200, 100, 0.35), 0 0 25px rgba(240, 179, 75, 0.45);
        }
        .timer-strip-glow {
            position: absolute;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background: transparent;
            z-index: 2;
            pointer-events: none;
            border-radius: 14px;
            box-shadow: inset 0 0 60px rgba(240, 179, 75, 0.2);
        }
        .timer-display {
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            z-index: 10;
            font-weight: 900;
            font-size: 28px;
            color: #fff;
            text-shadow: 0 0 20px rgba(0, 0, 0, 0.9), 0 0 8px rgba(240, 179, 75, 0.8);
            pointer-events: none;
            letter-spacing: 2px;
        }
        .roulette-arrow-top {
            position: absolute;
            left: 50%;
            top: -22px;
            transform: translateX(-50%);
            font-size: 32px;
            color: #f0b34b;
            z-index: 30;
            pointer-events: none;
            text-shadow: 0 0 15px black, 0 0 10px rgba(240, 179, 75, 0.9);
            filter: drop-shadow(0 0 8px rgba(0,0,0,0.8));
            display: none;
        }
        .roulette-arrow-above {
            position: absolute;
            left: 50%;
            top: -22px;
            transform: translateX(-50%);
            font-size: 32px;
            color: #f0b34b;
            z-index: 30;
            pointer-events: none;
            text-shadow: 0 0 15px black, 0 0 10px rgba(240, 179, 75, 0.9);
            filter: drop-shadow(0 0 8px rgba(0,0,0,0.8));
            display: none;
        }
        .ticker-viewport {
            width: 100%;
            height: 100%;
            overflow: hidden;
            position: relative;
            display: flex;
            align-items: center;
            z-index: 3;
        }
        .ticker-track {
            display: flex;
            gap: 4px;
            position: absolute;
            left: 0;
            will-change: transform;
        }
        .ticket-avatar-small {
            width: 55px;
            height: 55px;
            background: #1e2432;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 26px;
            border: 2px solid #3a4052;
            flex-shrink: 0;
        }
        .winner-avatar-center {
            width: 70px;
            height: 70px;
            background: #1e2432;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 34px;
            border: 3px solid #f0b34b;
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            z-index: 15;
            box-shadow: 0 0 30px rgba(240, 179, 75, 0.8), 0 0 60px rgba(240, 179, 75, 0.4);
        }
        .bets-table {
            display: flex;
            flex-direction: column;
            gap: 6px;
            max-height: 300px;
            overflow-y: auto;
        }
        .bet-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: #1a1f2b;
            border-radius: 14px;
            padding: 8px 12px;
        }
        .bet-user {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .onevsone-section {
            flex: 1;
            background: var(--card);
            border-radius: 22px;
            padding: 14px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            border: 1px solid #2a3140;
            min-width: 0;
        }
        .rooms-scroll {
            display: flex;
            flex-direction: column;
            gap: 8px;
            max-height: 500px;
            overflow-y: auto;
        }
        .room-card {
            background: #1a1f2b;
            border-radius: 16px;
            padding: 12px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            border: 1px solid #2f3748;
        }
        .room-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 6px;
        }
        .btn {
            background: #f0b34b;
            border: none;
            color: #000;
            font-weight: 700;
            padding: 7px 16px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 12px;
        }
        .btn:disabled {
            background: #5c6170;
            color: #222;
            cursor: not-allowed;
        }
        .inventory-panel {
            width: 200px;
            background: var(--panel);
            border-radius: 18px;
            padding: 14px 10px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            border: 1px solid #252b38;
            flex-shrink: 0;
            position: sticky;
            top: 6px;
            align-self: flex-start;
            height: fit-content;
            max-height: calc(100vh - 12px);
        }
        .inv-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 6px;
        }
        .inv-slot {
            aspect-ratio: 1;
            background: #1a1f2b;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
        }
        .bet-input-inv {
            background: #1a1f2b;
            border: 1px solid #353d4e;
            padding: 8px;
            border-radius: 15px;
            color: white;
            text-align: center;
            font-weight: bold;
        }
        .bet-input-inv::-webkit-inner-spin-button,
        .bet-input-inv::-webkit-outer-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
        .bet-input-inv[type=number] {
            -moz-appearance: textfield;
        }
        .spectator-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(0, 0, 0, 0.9);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 100;
        }
        .spectator-card {
            background: #161b24;
            border-radius: 28px;
            padding: 24px;
            width: 90%;
            max-width: 550px;
            border: 2px solid #f0b34b;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .spec-bet-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: #1e2432;
            border-radius: 14px;
            padding: 10px 14px;
            flex-wrap: wrap;
            gap: 6px;
        }
        .auth-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(0, 0, 0, 0.95);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 200;
        }
        .auth-card {
            background: #161b24;
            border-radius: 20px;
            padding: 30px;
            width: 90%;
            max-width: 400px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            border: 1px solid #f0b34b;
        }
        .auth-input {
            background: #1a1f2b;
            border: 1px solid #353d4e;
            padding: 12px;
            border-radius: 10px;
            color: white;
            font-size: 16px;
        }
        .profile-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(0, 0, 0, 0.8);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 150;
        }
        .profile-modal-content {
            background: #161b24;
            border-radius: 20px;
            padding: 25px;
            width: 90%;
            max-width: 350px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            border: 1px solid #f0b34b;
        }
        .avatar-selector {
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
        }
        .avatar-option {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            cursor: pointer;
            border: 2px solid transparent;
            background: #1a1f2b;
            transition: border-color 0.2s;
        }
        .avatar-option.selected {
            border-color: #f0b34b;
        }
        .avatar-option:hover {
            border-color: #f0b34b;
        }
        @keyframes pulse-gold {
            0%,
            100% {
                box-shadow: 0 0 30px rgba(240, 179, 75, 0.8), 0 0 60px rgba(240, 179, 75, 0.4);
            }
            50% {
                box-shadow: 0 0 50px rgba(240, 179, 75, 1), 0 0 90px rgba(240, 179, 75, 0.7);
            }
        }
        .winner-avatar-center {
            animation: pulse-gold 0.8s ease-in-out infinite;
        }
        .auth-error {
            color: #ff4444;
            font-size: 14px;
            text-align: center;
            display: none;
            padding: 8px;
            background: rgba(255, 68, 68, 0.1);
            border-radius: 8px;
        }
        .auth-error.show {
            display: block;
        }
    </style>
</head>
<body>
    <div id="authContainer"></div>
    <div class="app" id="mainApp" style="display:none;">
        <div class="sidebar">
            <div class="profile" id="profileButton">
                <span class="avatar-circle" id="profileAvatar">🐺</span>
                <div>
                    <div id="profileName">PlayerOne</div>

            </div>
            <button class="nav-btn active">🏠 Главная</button>
            <button class="nav-btn">📜 История</button>
        </div>
        <div class="main-area">
            <div class="classic-section" id="classicBlock">
                <div class="classic-header">🏆 КЛАССИЧЕСКИЙ РАУНД</div>
                <div class="bank-display" id="classicBankDisplay">Банк: 0</div>
                <button class="place-bet-btn" id="classicPlaceBetBtn">🎯 ПОСТАВИТЬ</button>
                <div class="roulette-wrapper" id="rouletteWrapper">
                    <div class="roulette-arrow-above" id="rouletteArrowAbove">▼</div>
                    <div class="timer-strip-bg">
                        <div class="timer-strip-fill" id="timerStripFill"></div>

                    </div>
                    <div class="timer-display" id="classicTimerDisplay">⏳ 3</div>
                    <div class="roulette-arrow-top" id="rouletteArrowTop" style="display:none;">▼</div>
                    <div class="ticker-viewport" id="tickerViewport">
                        <div class="ticker-track" id="tickerTrack"></div>
                    </div>
                </div>
                <div class="bets-table" id="betsTable"></div>
            </div>
            <div class="onevsone-section">
                <div style="display:flex;justify-content:space-between;align-items:center;">
                    <h3>🎲 1 НА 1</h3>
                    <button class="btn" id="createRoomBtn">+ Создать</button>
                </div>
                <div class="rooms-scroll" id="roomsList"></div>
            </div>
        </div>
        <div class="inventory-panel">
            <h3>🎒 Инвентарь</h3>
            <div class="inv-grid">
                <div class="inv-slot">🔹</div>
                <div class="inv-slot">🔹</div>
                <div class="inv-slot">🔹</div>
                <div class="inv-slot">🔹</div>
            </div>
            <div>💰 Скины: 0</div>
            <button class="btn">Купить</button>
            <button class="btn" style="background:#3e4455;">Продать</button>
            <input type="number" class="bet-input-inv" id="classicBetInput" value="5" min="1" placeholder="Сумма ставки">
            <span style="font-size:10px;color:#7f8690;text-align:center;">Ставка для классики и 1 на 1</span>
        </div>
    </div>
    <div id="spectatorContainer"></div>
    <div id="profileModalContainer"></div>

    <script>
        (function() {
            const SUPABASE_URL = 'https://jwjbjdzncshylthzbwtq.supabase.co';
            const SUPABASE_ANON_KEY = 'sb_publishable_xCVgHMfqaAI5BH7kcYuNbQ_KYZdAoRO';
            const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

            const AVAILABLE_AVATARS = ['🐺', '🦊', '🐱', '👑', '🐲', '🦁', '🐯', '🐻', '🐼', '🐨', '🐸', '🦄', '🐙', '🦑', '🐋', '🦈'];

            const state = {
                user: null,
                classicBets: [],
                classicTimer: 3,
                classicInterval: null,
                classicSpinning: false,
                rooms: [],
                nextRoomId: 1,
                roomAnimations: {},
                classicChannel: null,
                roomsChannel: null,
                balanceChannel: null,
                avatarChannel: null,
                isInGame: false
            };

            const elements = {
                profileAvatar: document.getElementById('profileAvatar'),
                profileName: document.getElementById('profileName'),
                sidebarBalance: document.getElementById('sidebarBalance'),
                classicBankDisplay: document.getElementById('classicBankDisplay'),
                classicTimerDisplay: document.getElementById('classicTimerDisplay'),
                classicPlaceBetBtn: document.getElementById('classicPlaceBetBtn'),
                classicBetInput: document.getElementById('classicBetInput'),
                tickerTrack: document.getElementById('tickerTrack'),
                tickerViewport: document.getElementById('tickerViewport'),
                rouletteArrowTop: document.getElementById('rouletteArrowTop'),
                rouletteArrowAbove: document.getElementById('rouletteArrowAbove'),
                timerStripFill: document.getElementById('timerStripFill'),
                betsTable: document.getElementById('betsTable'),
                roomsList: document.getElementById('roomsList'),
                spectatorContainer: document.getElementById('spectatorContainer'),
                authContainer: document.getElementById('authContainer'),
                mainApp: document.getElementById('mainApp'),
                profileModalContainer: document.getElementById('profileModalContainer'),
                createRoomBtn: document.getElementById('createRoomBtn'),
                profileButton: document.getElementById('profileButton')
            };

            function totalBank() { return state.classicBets.reduce(function(s, b) { return s + b.amount; }, 0); }

            function buildTicketArray(bets) {
                var tickets = [];
                bets.forEach(function(b) { for (var i = 0; i < b.amount; i++) tickets.push(b.user.avatar); });
                if (!tickets.length) tickets.push('❓');
                return tickets;
            }

            function updateTimerStrip(seconds) {
                var maxTime = 3;
                var percent = Math.max(0, (seconds / maxTime) * 100);
                elements.timerStripFill.style.width = percent + '%';
            }

            function updateBalanceDisplay() {
                if (state.user) elements.sidebarBalance.textContent = '💰 ' + state.user.balance;
            }

            function checkIsInGame() {
                var userInClassic = state.classicBets.some(function(b) { return b.user.id === state.user.id; });
                var userInRoom = state.rooms.some(function(r) {
                    return (r.creator.id === state.user.id || (r.opponent && r.opponent.id === state.user.id)) && r.status !== 'finished';
                });
                state.isInGame = userInClassic || userInRoom || state.classicSpinning;
            }

            function updateUI() {
                if (!state.user) return;
                elements.profileAvatar.textContent = state.user.avatar;
                elements.profileName.textContent = state.user.username;
                updateBalanceDisplay();
                elements.classicBankDisplay.textContent = 'Банк: ' + totalBank();
                checkIsInGame();
                renderBetsTable();
                renderRooms();
                if (!state.classicSpinning && !state.classicInterval) {
                    updateTimerStrip(3);
                    elements.classicTimerDisplay.textContent = '⏳ 3';
                }
            }

            function renderBetsTable() {
                var totalBankValue = totalBank() || 1;
                var userBetsMap = new Map();
                state.classicBets.forEach(function(b) {
                    var key = b.user.id;
                    if (userBetsMap.has(key)) {
                        userBetsMap.get(key).totalAmount += b.amount;
                    } else {
                        userBetsMap.set(key, { user: b.user, totalAmount: b.amount });
                    }
                });
                var aggregatedBets = [];
                userBetsMap.forEach(function(v) { aggregatedBets.push(v); });

                elements.betsTable.innerHTML = aggregatedBets.map(function(b) {
                    var percent = ((b.totalAmount / totalBankValue) * 100).toFixed(1);
                    var isCurrentUser = state.user && b.user.id === state.user.id;
                    return '<div class="bet-row" style="' + (isCurrentUser ? 'border: 1px solid #f0b34b;' : '') + '">' +
                        '<div class="bet-user">' +
                        '<span class="avatar-circle" style="width:30px;height:30px;font-size:16px;">' + b.user.avatar + '</span> ' +
                        '<span>' + b.user.username + (isCurrentUser ? ' (Вы)' : '') + '</span>' +
                        '</div>' +
                        '<span>' + b.totalAmount + '💰</span>' +
                        '<span>Билеты: ' + b.totalAmount + '</span>' +
                        '<span style="color:#f0b34b;font-weight:bold;">' + percent + '%</span>' +
                        '</div>';
                }).join('');
            }

            function animateRoulette(trackElement, viewportElement, arrowElement, tickets, winnerAvatar, callback) {
                if (state.roomAnimations[trackElement.id]) cancelAnimationFrame(state.roomAnimations[trackElement.id]);
                trackElement.innerHTML = '';
                var allTickets = [];
                for (var i = 0; i < 40; i++) tickets.forEach(function(av) { allTickets.push(av); });
                allTickets.forEach(function(av) {
                    var el = document.createElement('div');
                    el.className = 'ticket-avatar-small';
                    el.textContent = av;
                    trackElement.appendChild(el);
                });
                var pos = 0;
                var speed = 0.5;
                var startTime = Date.now();

                function step() {
                    var elapsed = Date.now() - startTime;
                    if (elapsed < 2000) {
                        speed = 0.5 + (elapsed / 2000) * 4;
                    } else if (elapsed < 5000) {
                        speed = 4.5;
                    } else if (elapsed < 15000) {
                        speed = 4.5 * (1 - (elapsed - 5000) / 10000);
                    } else {
                        var winnerEl = document.createElement('div');
                        winnerEl.className = 'winner-avatar-center';
                        winnerEl.textContent = winnerAvatar;
                        viewportElement.appendChild(winnerEl);
                        if (arrowElement) arrowElement.style.display = 'block';
                        if (callback) setTimeout(callback, 3000);
                        return;
                    }
                    pos -= speed;
                    trackElement.style.transform = 'translateX(' + pos + 'px)';
                    state.roomAnimations[trackElement.id] = requestAnimationFrame(step);
                }
                state.roomAnimations[trackElement.id] = requestAnimationFrame(step);
            }

            async function placeBetClassic() {
                if (state.classicSpinning || !state.user) return;
                var amt = parseInt(elements.classicBetInput.value, 10);
                if (isNaN(amt) || amt <= 0) return alert('Введите сумму ставки');
                if (state.user.balance < amt) return alert('Недостаточно монет');

                elements.classicPlaceBetBtn.disabled = true;
                var newBalance = state.user.balance - amt;

                var updateResult = await supabase
                    .from('users')
                    .update({ balance: newBalance })
                    .eq('id', state.user.id);

                if (updateResult.error) {
                    console.error('Ошибка баланса:', updateResult.error);
                    elements.classicPlaceBetBtn.disabled = false;
                    return alert('Ошибка обновления баланса');
                }

                var betResult = await supabase
                    .from('bets')
                    .insert([{
                        user_id: state.user.id,
                        user_name: state.user.username,
                        user_avatar: state.user.avatar,
                        amount: amt,
                        game_type: 'classic',
                        status: 'active'
                    }])
                    .select();

                if (betResult.error) {
                    console.error('Ошибка ставки:', betResult.error);
                    await supabase.from('users').update({ balance: state.user.balance }).eq('id', state.user.id);
                    elements.classicPlaceBetBtn.disabled = false;
                    return alert('Ошибка размещения ставки');
                }

                state.user.balance = newBalance;
                updateBalanceDisplay();

                if (betResult.data && betResult.data[0]) {
                    state.classicBets.push({
                        id: betResult.data[0].id,
                        user: {
                            id: state.user.id,
                            username: state.user.username,
                            avatar: state.user.avatar
                        },
                        amount: amt
                    });
                }

                elements.classicPlaceBetBtn.disabled = false;
                updateUI();

                if (state.classicBets.length >= 2 && !state.classicInterval && !state.classicSpinning) {
                    startClassicCountdown();
                }
            }

            function startClassicCountdown() {
                if (state.classicBets.length < 2) return;
                clearClassicInterval();
                state.classicTimer = 3;
                elements.classicTimerDisplay.textContent = '⏳ ' + state.classicTimer;
                updateTimerStrip(state.classicTimer);
                state.classicInterval = setInterval(function() {
                    state.classicTimer--;
                    elements.classicTimerDisplay.textContent = '⏳ ' + state.classicTimer;
                    updateTimerStrip(state.classicTimer);
                    if (state.classicTimer <= 0) {
                        clearClassicInterval();
                        runClassicGame();
                    }
                }, 1000);
            }

            async function runClassicGame() {
                state.classicSpinning = true;
                elements.classicPlaceBetBtn.disabled = true;
                updateTimerStrip(0);
                elements.classicTimerDisplay.style.display = 'none';
                elements.rouletteArrowAbove.style.display = 'none';
                elements.rouletteArrowTop.style.display = 'block';
                var tickets = buildTicketArray(state.classicBets);
                var allUsers = [];
                state.classicBets.forEach(function(b) { for (var i = 0; i < b.amount; i++) allUsers.push(b.user); });
                var winner = allUsers[Math.floor(Math.random() * allUsers.length)];

                animateRoulette(elements.tickerTrack, elements.tickerViewport, elements.rouletteArrowTop, tickets, winner.avatar, async function() {
                    var bank = totalBank();

                    var betIds = state.classicBets.map(function(b) { return b.id; });
                    await supabase
                        .from('bets')
                        .update({ status: 'completed', is_winner: false })
                        .in('id', betIds);

                    var winnerIds = state.classicBets.filter(function(b) { return b.user.id === winner.id; }).map(function(b) { return b.id; });
                    if (winnerIds.length) {
                        await supabase
                            .from('bets')
                            .update({ is_winner: true, won_amount: bank })
                            .in('id', winnerIds);
                    }

                    if (winner.id === state.user.id) {
                        var newBalance = state.user.balance + bank;
                        await supabase.from('users').update({ balance: newBalance }).eq('id', state.user.id);
                        state.user.balance = newBalance;
                    }

                    state.classicBets = [];
                    state.classicSpinning = false;
                    elements.classicPlaceBetBtn.disabled = false;
                    elements.classicTimerDisplay.style.display = 'block';
                    elements.classicTimerDisplay.textContent = '⏳ 3';
                    updateTimerStrip(3);
                    elements.rouletteArrowTop.style.display = 'none';
                    elements.rouletteArrowAbove.style.display = 'none';
                    var ew = document.querySelector('#tickerViewport .winner-avatar-center');
                    if (ew) ew.remove();
                    elements.tickerTrack.innerHTML = '';
                    elements.tickerTrack.style.transform = 'translateX(0px)';
                    updateBalanceDisplay();
                    updateUI();
                });
            }

            function clearClassicInterval() {
                if (state.classicInterval) { clearInterval(state.classicInterval);
                    state.classicInterval = null; }
            }

            elements.classicPlaceBetBtn.addEventListener('click', placeBetClassic);

            async function createRoom() {
                if (!state.user) return;
                var bet = parseInt(elements.classicBetInput.value, 10);
                if (!bet || bet <= 0 || state.user.balance < bet) {
                    return alert(state.user.balance < bet ? 'Недостаточно средств' : 'Введите сумму ставки');
                }

                var newBalance = state.user.balance - bet;
                var updateResult = await supabase
                    .from('users')
                    .update({ balance: newBalance })
                    .eq('id', state.user.id);

                if (updateResult.error) return alert('Ошибка обновления баланса');

                state.user.balance = newBalance;
                updateBalanceDisplay();

                var roomId = Date.now();
                var betResult = await supabase
                    .from('bets')
                    .insert([{
                        user_id: state.user.id,
                        user_name: state.user.username,
                        user_avatar: state.user.avatar,
                        amount: bet,
                        game_type: '1v1',
                        room_id: roomId,
                        status: 'active'
                    }])
                    .select();

                if (betResult.error) {
                    await supabase.from('users').update({ balance: state.user.balance + bet }).eq('id', state.user.id);
                    state.user.balance += bet;
                    updateBalanceDisplay();
                    return alert('Ошибка создания комнаты: ' + betResult.error.message);
                }

                state.rooms.push({
                    id: roomId,
                    creator: { id: state.user.id, username: state.user.username, avatar: state.user.avatar },
                    bet: bet,
                    opponent: null,
                    status: 'waiting',
                    timer: 3,
                    intervalId: null,
                    winner: null,
                    trackId: 'rt' + roomId,
                    viewportId: 'rv' + roomId,
                    arrowId: 'ra' + roomId,
                    arrowAboveId: 'raa' + roomId,
                    betIds: betResult.data ? [betResult.data[0].id] : []
                });
                updateUI();
                alert('Комната создана! Ожидайте соперника.');
            }

            async function joinRoom(roomId) {
                if (!state.user) return;
                var room = state.rooms.find(function(r) { return r.id === roomId; });
                if (!room || room.status !== 'waiting' || room.creator.id === state.user.id) return;
                if (state.user.balance < room.bet) return alert('Недостаточно монет');

                var newBalance = state.user.balance - room.bet;
                var updateResult = await supabase
                    .from('users')
                    .update({ balance: newBalance })
                    .eq('id', state.user.id);
                if (updateResult.error) return alert('Ошибка баланса');

                state.user.balance = newBalance;
                updateBalanceDisplay();

                var betResult = await supabase
                    .from('bets')
                    .insert([{
                        user_id: state.user.id,
                        user_name: state.user.username,
                        user_avatar: state.user.avatar,
                        amount: room.bet,
                        game_type: '1v1',
                        room_id: roomId,
                        status: 'active'
                    }])
                    .select();

                if (betResult.error) {
                    await supabase.from('users').update({ balance: state.user.balance + room.bet }).eq('id', state.user.id);
                    state.user.balance += room.bet;
                    updateBalanceDisplay();
                    return alert('Ошибка присоединения');
                }

                room.opponent = { id: state.user.id, username: state.user.username, avatar: state.user.avatar };
                if (betResult.data) room.betIds.push(betResult.data[0].id);
                room.status = 'countdown';
                room.timer = 3;
                startRoomCountdown(room);
                updateUI();
            }

            function startRoomCountdown(room) {
                clearRoomInterval(room);
                room.intervalId = setInterval(function() {
                    room.timer--;
                    updateUI();
                    if (room.timer <= 0) {
                        clearRoomInterval(room);
                        runRoomGame(room);
                    }
                }, 1000);
            }

            async function runRoomGame(room) {
                room.status = 'spinning';
                updateUI();
                var tickets = buildTicketArray([
                    { user: room.creator, amount: room.bet },
                    { user: room.opponent, amount: room.bet }
                ]);
                var allUsers = [];
                for (var i = 0; i < room.bet; i++) allUsers.push(room.creator);
                for (var i = 0; i < room.bet; i++) allUsers.push(room.opponent);
                var winner = allUsers[Math.floor(Math.random() * allUsers.length)];
                room.winner = winner;

                setTimeout(function() {
                    var trackEl = document.getElementById(room.trackId);
                    var viewportEl = document.getElementById(room.viewportId);
                    var arrowEl = document.getElementById(room.arrowId);
                    var arrowAboveEl = document.getElementById(room.arrowAboveId);
                    if (trackEl && viewportEl) {
                        if (arrowEl) arrowEl.style.display = 'block';
                        if (arrowAboveEl) arrowAboveEl.style.display = 'block';
                        animateRoulette(trackEl, viewportEl, arrowEl, tickets, winner.avatar, async function() {
                            room.status = 'finished';

                            await supabase
                                .from('bets')
                                .update({ status: 'completed', is_winner: false })
                                .in('id', room.betIds);

                            await supabase
                                .from('bets')
                                .update({ is_winner: true, won_amount: room.bet * 2 })
                                .eq('room_id', room.id)
                                .eq('user_id', winner.id);

                            if (room.winner.id === state.user.id) {
                                var newBalance = state.user.balance + room.bet * 2;
                                await supabase.from('users').update({ balance: newBalance }).eq('id', state.user.id);
                                state.user.balance = newBalance;
                            }
                            updateBalanceDisplay();
                            updateUI();
                            setTimeout(function() {
                                if (arrowAboveEl) arrowAboveEl.style.display = 'none';
                                state.rooms = state.rooms.filter(function(r) { return r.id !== room.id; });
                                updateUI();
                            }, 5000);
                        });
                    }
                }, 100);
            }

            function clearRoomInterval(room) { if (room.intervalId) { clearInterval(room.intervalId);
                    room.intervalId = null; } }

            function renderRooms() {
                elements.roomsList.innerHTML = state.rooms.length ? '' : '<div style="color:#7f8690;">Нет комнат</div>';
                state.rooms.forEach(function(room) {
                    var d = document.createElement('div');
                    d.className = 'room-card';
                    var isCreator = state.user && room.creator.id === state.user.id;
                    var isInitiator = state.user && room.opponent && room.opponent.id === state.user.id;
                    var canJoin = !isCreator && !isInitiator && room.status === 'waiting';
                    d.innerHTML =
                        '<div class="room-header">' +
                        '<div>' +
                        '<span>' + room.creator.avatar + '</span> ' +
                        '<strong>' + room.creator.username + (isCreator ? ' (Вы)' : '') + '</strong> ' +
                        '(' + room.bet + '💰)' +
                        (room.opponent ? ' VS <span>' + room.opponent.avatar + '</span> <strong>' + room.opponent.username + (isInitiator ? ' (Вы)' : '') + '</strong>' : '') +
                        '</div>' +
                        '<div style="display:flex;gap:6px;align-items:center;">' +
                        '<span style="font-size:12px;">' + (room.status === 'waiting' ? '⏳ Ожидание' : room.status === 'countdown' ? '🔴 ' + room.timer + 'с' : room.status === 'spinning' ? '🎰 Крутим...' : '✅ Завершено') + '</span>' +
                        '<button class="btn join-btn" data-id="' + room.id + '" ' + (!canJoin ? 'disabled' : '') + '>⚔️ Играть</button>' +
                        '<button class="btn watch-btn" data-id="' + room.id + '" style="background:#4a5068;">👁</button>' +
                        '</div>' +
                        '</div>' +
                        '<div class="roulette-wrapper" style="height:70px;border:1px solid #2f3748;">' +
                        '<div class="roulette-arrow-above" id="' + room.arrowAboveId + '" style="display:' + (room.status === 'spinning' ? 'block' : 'none') + ';">▼</div>' +
                        '<div class="roulette-arrow-top" id="' + room.arrowId + '" style="display:' + (room.status === 'spinning' ? 'block' : 'none') + ';">▼</div>' +
                        '<div class="ticker-viewport" id="' + room.viewportId + '">' +
                        '<div class="ticker-track" id="' + room.trackId + '"></div>' +
                        '</div>' +
                        '</div>';
                    elements.roomsList.appendChild(d);
                });

                document.querySelectorAll('.join-btn').forEach(function(b) {
                    b.addEventListener('click', function(e) { joinRoom(Number(e.target.dataset.id)); });
                });
                document.querySelectorAll('.watch-btn').forEach(function(b) {
                    b.addEventListener('click', function(e) {
                        var room = state.rooms.find(function(r) { return r.id === Number(e.target.dataset.id); });
                        if (room) openSpectator(room);
                    });
                });
            }

            function openSpectator(room) {
                var totalBet = room.bet * 2;
                elements.spectatorContainer.innerHTML =
                    '<div class="spectator-overlay"><div class="spectator-card">' +
                    '<h2>👁 Комната #' + room.id + '</h2>' +
                    '<div class="spec-bet-row">' +
                    '<div class="bet-user"><span class="avatar-circle" style="width:30px;height:30px;font-size:16px;">' + room.creator.avatar + '</span> ' + room.creator.username + '</div>' +
                    '<span>' + room.bet + '</span>' +
                    '<span>Билеты: 1-' + room.bet + '</span>' +
                    '<span style="color:#f0b34b;">' + ((room.bet / totalBet) * 100).toFixed(1) + '%</span>' +
                    '</div>' +
                    (room.opponent ? '<div class="spec-bet-row">' +
                        '<div class="bet-user"><span class="avatar-circle" style="width:30px;height:30px;font-size:16px;">' + room.opponent.avatar + '</span> ' + room.opponent.username + '</div>' +
                        '<span>' + room.bet + '</span>' +
                        '<span>Билеты: ' + (room.bet + 1) + '-' + (room.bet * 2) + '</span>' +
                        '<span style="color:#f0b34b;">' + ((room.bet / totalBet) * 100).toFixed(1) + '%</span>' +
                        '</div>' : '<div style="color:#7f8690;">Ожидание второго игрока...</div>') +
                    '<button class="btn" onclick="this.parentElement.parentElement.remove()">Закрыть</button>' +
                    '</div></div>';
            }

            function showProfileModal() {
                var currentAvatar = state.user ? state.user.avatar : '🐺';
                var canChangeAvatar = !state.isInGame;
                elements.profileModalContainer.innerHTML =
                    '<div class="profile-modal" id="profileModalOverlay">' +
                    '<div class="profile-modal-content">' +

                    '<div style="text-align:center;">' +
                    '<div style="font-size:60px;margin:10px 0;" id="profileModalAvatar">' + currentAvatar + '</div>' +
                    '<h3>' + (state.user ? state.user.username : '') + '</h3>' +
                    '<p style="color:#3acf6e;">💰 Баланс: ' + (state.user ? state.user.balance : 0) + '</p>' +
                    (state.isInGame ? '<p style="color:#ffaa00;">🔒 Аватар заблокирован во время игры</p>' : '') +

                    AVAILABLE_AVATARS.map(function(av) { return '<div class="avatar-option' + (av === currentAvatar ? ' selected' : '') + '" data-avatar="' + av + '">' + av + '</div>'; }).join('') +

                        if (state.user && selected !== state.user.avatar && !state.isInGame) {
                            var updateResult = await supabase.from('users').update({ avatar: selected }).eq('id', state.user.id);
                            if (!updateResult.error) {
                                state.user.avatar = selected;
                                updateUI();
                            }
                        }
                        elements.profileModalContainer.innerHTML = '';
                    });
                }

                var logoutBtn = document.getElementById('logoutProfileBtn');
                if (logoutBtn) {
                    logoutBtn.addEventListener('click', function() {

                        if (state.roomsChannel) supabase.removeChannel(state.roomsChannel);
                        if (state.balanceChannel) supabase.removeChannel(state.balanceChannel);
                        if (state.avatarChannel) supabase.removeChannel(state.avatarChannel);
                        state.user = null;
                        state.classicBets = [];
                        state.rooms = [];
                        state.classicSpinning = false;
                        state.isInGame = false;

                        elements.profileModalContainer.innerHTML = '';
                        elements.mainApp.style.display = 'none';
                        showAuthForm();

                if (closeBtn) {
                    closeBtn.addEventListener('click', function() { elements.profileModalContainer.innerHTML = ''; });
                }

                var overlay = document.getElementById('profileModalOverlay');
                if (overlay) {
                    overlay.addEventListener('click', function(e) { if (e.target === e.currentTarget) elements.profileModalContainer.innerHTML = ''; });

            async function registerByNickname(nickname, password) {
                var existResult = await supabase.from('user_nicknames').select('user_id').eq('nickname', nickname).maybeSingle();
                if (existResult.data) return { success: false, message: 'Никнейм уже занят' };

                var newId = crypto.randomUUID();
                var userResult = await supabase.from('users').insert([{ id: newId, username: nickname, balance: 1000, avatar: '🐺' }]);
                if (userResult.error) return { success: false, message: 'Ошибка: ' + userResult.error.message };

                var nickResult = await supabase.from('user_nicknames').insert([{ user_id: newId, nickname: nickname, password_hash: password }]);
                if (nickResult.error) {
                    await supabase.from('users').delete().eq('id', newId);
                    return { success: false, message: 'Ошибка: ' + nickResult.error.message };
                }
                return { success: true, user: { id: newId, username: nickname, balance: 1000, avatar: '🐺' } };
            }

            async function loginByNickname(nickname, password) {
                var nickResult = await supabase.from('user_nicknames').select('user_id, password_hash').eq('nickname', nickname).maybeSingle();
                if (!nickResult.data || nickResult.data.password_hash !== password) return { success: false, message: 'Неверный никнейм или пароль' };

                var userResult = await supabase.from('users').select('*').eq('id', nickResult.data.user_id).single();
                if (!userResult.data) return { success: false, message: 'Пользователь не найден' };

                return {
                    success: true,
                    user: {
                        id: userResult.data.id,
                        username: userResult.data.username,
                        balance: userResult.data.balance,
                        avatar: userResult.data.avatar
                    }
                };
            }

            function showAuthForm() {
                elements.authContainer.innerHTML =
                    '<div class="auth-overlay"><div class="auth-card">' +
                    '<h2 style="text-align:center;color:#f0b34b;">🎰 case-wins</h2>' +
                    '<p style="text-align:center;color:#7f8690;font-size:14px;">Вход по никнейму</p>' +
                    '<div class="auth-error" id="authError"></div>' +
                    '<input type="text" class="auth-input" id="authNickname" placeholder="Никнейм" autocomplete="off" maxlength="20">' +
                    '<input type="password" class="auth-input" id="authPassword" placeholder="Пароль" maxlength="50">' +
                    '<button class="btn" id="authSignUpBtn" style="padding:12px;font-size:16px;">📝 Регистрация</button>' +
                    '<button class="btn" id="authSignInBtn" style="padding:12px;font-size:16px;background:#4a5068;">🔑 Войти</button>' +
                    '</div></div>';

                var errDiv = document.getElementById('authError');
                var showErr = function(m) { errDiv.textContent = m;
                    errDiv.classList.add('show');
                    setTimeout(function() { errDiv.classList.remove('show'); }, 3000); };

                var doAuth = async function(isReg) {
                    var nick = document.getElementById('authNickname').value.trim();
                    var pass = document.getElementById('authPassword').value;
                    if (!nick || !pass) return showErr('Заполните все поля');
                    if (isReg && nick.length < 3) return showErr('Никнейм от 3 символов');
                    if (isReg && pass.length < 4) return showErr('Пароль от 4 символов');

                    var result = isReg ? await registerByNickname(nick, pass) : await loginByNickname(nick, pass);
                    if (result.success) {
                        state.user = result.user;
                        localStorage.setItem('casewins_session', JSON.stringify({ userId: state.user.id, username: state.user.username, password: pass }));
                        elements.authContainer.innerHTML = '';
                        elements.mainApp.style.display = 'flex';
                        await loadGameData();
                        initRealtime();
                        updateUI();
                    } else {
                        showErr(result.message);
                    }
                };

                document.getElementById('authSignUpBtn').addEventListener('click', function() { doAuth(true); });
                document.getElementById('authSignInBtn').addEventListener('click', function() { doAuth(false); });

                var nickInput = document.getElementById('authNickname');
                var passInput = document.getElementById('authPassword');
                if (nickInput) nickInput.focus();
                if (passInput) {
                    passInput.addEventListener('keypress', function(e) { if (e.key === 'Enter') doAuth(false); });
                }
            }

            async function loadGameData() {
                try {
                    var betsResult = await supabase.from('bets').select('*').eq('status', 'active');
                    if (!betsResult.data) return;

                    state.classicBets = [];
                    var roomMap = new Map();

                    betsResult.data.forEach(function(bet) {
                        if (bet.game_type === 'classic') {
                            state.classicBets.push({
                                id: bet.id,
                                user: { id: bet.user_id, username: bet.user_name, avatar: bet.user_avatar },
                                amount: bet.amount
                            });
                        } else if (bet.game_type === '1v1') {
                            var rid = bet.room_id;
                            if (!roomMap.has(rid)) {
                                roomMap.set(rid, {
                                    id: rid,
                                    bet: bet.amount,
                                    betIds: [],
                                    status: 'waiting',
                                    creator: null,
                                    opponent: null,
                                    timer: 3,
                                    intervalId: null,
                                    winner: null,
                                    trackId: 'rt' + rid,
                                    viewportId: 'rv' + rid,
                                    arrowId: 'ra' + rid,
                                    arrowAboveId: 'raa' + rid
                                });
                            }
                            var room = roomMap.get(rid);
                            room.betIds.push(bet.id);
                            if (!room.creator) {
                                room.creator = { id: bet.user_id, username: bet.user_name, avatar: bet.user_avatar };
                            } else if (!room.opponent && room.creator.id !== bet.user_id) {
                                room.opponent = { id: bet.user_id, username: bet.user_name, avatar: bet.user_avatar };
                                room.status = 'countdown';
                            }
                        }
                    });

                    state.rooms = Array.from(roomMap.values());
                    var maxRoomId = 0;
                    state.rooms.forEach(function(r) { if (r.id > maxRoomId) maxRoomId = r.id; });
                    state.nextRoomId = maxRoomId + 1;

                    state.rooms.forEach(function(room) {
                        if (room.opponent && room.status === 'countdown') startRoomCountdown(room);
                    });

                    if (state.classicBets.length >= 2 && !state.classicInterval && !state.classicSpinning) {
                        startClassicCountdown();
                    }
                } catch (e) {
                    console.error('Ошибка загрузки данных:', e);
                }
            }

            function initRealtime() {
                if (state.classicChannel) supabase.removeChannel(state.classicChannel);
                if (state.roomsChannel) supabase.removeChannel(state.roomsChannel);
                if (state.balanceChannel) supabase.removeChannel(state.balanceChannel);
                if (state.avatarChannel) supabase.removeChannel(state.avatarChannel);

                state.classicChannel = supabase
                    .channel('cb')
                    .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'bets', filter: 'game_type=eq.classic' }, function(payload) {
                        var b = payload.new;
                        if (b.status === 'active' && !state.classicBets.some(function(x) { return x.id === b.id; })) {
                            state.classicBets.push({ id: b.id, user: { id: b.user_id, username: b.user_name, avatar: b.user_avatar }, amount: b.amount });
                            updateUI();
                            if (state.classicBets.length >= 2 && !state.classicInterval && !state.classicSpinning) startClassicCountdown();
                        }
                    })
                    .on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'bets', filter: 'game_type=eq.classic' }, function(payload) {
                        if (payload.new.status === 'completed') {
                            state.classicBets = state.classicBets.filter(function(b) { return b.id !== payload.new.id; });
                            updateUI();
                            if (!state.classicBets.length) {
                                clearClassicInterval();
                                state.classicSpinning = false;
                                elements.classicPlaceBetBtn.disabled = false;
                                elements.classicTimerDisplay.style.display = 'block';
                                elements.classicTimerDisplay.textContent = '⏳ 3';
                                updateTimerStrip(3);
                                elements.rouletteArrowTop.style.display = 'none';
                                elements.rouletteArrowAbove.style.display = 'none';
                                var ew = document.querySelector('#tickerViewport .winner-avatar-center');
                                if (ew) ew.remove();
                                elements.tickerTrack.innerHTML = '';
                                elements.tickerTrack.style.transform = 'translateX(0px)';
                            }
                        }
                    })
                    .subscribe();

                state.roomsChannel = supabase
                    .channel('rv')
                    .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'bets', filter: 'game_type=eq.1v1' }, function(payload) {
                        var b = payload.new;
                        if (b.status !== 'active') return;
                        var room = state.rooms.find(function(r) { return r.id === b.room_id; });
                        if (!room) {
                            state.rooms.push({
                                id: b.room_id,
                                bet: b.amount,
                                betIds: [b.id],
                                status: 'waiting',
                                creator: { id: b.user_id, username: b.user_name, avatar: b.user_avatar },
                                opponent: null,
                                timer: 3,
                                intervalId: null,
                                winner: null,
                                trackId: 'rt' + b.room_id,
                                viewportId: 'rv' + b.room_id,
                                arrowId: 'ra' + b.room_id,
                                arrowAboveId: 'raa' + b.room_id
                            });
                            state.nextRoomId = Math.max(state.nextRoomId, b.room_id + 1);
                            updateUI();
                        } else if (room.status === 'waiting' && room.creator.id !== b.user_id) {
                            room.opponent = { id: b.user_id, username: b.user_name, avatar: b.user_avatar };
                            room.betIds.push(b.id);
                            room.status = 'countdown';
                            room.timer = 3;
                            startRoomCountdown(room);
                            updateUI();
                        }
                    })
                    .on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'bets', filter: 'game_type=eq.1v1' }, function(payload) {
                        if (payload.new.status === 'completed') {
                            var room = state.rooms.find(function(r) { return r.betIds.includes(payload.new.id); });
                            if (room && room.status === 'finished') {
                                state.rooms = state.rooms.filter(function(r) { return r.id !== room.id; });
                                updateUI();
                            }
                        }
                    })
                    .subscribe();

                if (state.user) {
                    state.balanceChannel = supabase
                        .channel('bl')
                        .on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'users', filter: 'id=eq.' + state.user.id }, function(payload) {
                            if (payload.new.balance !== state.user.balance) {
                                state.user.balance = payload.new.balance;
                                updateBalanceDisplay();
                            }
                        })
                        .subscribe();

                    state.avatarChannel = supabase
                        .channel('av')
                        .on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'users', filter: 'id=eq.' + state.user.id }, function(payload) {
                            if (payload.new.avatar !== state.user.avatar) {
                                state.user.avatar = payload.new.avatar;
                                elements.profileAvatar.textContent = state.user.avatar;
                            }
                        })
                        .subscribe();
                }
            }

            async function restoreSession() {
                var saved = localStorage.getItem('casewins_session');
                if (!saved) return false;
                try {
                    var data = JSON.parse(saved);
                    var result = await loginByNickname(data.username, data.password);
                    if (result.success) {
                        state.user = result.user;
                        elements.mainApp.style.display = 'flex';
                        await loadGameData();
                        initRealtime();
                        updateUI();
                        return true;
                    }
                } catch (e) {}
                localStorage.removeItem('casewins_session');
                return false;
            }

            elements.createRoomBtn.addEventListener('click', createRoom);
            elements.profileButton.addEventListener('click', showProfileModal);

            updateTimerStrip(3);
            (async function() { if (!await restoreSession()) showAuthForm(); })();
        })();
    </script>
</body>
</html>
