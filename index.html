<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>case-wins · Классический раунд & 1 на 1</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --bg: #06080c;
            --panel: #0f1219;
            --card: #161b24;
            --gold: #f0b34b;
            --accent: #252b38;
            --text: #c8cdd8;
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: var(--bg);
            font-family: 'Segoe UI', 'Inter', system-ui, sans-serif;
            color: var(--text);
            width: 100vw;
            min-height: 100vh;
            overflow-y: auto;
            overflow-x: hidden;
            display: flex;
        }
        .app {
            display: flex;
            width: 100%;
            min-height: 100vh;
            gap: 6px;
            padding: 6px;
        }
        .sidebar {
            width: 200px;
            background: var(--panel);
            border-radius: 18px;
            padding: 14px 10px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            border: 1px solid #252b38;
            flex-shrink: 0;
            position: sticky;
            top: 6px;
            align-self: flex-start;
            height: fit-content;
            max-height: calc(100vh - 12px);
        }
        .profile {
            display: flex;
            align-items: center;
            gap: 10px;
            background: #1a1f2b;
            padding: 10px;
            border-radius: 24px;
        }
        .avatar-circle {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            background: var(--gold);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            flex-shrink: 0;
        }
        .nav-btn {
            background: #1a1f2b;
            border: none;
            color: var(--text);
            padding: 10px 14px;
            border-radius: 22px;
            cursor: pointer;
            text-align: left;
            font-weight: 600;
            font-size: 13px;
        }
        .nav-btn.active {
            background: var(--gold);
            color: #000;
        }
        .main-area {
            flex: 1;
            display: flex;
            gap: 8px;
            min-width: 0;
            align-items: flex-start;
        }
        .classic-section {
            flex: 1;
            background: var(--card);
            border-radius: 22px;
            padding: 14px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            border: 1px solid #2a3140;
            min-width: 0;
        }
        .classic-header {
            text-align: center;
            font-weight: 700;
            font-size: 15px;
        }
        .bank-display {
            text-align: center;
            font-size: 18px;
            font-weight: 800;
            color: var(--gold);
        }
        .balance-display {
            font-size: 14px;
            font-weight: 700;
            color: #3acf6e;
        }
        .place-bet-btn {
            width: 100%;
            background: var(--gold);
            border: none;
            color: #000;
            font-weight: 800;
            padding: 12px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 15px;
        }
        .place-bet-btn:disabled {
            background: #5c6170;
            color: #222;
            cursor: not-allowed;
        }
        .items-row {
            display: none;
        }
        .item-chip {
            background: #1e2432;
            padding: 6px 12px;
            border-radius: 18px;
            font-size: 13px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .roulette-wrapper {
            position: relative;
            height: 70px;
            background: transparent;
            border-radius: 16px;
            overflow: hidden;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px solid #252b38;
        }
        .timer-strip-bg {
            position: absolute;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background: #0d1119;
            z-index: 0;
            border-radius: 14px;
            overflow: hidden;
        }
        .timer-strip-fill {
            position: absolute;
            left: 0;
            top: 0;
            height: 100%;
            width: 100%;
            background: linear-gradient(90deg, #f0b34b, #e6953c, #c77a28);
            z-index: 1;
            border-radius: 14px 0 0 14px;
            transition: width 0.95s cubic-bezier(0.25, 0.1, 0.15, 1.0);
            box-shadow: inset 0 0 30px rgba(255, 200, 100, 0.35), 0 0 25px rgba(240, 179, 75, 0.45);
        }
        .timer-strip-glow {
            position: absolute;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background: transparent;
            z-index: 2;
            pointer-events: none;
            border-radius: 14px;
            box-shadow: inset 0 0 60px rgba(240, 179, 75, 0.2);
        }
        .timer-display {
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            z-index: 10;
            font-weight: 900;
            font-size: 28px;
            color: #fff;
            text-shadow: 0 0 20px rgba(0, 0, 0, 0.9), 0 0 8px rgba(240, 179, 75, 0.8);
            pointer-events: none;
            letter-spacing: 2px;
        }
        .roulette-arrow-top {
            position: absolute;
            left: 50%;
            top: -22px;
            transform: translateX(-50%);
            font-size: 32px;
            color: #f0b34b;
            z-index: 30;
            pointer-events: none;
            text-shadow: 0 0 15px black, 0 0 10px rgba(240, 179, 75, 0.9);
            filter: drop-shadow(0 0 8px rgba(0,0,0,0.8));
            display: none;
        }
        .roulette-arrow-above {
            position: absolute;
            left: 50%;
            top: -22px;
            transform: translateX(-50%);
            font-size: 32px;
            color: #f0b34b;
            z-index: 30;
            pointer-events: none;
            text-shadow: 0 0 15px black, 0 0 10px rgba(240, 179, 75, 0.9);
            filter: drop-shadow(0 0 8px rgba(0,0,0,0.8));
            display: none;
        }
        .ticker-viewport {
            width: 100%;
            height: 100%;
            overflow: hidden;
            position: relative;
            display: flex;
            align-items: center;
            z-index: 3;
        }
        .ticker-track {
            display: flex;
            gap: 4px;
            position: absolute;
            left: 0;
            will-change: transform;
        }
        .ticket-avatar-small {
            width: 55px;
            height: 55px;
            background: #1e2432;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 26px;
            border: 2px solid #3a4052;
            flex-shrink: 0;
        }
        .winner-avatar-center {
            width: 70px;
            height: 70px;
            background: #1e2432;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 34px;
            border: 3px solid #f0b34b;
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            z-index: 15;
            box-shadow: 0 0 30px rgba(240, 179, 75, 0.8), 0 0 60px rgba(240, 179, 75, 0.4);
        }
        .bets-table {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        .bet-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: #1a1f2b;
            border-radius: 14px;
            padding: 8px 12px;
        }
        .bet-user {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .onevsone-section {
            flex: 1;
            background: var(--card);
            border-radius: 22px;
            padding: 14px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            border: 1px solid #2a3140;
            min-width: 0;
        }
        .rooms-scroll {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .room-card {
            background: #1a1f2b;
            border-radius: 16px;
            padding: 12px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            border: 1px solid #2f3748;
        }
        .room-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 6px;
        }
        .btn {
            background: #f0b34b;
            border: none;
            color: #000;
            font-weight: 700;
            padding: 7px 16px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 12px;
        }
        .btn:disabled {
            background: #5c6170;
            color: #222;
        }
        .inventory-panel {
            width: 200px;
            background: var(--panel);
            border-radius: 18px;
            padding: 14px 10px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            border: 1px solid #252b38;
            flex-shrink: 0;
            position: sticky;
            top: 6px;
            align-self: flex-start;
            height: fit-content;
            max-height: calc(100vh - 12px);
        }
        .inv-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 6px;
        }
        .inv-slot {
            aspect-ratio: 1;
            background: #1a1f2b;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
        }
        .bet-input-inv {
            background: #1a1f2b;
            border: 1px solid #353d4e;
            padding: 8px;
            border-radius: 15px;
            color: white;
            text-align: center;
            font-weight: bold;
        }
        .bet-input-inv::-webkit-inner-spin-button,
        .bet-input-inv::-webkit-outer-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
        .bet-input-inv[type=number] {
            -moz-appearance: textfield;
        }
        .spectator-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(0, 0, 0, 0.9);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 100;
        }
        .spectator-card {
            background: #161b24;
            border-radius: 28px;
            padding: 24px;
            width: 550px;
            border: 2px solid #f0b34b;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .spec-bet-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: #1e2432;
            border-radius: 14px;
            padding: 10px 14px;
        }
        .auth-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(0, 0, 0, 0.95);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 200;
        }
        .auth-card {
            background: #161b24;
            border-radius: 20px;
            padding: 30px;
            width: 400px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            border: 1px solid #f0b34b;
        }
        .auth-input {
            background: #1a1f2b;
            border: 1px solid #353d4e;
            padding: 12px;
            border-radius: 10px;
            color: white;
            font-size: 16px;
        }
        @keyframes pulse-gold {
            0%,
            100% {
                box-shadow: 0 0 30px rgba(240, 179, 75, 0.8), 0 0 60px rgba(240, 179, 75, 0.4);
            }
            50% {
                box-shadow: 0 0 50px rgba(240, 179, 75, 1), 0 0 90px rgba(240, 179, 75, 0.7);
            }
        }
        .winner-avatar-center {
            animation: pulse-gold 0.8s ease-in-out infinite;
        }
        .auth-error {
            color: #ff4444;
            font-size: 14px;
            text-align: center;
            display: none;
        }
        .auth-error.show {
            display: block;
        }
    </style>
</head>
<body>
    <div id="authContainer"></div>
    <div class="app" id="mainApp" style="display:none;">
        <div class="sidebar">
            <div class="profile">
                <span class="avatar-circle" id="profileAvatar">🐺</span>
                <div>
                    <div id="profileName">PlayerOne</div>
                    <div class="balance-display" id="sidebarBalance">💰 1000</div>
                    <div style="color:#3acf6e;">● Онлайн</div>
                </div>
            </div>
            <button class="nav-btn active">🏠 Главная</button>
            <button class="nav-btn">📜 История</button>
            <button class="nav-btn" id="logoutBtn">🚪 Выйти</button>
        </div>
        <div class="main-area">
            <div class="classic-section" id="classicBlock">
                <div class="classic-header">🏆 КЛАССИЧЕСКИЙ РАУНД</div>
                <div class="bank-display" id="classicBankDisplay">Банк: 0</div>
                <button class="place-bet-btn" id="classicPlaceBetBtn">🎯 ПОСТАВИТЬ</button>
                <div class="items-row" id="classicItemsRow"></div>
                <div class="roulette-wrapper" id="rouletteWrapper">
                    <div class="roulette-arrow-above" id="rouletteArrowAbove">▼</div>
                    <div class="timer-strip-bg">
                        <div class="timer-strip-fill" id="timerStripFill"></div>
                        <div class="timer-strip-glow"></div>
                    </div>
                    <div class="timer-display" id="classicTimerDisplay">⏳ 3</div>
                    <div class="roulette-arrow-top" id="rouletteArrowTop" style="display:none;">▼</div>
                    <div class="ticker-viewport" id="tickerViewport">
                        <div class="ticker-track" id="tickerTrack"></div>
                    </div>
                </div>
                <div class="bets-table" id="betsTable"></div>
            </div>
            <div class="onevsone-section">
                <div style="display:flex;justify-content:space-between;align-items:center;">
                    <h3>🎲 1 НА 1</h3>
                    <button class="btn" id="createRoomBtn">+ Создать</button>
                </div>
                <div class="rooms-scroll" id="roomsList"></div>
            </div>
        </div>
        <div class="inventory-panel">
            <h3>🎒 Инвентарь</h3>
            <div class="inv-grid">
                <div class="inv-slot">🔹</div>
                <div class="inv-slot">🔹</div>
                <div class="inv-slot">🔹</div>
                <div class="inv-slot">🔹</div>
            </div>
            <div>💰 Скины: 0</div>
            <button class="btn">Купить</button>
            <button class="btn" style="background:#3e4455;">Продать</button>
            <input type="number" class="bet-input-inv" id="classicBetInput" value="5" min="1" placeholder="Сумма ставки">
            <span style="font-size:10px;color:#7f8690;text-align:center;">Ставка для классики и 1 на 1</span>
        </div>
    </div>
    <div id="spectatorContainer"></div>

    <script>
        (() => {
            const SUPABASE_URL = 'https://jwjbjdzncshylthzbwtq.supabase.co';
            const SUPABASE_ANON_KEY = 'sb_publishable_xCVgHMfqaAI5BH7kcYuNbQ_KYZdAoRO';
            const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

            const state = {
                user: null,
                sessionToken: null,
                classicBets: [],
                classicTimer: 3,
                classicInterval: null,
                classicSpinning: false,
                tickerAnimationId: null,
                rooms: [],
                nextRoomId: 1,
                roomAnimations: {},
                classicChannel: null,
                roomsChannel: null,
                balanceChannel: null,
                globalRoomIdCounter: 0
            };

            const profileAvatar = document.getElementById('profileAvatar');
            const profileName = document.getElementById('profileName');
            const sidebarBalance = document.getElementById('sidebarBalance');
            const classicBankDisplay = document.getElementById('classicBankDisplay');
            const classicTimerDisplay = document.getElementById('classicTimerDisplay');
            const classicPlaceBetBtn = document.getElementById('classicPlaceBetBtn');
            const classicBetInput = document.getElementById('classicBetInput');
            const classicItemsRow = document.getElementById('classicItemsRow');
            const tickerTrack = document.getElementById('tickerTrack');
            const tickerViewport = document.getElementById('tickerViewport');
            const rouletteArrowTop = document.getElementById('rouletteArrowTop');
            const rouletteArrowAbove = document.getElementById('rouletteArrowAbove');
            const timerStripFill = document.getElementById('timerStripFill');
            const betsTable = document.getElementById('betsTable');
            const roomsList = document.getElementById('roomsList');
            const spectatorContainer = document.getElementById('spectatorContainer');
            const authContainer = document.getElementById('authContainer');
            const mainApp = document.getElementById('mainApp');

            function generateSessionToken() {
                return 'session_' + Math.random().toString(36).substr(2) + Date.now().toString(36);
            }

            function totalBank() { return state.classicBets.reduce((s, b) => s + b.amount, 0); }

            function buildTicketArray(bets) {
                const tickets = [];
                bets.forEach(b => {
                    for (let i = 0; i < b.amount; i++) tickets.push(b.user.avatar);
                });
                if (tickets.length === 0) tickets.push('❓');
                return tickets;
            }

            function updateTimerStrip(seconds) {
                const maxTime = 3;
                const percent = Math.max(0, (seconds / maxTime) * 100);
                timerStripFill.style.width = percent + '%';
                if (percent <= 0) {
                    timerStripFill.style.borderRadius = '14px';
                } else if (percent < 100) {
                    timerStripFill.style.borderRadius = '14px 0 0 14px';
                } else {
                    timerStripFill.style.borderRadius = '14px';
                }
            }

            function updateBalanceDisplay() {
                if (state.user) {
                    sidebarBalance.textContent = `💰 ${state.user.balance}`;
                }
            }

            function updateUI() {
                if (!state.user) return;
                profileAvatar.textContent = state.user.avatar;
                profileName.textContent = state.user.username;
                updateBalanceDisplay();
                classicBankDisplay.textContent = `Банк: ${totalBank()}`;
                renderBetsTable();
                renderRooms();
                if (!state.classicSpinning && !state.classicInterval) {
                    updateTimerStrip(3);
                    classicTimerDisplay.textContent = '⏳ 3';
                }
            }

            function renderItemsRow() {
                classicItemsRow.innerHTML = '';
            }

            function renderBetsTable() {
                const totalBankValue = totalBank() || 1;
                const aggregatedBets = [];
                const userBetsMap = new Map();

                state.classicBets.forEach(b => {
                    const key = b.user.id;
                    if (userBetsMap.has(key)) {
                        const existing = userBetsMap.get(key);
                        existing.totalAmount += b.amount;
                    } else {
                        userBetsMap.set(key, {
                            user: b.user,
                            totalAmount: b.amount
                        });
                    }
                });

                userBetsMap.forEach((value) => {
                    aggregatedBets.push(value);
                });

                betsTable.innerHTML = aggregatedBets.map(b => {
                    const percent = ((b.totalAmount / totalBankValue) * 100).toFixed(1);
                    const isCurrentUser = state.user && b.user.id === state.user.id;
                    const rowStyle = isCurrentUser ? 'border: 1px solid #f0b34b;' : '';
                    return `<div class="bet-row" style="${rowStyle}">
                        <div class="bet-user">
                            <span class="avatar-circle" style="width:30px;height:30px;font-size:16px;">${b.user.avatar}</span> 
                            <span>${b.user.username}${isCurrentUser ? ' (Вы)' : ''}</span>
                        </div>
                        <span>${b.totalAmount} монет</span>
                        <span>Билеты: ${b.totalAmount}</span>
                        <span style="color:#f0b34b;font-weight:bold;">${percent}%</span>
                    </div>`;
                }).join('');
            }

            function animateRoulette(trackElement, viewportElement, arrowElement, tickets, winnerAvatar, callback) {
                if (state.roomAnimations[trackElement.id]) {
                    cancelAnimationFrame(state.roomAnimations[trackElement.id]);
                }
                trackElement.innerHTML = '';
                const repeatedTickets = [];
                for (let i = 0; i < 40; i++) {
                    tickets.forEach(av => repeatedTickets.push(av));
                }
                repeatedTickets.forEach(av => {
                    const el = document.createElement('div');
                    el.className = 'ticket-avatar-small';
                    el.textContent = av;
                    trackElement.appendChild(el);
                });
                let pos = 0;
                let speed = 0.5;
                const startTime = Date.now();
                const phase1 = 2000;
                const phase2 = 5000;
                const phase3 = 15000;
                const maxSpeed = 4.5;

                function step() {
                    const elapsed = Date.now() - startTime;
                    if (elapsed < phase1) {
                        speed = 0.5 + (elapsed / phase1) * (maxSpeed - 0.5);
                    } else if (elapsed < phase2) {
                        speed = maxSpeed;
                    } else if (elapsed < phase3) {
                        const decelProgress = (elapsed - phase2) / (phase3 - phase2);
                        speed = maxSpeed * (1 - decelProgress);
                    } else {
                        const winnerEl = document.createElement('div');
                        winnerEl.className = 'winner-avatar-center';
                        winnerEl.textContent = winnerAvatar;
                        viewportElement.appendChild(winnerEl);
                        if (arrowElement) arrowElement.style.display = 'block';
                        if (callback) setTimeout(callback, 3000);
                        return;
                    }
                    pos -= speed;
                    trackElement.style.transform = `translateX(${pos}px)`;
                    state.roomAnimations[trackElement.id] = requestAnimationFrame(step);
                }
                state.roomAnimations[trackElement.id] = requestAnimationFrame(step);
            }

            async function placeBetClassic() {
                if (state.classicSpinning) return;
                if (!state.user) return;
                const amt = parseInt(classicBetInput.value, 10);
                if (isNaN(amt) || amt <= 0) return;
                if (state.user.balance < amt) return alert('Недостаточно монет');

                const newBalance = state.user.balance - amt;
                const { error: updateError } = await supabase
                    .from('users')
                    .update({ balance: newBalance })
                    .eq('id', state.user.id);

                if (updateError) {
                    console.error('Ошибка обновления баланса:', updateError);
                    return;
                }

                const { data: betData, error: betError } = await supabase
                    .from('bets')
                    .insert([{
                        user_id: state.user.id,
                        user_name: state.user.username,
                        user_avatar: state.user.avatar,
                        amount: amt,
                        game_type: 'classic',
                        room_id: null,
                        status: 'active'
                    }])
                    .select();

                if (betError) {
                    console.error('Ошибка при размещении ставки:', betError);
                    const { error: revertError } = await supabase
                        .from('users')
                        .update({ balance: state.user.balance })
                        .eq('id', state.user.id);
                    return;
                }

                state.user.balance = newBalance;
                updateBalanceDisplay();

                state.classicBets.push({
                    id: betData[0].id,
                    user: {
                        id: state.user.id,
                        username: state.user.username,
                        avatar: state.user.avatar
                    },
                    amount: amt
                });

                updateUI();

                if (state.classicBets.length >= 2 && !state.classicInterval && !state.classicSpinning) {
                    startClassicCountdown();
                }
            }

            async function loadActiveClassicBets() {
                const { data: activeBets, error } = await supabase
                    .from('bets')
                    .select('*')
                    .eq('game_type', 'classic')
                    .eq('status', 'active');

                if (error) {
                    console.error('Ошибка загрузки активных ставок:', error);
                    return;
                }

                if (activeBets && activeBets.length > 0) {
                    state.classicBets = [];
                    activeBets.forEach(bet => {
                        state.classicBets.push({
                            id: bet.id,
                            user: {
                                id: bet.user_id,
                                username: bet.user_name,
                                avatar: bet.user_avatar
                            },
                            amount: bet.amount
                        });
                    });
                    updateUI();
                }
            }

            async function loadActiveRooms() {
                const { data: activeRoomBets, error } = await supabase
                    .from('bets')
                    .select('*')
                    .eq('game_type', '1v1')
                    .eq('status', 'active');

                if (error) {
                    console.error('Ошибка загрузки комнат:', error);
                    return;
                }

                if (activeRoomBets && activeRoomBets.length > 0) {
                    const roomMap = new Map();

                    activeRoomBets.forEach(bet => {
                        const roomId = bet.room_id;
                        if (!roomMap.has(roomId)) {
                            roomMap.set(roomId, {
                                id: roomId,
                                creator: null,
                                opponent: null,
                                bet: bet.amount,
                                status: 'waiting',
                                timer: 3,
                                intervalId: null,
                                winner: null,
                                trackId: `roomTrack${roomId}`,
                                viewportId: `roomViewport${roomId}`,
                                arrowId: `roomArrow${roomId}`,
                                arrowAboveId: `roomArrowAbove${roomId}`,
                                betIds: []
                            });
                        }

                        const room = roomMap.get(roomId);
                        room.betIds.push(bet.id);

                        if (!room.creator) {
                            room.creator = {
                                id: bet.user_id,
                                username: bet.user_name,
                                avatar: bet.user_avatar
                            };
                        } else if (room.creator.id !== bet.user_id && !room.opponent) {
                            room.opponent = {
                                id: bet.user_id,
                                username: bet.user_name,
                                avatar: bet.user_avatar
                            };
                            room.status = 'countdown';
                        }
                    });

                    state.rooms = [];
                    roomMap.forEach((room, roomId) => {
                        state.rooms.push(room);
                        if (state.nextRoomId <= roomId) {
                            state.nextRoomId = roomId + 1;
                        }

                        if (room.opponent && room.status === 'countdown') {
                            startRoomCountdown(room);
                        }
                    });

                    updateUI();
                }
            }

            function startClassicCountdown() {
                if (state.classicBets.length < 2) return;
                clearClassicInterval();
                state.classicTimer = 3;
                classicTimerDisplay.textContent = `⏳ ${state.classicTimer}`;
                updateTimerStrip(state.classicTimer);
                state.classicInterval = setInterval(() => {
                    state.classicTimer--;
                    classicTimerDisplay.textContent = `⏳ ${state.classicTimer}`;
                    updateTimerStrip(state.classicTimer);
                    if (state.classicTimer <= 0) {
                        clearClassicInterval();
                        runClassicGame();
                    }
                }, 1000);
            }

            async function runClassicGame() {
                state.classicSpinning = true;
                classicPlaceBetBtn.disabled = true;
                updateTimerStrip(0);
                classicTimerDisplay.style.display = 'none';
                rouletteArrowAbove.style.display = 'none';
                rouletteArrowTop.style.display = 'block';
                const tickets = buildTicketArray(state.classicBets);
                const allUsers = [];
                state.classicBets.forEach(b => { for (let i = 0; i < b.amount; i++) allUsers.push(b.user); });
                const winner = allUsers[Math.floor(Math.random() * allUsers.length)];

                animateRoulette(tickerTrack, tickerViewport, rouletteArrowTop, tickets, winner.avatar, async () => {
                    const bank = totalBank();

                    const { error: updateBetsError } = await supabase
                        .from('bets')
                        .update({ status: 'completed', is_winner: false })
                        .eq('game_type', 'classic')
                        .eq('status', 'active');

                    if (updateBetsError) {
                        console.error('Ошибка обновления ставок:', updateBetsError);
                    }

                    const winnerBetIds = state.classicBets
                        .filter(b => b.user.id === winner.id)
                        .map(b => b.id);

                    if (winnerBetIds.length > 0) {
                        const { error: updateWinnerError } = await supabase
                            .from('bets')
                            .update({ is_winner: true, won_amount: bank })
                            .in('id', winnerBetIds);

                        if (updateWinnerError) {
                            console.error('Ошибка обновления выигрышных ставок:', updateWinnerError);
                        }
                    }

                    if (winner.id === state.user.id) {
                        const newBalance = state.user.balance + bank;
                        const { error: balanceError } = await supabase
                            .from('users')
                            .update({ balance: newBalance })
                            .eq('id', state.user.id);

                        if (!balanceError) {
                            state.user.balance = newBalance;
                        }
                    }

                    state.classicBets = [];
                    state.classicSpinning = false;
                    classicPlaceBetBtn.disabled = false;
                    classicTimerDisplay.style.display = 'block';
                    classicTimerDisplay.textContent = '⏳ 3';
                    updateTimerStrip(3);
                    rouletteArrowTop.style.display = 'none';
                    rouletteArrowAbove.style.display = 'none';
                    const existingWinner = document.querySelector('#tickerViewport .winner-avatar-center');
                    if (existingWinner) existingWinner.remove();
                    tickerTrack.innerHTML = '';
                    tickerTrack.style.transform = 'translateX(0px)';
                    updateUI();
                });
            }

            function clearClassicInterval() {
                if (state.classicInterval) { clearInterval(state.classicInterval);
                    state.classicInterval = null; }
            }

            classicPlaceBetBtn.addEventListener('click', placeBetClassic);

            async function createRoom() {
                if (!state.user) return;
                const bet = parseInt(classicBetInput.value, 10);
                if (!bet || bet <= 0 || state.user.balance < bet) {
                    if (state.user.balance < bet) alert('Недостаточно средств');
                    return;
                }

                const newBalance = state.user.balance - bet;
                const { error: updateError } = await supabase
                    .from('users')
                    .update({ balance: newBalance })
                    .eq('id', state.user.id);

                if (updateError) {
                    console.error('Ошибка обновления баланса:', updateError);
                    return;
                }

                state.user.balance = newBalance;
                updateBalanceDisplay();

                const roomId = state.nextRoomId++;

                const { data: betData, error: betError } = await supabase
                    .from('bets')
                    .insert([{
                        user_id: state.user.id,
                        user_name: state.user.username,
                        user_avatar: state.user.avatar,
                        amount: bet,
                        game_type: '1v1',
                        room_id: roomId,
                        status: 'active'
                    }])
                    .select();

                if (betError) {
                    console.error('Ошибка создания комнаты:', betError);
                    const { error: revertError } = await supabase
                        .from('users')
                        .update({ balance: state.user.balance + bet })
                        .eq('id', state.user.id);
                    state.user.balance += bet;
                    updateBalanceDisplay();
                    return;
                }

                const room = {
                    id: roomId,
                    creator: {
                        id: state.user.id,
                        username: state.user.username,
                        avatar: state.user.avatar
                    },
                    bet,
                    opponent: null,
                    status: 'waiting',
                    timer: 3,
                    intervalId: null,
                    winner: null,
                    trackId: `roomTrack${roomId}`,
                    viewportId: `roomViewport${roomId}`,
                    arrowId: `roomArrow${roomId}`,
                    arrowAboveId: `roomArrowAbove${roomId}`,
                    betIds: betData ? [betData[0].id] : []
                };

                state.rooms.push(room);
                updateUI();
            }

            async function joinRoom(roomId) {
                if (!state.user) return;
                const room = state.rooms.find(r => r.id === roomId);
                if (!room || room.status !== 'waiting' || room.creator.id === state.user.id) return;
                if (state.user.balance < room.bet) return alert('Недостаточно монет');

                const newBalance = state.user.balance - room.bet;
                const { error: updateError } = await supabase
                    .from('users')
                    .update({ balance: newBalance })
                    .eq('id', state.user.id);

                if (updateError) {
                    console.error('Ошибка обновления баланса:', updateError);
                    return;
                }

                state.user.balance = newBalance;
                updateBalanceDisplay();

                const { data: betData, error: betError } = await supabase
                    .from('bets')
                    .insert([{
                        user_id: state.user.id,
                        user_name: state.user.username,
                        user_avatar: state.user.avatar,
                        amount: room.bet,
                        game_type: '1v1',
                        room_id: roomId,
                        status: 'active'
                    }])
                    .select();

                if (betError) {
                    console.error('Ошибка присоединения к комнате:', betError);
                    const { error: revertError } = await supabase
                        .from('users')
                        .update({ balance: state.user.balance + room.bet })
                        .eq('id', state.user.id);
                    state.user.balance += room.bet;
                    updateBalanceDisplay();
                    return;
                }

                room.opponent = {
                    id: state.user.id,
                    username: state.user.username,
                    avatar: state.user.avatar
                };
                if (betData) {
                    room.betIds.push(betData[0].id);
                }
                room.status = 'countdown';
                room.timer = 3;
                startRoomCountdown(room);
                updateUI();
            }

            function startRoomCountdown(room) {
                clearRoomInterval(room);
                room.intervalId = setInterval(() => {
                    room.timer--;
                    updateUI();
                    if (room.timer <= 0) {
                        clearRoomInterval(room);
                        runRoomGame(room);
                    }
                }, 1000);
            }

            async function runRoomGame(room) {
                room.status = 'spinning';
                updateUI();
                const bets = [
                    { user: room.creator, amount: room.bet },
                    { user: room.opponent, amount: room.bet }
                ];
                const tickets = buildTicketArray(bets);
                const allUsers = [];
                for (let i = 0; i < room.bet; i++) allUsers.push(room.creator);
                for (let i = 0; i < room.bet; i++) allUsers.push(room.opponent);
                const winner = allUsers[Math.floor(Math.random() * allUsers.length)];
                room.winner = winner;

                setTimeout(() => {
                    const trackEl = document.getElementById(room.trackId);
                    const viewportEl = document.getElementById(room.viewportId);
                    const arrowEl = document.getElementById(room.arrowId);
                    const arrowAboveEl = document.getElementById(room.arrowAboveId);
                    if (trackEl && viewportEl) {
                        if (arrowEl) arrowEl.style.display = 'block';
                        if (arrowAboveEl) arrowAboveEl.style.display = 'block';
                        animateRoulette(trackEl, viewportEl, arrowEl, tickets, winner.avatar, async () => {
                            room.status = 'finished';

                            const { error: updateBetsError } = await supabase
                                .from('bets')
                                .update({ status: 'completed', is_winner: false })
                                .eq('room_id', room.id)
                                .eq('game_type', '1v1')
                                .eq('status', 'active');

                            if (updateBetsError) {
                                console.error('Ошибка обновления ставок:', updateBetsError);
                            }

                            const { error: updateWinnerError } = await supabase
                                .from('bets')
                                .update({ is_winner: true, won_amount: room.bet * 2 })
                                .eq('room_id', room.id)
                                .eq('user_id', winner.id)
                                .eq('game_type', '1v1')
                                .eq('status', 'completed');

                            if (updateWinnerError) {
                                console.error('Ошибка обновления победителя:', updateWinnerError);
                            }

                            if (room.winner.id === state.user.id) {
                                const newBalance = state.user.balance + room.bet * 2;
                                const { error: balanceError } = await supabase
                                    .from('users')
                                    .update({ balance: newBalance })
                                    .eq('id', state.user.id);

                                if (!balanceError) {
                                    state.user.balance = newBalance;
                                }
                            }
                            updateUI();
                            setTimeout(() => {
                                if (arrowAboveEl) arrowAboveEl.style.display = 'none';
                                state.rooms = state.rooms.filter(r => r.id !== room.id);
                                updateUI();
                            }, 5000);
                        });
                    }
                }, 100);
            }

            function clearRoomInterval(room) { if (room.intervalId) { clearInterval(room.intervalId);
                    room.intervalId = null; } }

            function renderRooms() {
                roomsList.innerHTML = '';
                if (!state.rooms.length) {
                    roomsList.innerHTML = '<div style="color:#7f8690;">Нет комнат</div>';
                    return;
                }

                state.rooms.forEach(room => {
                    const d = document.createElement('div');
                    d.className = 'room-card';
                    d.dataset.roomId = room.id;
                    const isCreator = state.user && room.creator.id === state.user.id;
                    const isInitiator = state.user && room.opponent && room.opponent.id === state.user.id;
                    const canJoin = !isCreator && !isInitiator && room.status === 'waiting';
                    d.innerHTML = `
                        <div class="room-header">
                            <div>
                                <span>${room.creator.avatar}</span> 
                                <strong>${room.creator.username}${isCreator ? ' (Вы)' : ''}</strong> 
                                (${room.bet}💰)
                                ${room.opponent ? ` VS <span>${room.opponent.avatar}</span> <strong>${room.opponent.username}${isInitiator ? ' (Вы)' : ''}</strong>` : ''}
                            </div>
                            <div style="display:flex;gap:6px;align-items:center;">
                                <span style="font-size:12px;">${
                                    room.status === 'waiting' ? '⏳ Ожидание' : 
                                    room.status === 'countdown' ? `🔴 ${room.timer}с` : 
                                    room.status === 'spinning' ? '🎰 Крутим...' : '✅ Завершено'
                                }</span>
                                <button class="btn join-btn" data-id="${room.id}" ${!canJoin ? 'disabled' : ''}>⚔️ Играть</button>
                                <button class="btn watch-btn" data-id="${room.id}" style="background:#4a5068;">👁</button>
                            </div>
                        </div>
                        <div class="roulette-wrapper" style="height:70px;border:1px solid #2f3748;">
                            <div class="roulette-arrow-above" id="${room.arrowAboveId}" style="display:${room.status === 'spinning' ? 'block' : 'none'};">▼</div>
                            <div class="roulette-arrow-top" id="${room.arrowId}" style="display:${room.status === 'spinning' ? 'block' : 'none'};">▼</div>
                            <div class="ticker-viewport" id="${room.viewportId}">
                                <div class="ticker-track" id="${room.trackId}"></div>
                            </div>
                        </div>`;
                    roomsList.appendChild(d);
                });

                document.querySelectorAll('.join-btn').forEach(b => {
                    b.addEventListener('click', (e) => {
                        const roomId = parseInt(e.target.dataset.id);
                        joinRoom(roomId);
                    });
                });

                document.querySelectorAll('.watch-btn').forEach(b => b.addEventListener('click', e => {
                    const room = state.rooms.find(r => r.id === parseInt(e.target.dataset.id));
                    if (room) openSpectator(room);
                }));
            }

            function openSpectator(room) {
                const totalBet = room.bet * 2;
                const creatorPercent = ((room.bet / totalBet) * 100).toFixed(1);
                const opponentPercent = room.opponent ? ((room.bet / totalBet) * 100).toFixed(1) : '0.0';
                spectatorContainer.innerHTML = `<div class="spectator-overlay"><div class="spectator-card">
                    <h2>👁 Комната #${room.id}</h2>
                    <div class="spec-bet-row">
                        <div class="bet-user"><span class="avatar-circle" style="width:30px;height:30px;font-size:16px;">${room.creator.avatar}</span> ${room.creator.username}</div>
                        <span>${room.bet}</span>
                        <span>Билеты: 1-${room.bet}</span>
                        <span style="color:#f0b34b;">${creatorPercent}%</span>
                    </div>
                    ${room.opponent ? `<div class="spec-bet-row">
                        <div class="bet-user"><span class="avatar-circle" style="width:30px;height:30px;font-size:16px;">${room.opponent.avatar}</span> ${room.opponent.username}</div>
                        <span>${room.bet}</span>
                        <span>Билеты: ${room.bet + 1}-${room.bet * 2}</span>
                        <span style="color:#f0b34b;">${opponentPercent}%</span>
                    </div>` : '<div style="color:#7f8690;">Ожидание второго игрока...</div>'}
                    <button class="btn" onclick="this.parentElement.parentElement.remove()">Закрыть</button>
                </div></div>`;
            }

            async function registerByNickname(nickname, password) {
                try {
                    const { data, error } = await supabase
                        .rpc('register_by_nickname', {
                            nick: nickname,
                            pass: password
                        });

                    if (error) {
                        console.error('Ошибка регистрации:', error);
                        return { success: false, message: 'Ошибка сервера при регистрации' };
                    }

                    if (data && data.length > 0) {
                        const result = data[0];
                        if (result.success) {
                            const { data: userData } = await supabase
                                .from('users')
                                .select('*')
                                .eq('id', result.user_id)
                                .single();

                            return {
                                success: true,
                                user: {
                                    id: result.user_id,
                                    username: nickname,
                                    balance: userData ? userData.balance : 1000,
                                    avatar: userData ? userData.avatar : '🐺'
                                }
                            };
                        } else {
                            return { success: false, message: result.message };
                        }
                    }
                    return { success: false, message: 'Неизвестная ошибка' };
                } catch (err) {
                    console.error('Исключение при регистрации:', err);
                    const { data: existingUser } = await supabase
                        .from('user_nicknames')
                        .select('user_id')
                        .eq('nickname', nickname)
                        .single();

                    if (existingUser) {
                        return { success: false, message: 'Никнейм уже занят' };
                    }

                    const { data: newUser, error: insertError } = await supabase
                        .from('users')
                        .insert([{
                            id: crypto.randomUUID ? crypto.randomUUID() : 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, function(c) { var r = Math.random() * 16 | 0, v = c == 'x' ? r : (r & 0x3 | 0x8); return v.toString(16); }),
                            username: nickname,
                            balance: 1000,
                            avatar: '🐺'
                        }])
                        .select();

                    if (insertError || !newUser || newUser.length === 0) {
                        return { success: false, message: 'Ошибка создания пользователя' };
                    }

                    const { error: nicknameError } = await supabase
                        .from('user_nicknames')
                        .insert([{
                            user_id: newUser[0].id,
                            nickname: nickname,
                            password_hash: password
                        }]);

                    if (nicknameError) {
                        await supabase.from('users').delete().eq('id', newUser[0].id);
                        return { success: false, message: 'Никнейм уже занят' };
                    }

                    return {
                        success: true,
                        user: {
                            id: newUser[0].id,
                            username: nickname,
                            balance: 1000,
                            avatar: '🐺'
                        }
                    };
                }
            }

            async function loginByNickname(nickname, password) {
                try {
                    const { data: nicknameData, error: nickError } = await supabase
                        .from('user_nicknames')
                        .select('user_id, password_hash')
                        .eq('nickname', nickname)
                        .single();

                    if (nickError || !nicknameData) {
                        return { success: false, message: 'Неверный никнейм или пароль' };
                    }

                    if (nicknameData.password_hash !== password) {
                        return { success: false, message: 'Неверный пароль' };
                    }

                    const { data: userData, error: userError } = await supabase
                        .from('users')
                        .select('*')
                        .eq('id', nicknameData.user_id)
                        .single();

                    if (userError || !userData) {
                        return { success: false, message: 'Пользователь не найден' };
                    }

                    return {
                        success: true,
                        user: {
                            id: userData.id,
                            username: userData.username,
                            balance: userData.balance,
                            avatar: userData.avatar
                        }
                    };
                } catch (err) {
                    console.error('Ошибка входа:', err);
                    return { success: false, message: 'Ошибка сервера при входе' };
                }
            }

            function showAuthForm() {
                authContainer.innerHTML = `
                    <div class="auth-overlay">
                        <div class="auth-card">
                            <h2 style="text-align:center;color:#f0b34b;">🎰 case-wins</h2>
                            <p style="text-align:center;color:#7f8690;font-size:14px;">Регистрация и вход по никнейму</p>
                            <div class="auth-error" id="authError"></div>
                            <input type="text" class="auth-input" id="authNickname" placeholder="Никнейм" autocomplete="off" maxlength="20">
                            <input type="password" class="auth-input" id="authPassword" placeholder="Пароль" maxlength="50">
                            <button class="btn" id="authSignUpBtn" style="padding:12px;font-size:16px;">📝 Регистрация</button>
                            <button class="btn" id="authSignInBtn" style="padding:12px;font-size:16px;background:#4a5068;">🔑 Войти</button>
                        </div>
                    </div>`;

                const errorDiv = document.getElementById('authError');
                const nicknameInput = document.getElementById('authNickname');
                const passwordInput = document.getElementById('authPassword');

                function showError(msg) {
                    errorDiv.textContent = msg;
                    errorDiv.classList.add('show');
                    setTimeout(() => errorDiv.classList.remove('show'), 3000);
                }

                document.getElementById('authSignUpBtn').addEventListener('click', async () => {
                    const nickname = nicknameInput.value.trim();
                    const password = passwordInput.value;

                    if (!nickname || !password) return showError('Заполните все поля');
                    if (nickname.length < 3) return showError('Никнейм должен быть не менее 3 символов');
                    if (password.length < 4) return showError('Пароль должен быть не менее 4 символов');

                    const result = await registerByNickname(nickname, password);

                    if (result.success) {
                        state.user = result.user;
                        state.sessionToken = generateSessionToken();
                        localStorage.setItem('casewins_session', JSON.stringify({
                            userId: state.user.id,
                            username: state.user.username,
                            token: state.sessionToken
                        }));
                        authContainer.innerHTML = '';
                        mainApp.style.display = 'flex';
                        await initializeGameData();
                        initRealtimeChannels();
                        updateUI();
                    } else {
                        showError(result.message);
                    }
                });

                document.getElementById('authSignInBtn').addEventListener('click', async () => {
                    const nickname = nicknameInput.value.trim();
                    const password = passwordInput.value;

                    if (!nickname || !password) return showError('Заполните все поля');

                    const result = await loginByNickname(nickname, password);

                    if (result.success) {
                        state.user = result.user;
                        state.sessionToken = generateSessionToken();
                        localStorage.setItem('casewins_session', JSON.stringify({
                            userId: state.user.id,
                            username: state.user.username,
                            token: state.sessionToken
                        }));
                        authContainer.innerHTML = '';
                        mainApp.style.display = 'flex';
                        await initializeGameData();
                        initRealtimeChannels();
                        updateUI();
                    } else {
                        showError(result.message);
                    }
                });
            }

            async function initializeGameData() {
                await loadActiveClassicBets();
                await loadActiveRooms();
            }

            function initRealtimeChannels() {
                if (state.classicChannel) {
                    supabase.removeChannel(state.classicChannel);
                }
                if (state.roomsChannel) {
                    supabase.removeChannel(state.roomsChannel);
                }
                if (state.balanceChannel) {
                    supabase.removeChannel(state.balanceChannel);
                }

                state.classicChannel = supabase
                    .channel('classic-bets-channel')
                    .on('postgres_changes',
                        { event: 'INSERT', schema: 'public', table: 'bets', filter: 'game_type=eq.classic' },
                        (payload) => {
                            const newBet = payload.new;
                            const alreadyExists = state.classicBets.some(b => b.id === newBet.id);
                            if (!alreadyExists && newBet.status === 'active') {
                                state.classicBets.push({
                                    id: newBet.id,
                                    user: {
                                        id: newBet.user_id,
                                        username: newBet.user_name,
                                        avatar: newBet.user_avatar
                                    },
                                    amount: newBet.amount
                                });
                                updateUI();
                                if (state.classicBets.length >= 2 && !state.classicInterval && !state.classicSpinning) {
                                    startClassicCountdown();
                                }
                            }
                        })
                    .on('postgres_changes',
                        { event: 'UPDATE', schema: 'public', table: 'bets', filter: 'game_type=eq.classic' },
                        (payload) => {
                            const updatedBet = payload.new;
                            if (updatedBet.status === 'completed') {
                                state.classicBets = state.classicBets.filter(b => b.id !== updatedBet.id);
                                updateUI();
                                if (state.classicBets.length === 0) {
                                    clearClassicInterval();
                                    state.classicSpinning = false;
                                    classicPlaceBetBtn.disabled = false;
                                    classicTimerDisplay.style.display = 'block';
                                    classicTimerDisplay.textContent = '⏳ 3';
                                    updateTimerStrip(3);
                                    rouletteArrowTop.style.display = 'none';
                                    rouletteArrowAbove.style.display = 'none';
                                    const existingWinner = document.querySelector('#tickerViewport .winner-avatar-center');
                                    if (existingWinner) existingWinner.remove();
                                    tickerTrack.innerHTML = '';
                                    tickerTrack.style.transform = 'translateX(0px)';
                                }
                            }
                        })
                    .subscribe((status) => {
                        console.log('Classic channel status:', status);
                    });

                state.roomsChannel = supabase
                    .channel('rooms-channel')
                    .on('postgres_changes',
                        { event: 'INSERT', schema: 'public', table: 'bets', filter: 'game_type=eq.1v1' },
                        (payload) => {
                            const newBet = payload.new;
                            const existingRoom = state.rooms.find(r => r.id === newBet.room_id);

                            if (!existingRoom && newBet.status === 'active') {
                                const newRoom = {
                                    id: newBet.room_id,
                                    creator: {
                                        id: newBet.user_id,
                                        username: newBet.user_name,
                                        avatar: newBet.user_avatar
                                    },
                                    opponent: null,
                                    bet: newBet.amount,
                                    status: 'waiting',
                                    timer: 3,
                                    intervalId: null,
                                    winner: null,
                                    trackId: `roomTrack${newBet.room_id}`,
                                    viewportId: `roomViewport${newBet.room_id}`,
                                    arrowId: `roomArrow${newBet.room_id}`,
                                    arrowAboveId: `roomArrowAbove${newBet.room_id}`,
                                    betIds: [newBet.id]
                                };
                                state.rooms.push(newRoom);
                                if (state.nextRoomId <= newBet.room_id) {
                                    state.nextRoomId = newBet.room_id + 1;
                                }
                                updateUI();
                            } else if (existingRoom && existingRoom.status === 'waiting') {
                                const isNewPlayer = existingRoom.creator.id !== newBet.user_id;
                                if (isNewPlayer) {
                                    existingRoom.opponent = {
                                        id: newBet.user_id,
                                        username: newBet.user_name,
                                        avatar: newBet.user_avatar
                                    };
                                    existingRoom.betIds.push(newBet.id);
                                    existingRoom.status = 'countdown';
                                    existingRoom.timer = 3;
                                    startRoomCountdown(existingRoom);
                                    updateUI();
                                }
                            }
                        })
                    .on('postgres_changes',
                        { event: 'UPDATE', schema: 'public', table: 'bets', filter: 'game_type=eq.1v1' },
                        (payload) => {
                            const updatedBet = payload.new;
                            if (updatedBet.status === 'completed') {
                                const roomToRemove = state.rooms.find(r => r.betIds.includes(updatedBet.id));
                                if (roomToRemove && roomToRemove.status === 'finished') {
                                    state.rooms = state.rooms.filter(r => r.id !== roomToRemove.id);
                                    updateUI();
                                }
                            }
                        })
                    .subscribe((status) => {
                        console.log('Rooms channel status:', status);
                    });

                if (state.user) {
                    state.balanceChannel = supabase
                        .channel('balance-channel-' + state.user.id)
                        .on('postgres_changes',
                            { event: 'UPDATE', schema: 'public', table: 'users', filter: `id=eq.${state.user.id}` },
                            (payload) => {
                                const updatedUser = payload.new;
                                if (updatedUser.balance !== state.user.balance) {
                                    state.user.balance = updatedUser.balance;
                                    updateBalanceDisplay();
                                }
                            })
                        .subscribe((status) => {
                            console.log('Balance channel status:', status);
                        });
                }
            }

            async function restoreSession() {
                const savedSession = localStorage.getItem('casewins_session');
                if (savedSession) {
                    try {
                        const sessionData = JSON.parse(savedSession);
                        const { data: userData } = await supabase
                            .from('users')
                            .select('*')
                            .eq('id', sessionData.userId)
                            .single();

                        if (userData) {
                            state.user = {
                                id: userData.id,
                                username: userData.username,
                                balance: userData.balance,
                                avatar: userData.avatar
                            };
                            state.sessionToken = sessionData.token;
                            mainApp.style.display = 'flex';
                            await initializeGameData();
                            initRealtimeChannels();
                            updateUI();
                            return true;
                        }
                    } catch (e) {
                        console.error('Ошибка восстановления сессии:', e);
                        localStorage.removeItem('casewins_session');
                    }
                }
                return false;
            }

            async function initApp() {
                const sessionRestored = await restoreSession();
                if (!sessionRestored) {
                    showAuthForm();
                }
            }

            document.getElementById('createRoomBtn').addEventListener('click', createRoom);
            document.getElementById('logoutBtn').addEventListener('click', async () => {
                localStorage.removeItem('casewins_session');
                if (state.classicChannel) supabase.removeChannel(state.classicChannel);
                if (state.roomsChannel) supabase.removeChannel(state.roomsChannel);
                if (state.balanceChannel) supabase.removeChannel(state.balanceChannel);
                state.user = null;
                state.sessionToken = null;
                state.classicBets = [];
                state.rooms = [];
                state.classicSpinning = false;
                clearClassicInterval();
                mainApp.style.display = 'none';
                showAuthForm();
            });

            updateTimerStrip(3);
            initApp();
        })();
    </script>
</body>
</html>
