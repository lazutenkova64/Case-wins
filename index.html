<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>CS2 Case Opening | Открытие кейсов с анимацией</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      background: radial-gradient(circle at 20% 20%, #1e2430, #0b0e14);
      min-height: 100vh;
      color: #e0e0e0;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      padding: 20px;
    }
    .container {
      max-width: 1100px;
      margin: 0 auto;
      background: rgba(15, 18, 24, 0.8);
      backdrop-filter: blur(24px);
      border-radius: 32px;
      padding: 24px;
      box-shadow: 0 30px 50px rgba(0,0,0,0.7);
      border: 1px solid rgba(230, 180, 30, 0.15);
    }
    h1, h2 {
      background: linear-gradient(180deg, #f7d774 0%, #c99a2b 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      font-weight: 800;
    }
    .nav {
      display: flex;
      gap: 12px;
      margin: 20px 0;
      flex-wrap: wrap;
    }
    .nav button {
      background: #1f2533;
      border: 1px solid #3c4455;
      color: #ddd;
      padding: 12px 28px;
      border-radius: 40px;
      font-weight: bold;
      cursor: pointer;
      transition: 0.2s;
    }
    .nav button.active {
      background: #e8b530;
      border-color: #e8b530;
      color: #0a0a0a;
      font-weight: 800;
    }
    button {
      background: #2a3140;
      border: none;
      color: white;
      padding: 12px 22px;
      border-radius: 30px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }
    button.primary {
      background: linear-gradient(180deg, #f5c842, #c5841a);
      font-weight: 700;
      color: #0f0f0f;
    }
    button:hover {
      filter: brightness(1.2);
    }
    input {
      background: #1a1e28;
      border: 1px solid #3f4657;
      padding: 12px 20px;
      border-radius: 30px;
      color: white;
      margin-right: 10px;
    }
    .user-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 15px;
      margin-bottom: 20px;
      border-bottom: 1px solid #2b3240;
      padding-bottom: 15px;
    }
    .cases-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 25px;
    }
    .case-card {
      background: #181d28;
      border-radius: 24px;
      padding: 20px;
      text-align: center;
      border: 1px solid #30384a;
      cursor: pointer;
      transition: 0.2s;
    }
    .case-card:hover {
      border-color: #f0b90b;
      transform: translateY(-4px);
    }

    /* Окно открытия кейса */
    .modal {
      position: fixed;
      top:0; left:0; width:100%; height:100%;
      background: rgba(0,0,0,0.85);
      backdrop-filter: blur(10px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }
    .modal-content {
      background: #131721;
      border-radius: 32px;
      padding: 25px;
      max-width: 750px;
      width: 90%;
      border: 2px solid #f0b90b;
      text-align: center;
    }
    .roulette-container {
      position: relative;
      width: 100%;
      overflow: hidden;
      margin: 20px 0;
      background: #0b0e14;
      border-radius: 20px;
      padding: 15px 0;
    }
    .items-track {
      display: flex;
      transition: transform 0.1s cubic-bezier(0.2, 0.9, 0.4, 1);
      will-change: transform;
    }
    .roulette-item {
      flex: 0 0 130px;
      margin: 0 4px;
      background: #1d2330;
      border-radius: 16px;
      padding: 15px 5px;
      text-align: center;
      border: 2px solid #2e3645;
      font-size: 14px;
    }
    .roulette-item .emoji {
      font-size: 45px;
      display: block;
    }
    .pointer {
      position: absolute;
      left: 50%;
      top: 0;
      bottom: 0;
      width: 4px;
      background: #f0b90b;
      box-shadow: 0 0 25px #f0b90b;
      z-index: 10;
      transform: translateX(-50%);
      border-radius: 4px;
    }
    .inventory-list {
      display: flex;
      flex-wrap: wrap;
      gap: 15px;
      margin-top: 15px;
    }
    .item-card {
      background: #1b1f2d;
      border-radius: 18px;
      padding: 12px 18px;
      display: flex;
      align-items: center;
      gap: 12px;
      border-left: 6px solid gray;
    }
    .rarity-common { border-left-color: #9e9e9e; }
    .rarity-mil { border-left-color: #4b69ff; }
    .rarity-restricted { border-left-color: #8845ff; }
    .rarity-classified { border-left-color: #d32ce6; }
    .rarity-covert { border-left-color: #eb4b4b; }
    .rarity-gold { border-left-color: #f3b23f; }
  </style>
</head>
<body>
<div class="container">
  <div class="user-bar">
    <h1 style="margin:0;">🔫 CASE OPENER</h1>
    <div id="authBlock"></div>
  </div>

  <div id="loginBox" style="display:none; background:#181d28; padding:20px; border-radius:20px; margin-bottom:20px;"></div>

  <div id="appContent" style="display:none;">
    <div class="nav">
      <button id="btnCases" class="active">📦 Кейсы</button>
      <button id="btnInventory">🎒 Инвентарь</button>
      <span style="margin-left:auto; font-weight:bold; font-size:18px; color:#f0b90b;">💰 <span id="balDisplay">0</span> ₽</span>
    </div>

    <div id="viewCases" style="display:block;"></div>
    <div id="viewInventory" style="display:none;"></div>
  </div>
</div>

<!-- Модальное окно открытия -->
<div id="caseModal" class="modal" style="display: none;">
  <div class="modal-content">
    <h2 id="modalCaseName"></h2>
    <div class="roulette-container" id="rouletteWrapper">
      <div class="pointer"></div>
      <div class="items-track" id="rouletteTrack"></div>
    </div>
    <button class="primary" id="btnOpenCase" style="font-size:20px; padding:14px 40px;">🔓 Открыть кейс</button>
    <button id="btnCloseModal" style="margin-left:15px;">Закрыть</button>
    <p id="resultText" style="margin-top:15px; font-weight:bold;"></p>
  </div>
</div>

<script>
  (() => {
    // База предметов
    const ITEMS = [
      { id:'awp_dragon', name:'AWP | Dragon Lore', rarity:'covert', price:13500, emoji:'🐉' },
      { id:'ak_fire', name:'AK-47 | Fire Serpent', rarity:'covert', price:10200, emoji:'🔥' },
      { id:'m4_howl', name:'M4A4 | Howl', rarity:'covert', price:15800, emoji:'🐺' },
      { id:'knife_karambit', name:'Karambit | Doppler', rarity:'gold', price:47000, emoji:'🔪' },
      { id:'glock_fade', name:'Glock-18 | Fade', rarity:'restricted', price:3400, emoji:'🌈' },
      { id:'deagle_blaze', name:'Desert Eagle | Blaze', rarity:'mil', price:5300, emoji:'🔥' },
      { id:'usp_kill', name:'USP-S | Kill Confirmed', rarity:'covert', price:8200, emoji:'💀' },
      { id:'ak_vulcan', name:'AK-47 | Vulcan', rarity:'classified', price:6700, emoji:'🌋' },
      { id:'m4_neo', name:'M4A1-S | Hyper Beast', rarity:'classified', price:4500, emoji:'👾' },
      { id:'awp_asiimov', name:'AWP | Asiimov', rarity:'classified', price:5800, emoji:'⬜' },
      { id:'p250_sand', name:'P250 | Sand Dune', rarity:'common', price:20, emoji:'🏜️' },
      { id:'mp7_forest', name:'MP7 | Forest DDPAT', rarity:'common', price:40, emoji:'🌿' },
      { id:'nova_walnut', name:'Nova | Walnut', rarity:'common', price:50, emoji:'🪵' },
      { id:'five_seven', name:'Five-SeveN | Case Hardened', rarity:'mil', price:2700, emoji:'🔫' },
      { id:'tec9_toxic', name:'Tec-9 | Toxic', rarity:'restricted', price:1300, emoji:'☣️' }
    ];

    const CASES = [
      { id:'case_gamma', name:'Gamma Case', price:350, image:'📦', items:[
        {itemId:'glock_fade',weight:8},{itemId:'awp_asiimov',weight:5},{itemId:'ak_vulcan',weight:5},
        {itemId:'deagle_blaze',weight:9},{itemId:'five_seven',weight:17},{itemId:'p250_sand',weight:28},{itemId:'mp7_forest',weight:28}
      ]},
      { id:'case_legend', name:'Legend Case', price:650, image:'🧰', items:[
        {itemId:'awp_dragon',weight:2},{itemId:'ak_fire',weight:3},{itemId:'m4_howl',weight:3},
        {itemId:'usp_kill',weight:8},{itemId:'m4_neo',weight:10},{itemId:'tec9_toxic',weight:17},
        {itemId:'nova_walnut',weight:27},{itemId:'p250_sand',weight:30}
      ]},
      { id:'case_knife', name:'Knife Dream', price:1300, image:'💎', items:[
        {itemId:'knife_karambit',weight:1},{itemId:'awp_dragon',weight:4},{itemId:'deagle_blaze',weight:10},
        {itemId:'ak_vulcan',weight:14},{itemId:'glock_fade',weight:20},{itemId:'mp7_forest',weight:25},{itemId:'p250_sand',weight:26}
      ]}
    ];

    const STORAGE_USERS = 'cs2_users';
    const STORAGE_CURRENT = 'cs2_current';
    let currentUser = null;
    let activeCase = null;
    let isSpinning = false;
    let spinAnimation = null;

    function getUsers(){ return JSON.parse(localStorage.getItem(STORAGE_USERS)||'{}'); }
    function saveUsers(u){ localStorage.setItem(STORAGE_USERS, JSON.stringify(u)); }
    function getItem(id){ return ITEMS.find(i=>i.id===id); }

    function login(username){
      const users = getUsers();
      if(!users[username]) users[username] = { balance:5000, inventory:[] };
      saveUsers(users);
      currentUser = { username, balance:users[username].balance, inventory:users[username].inventory||[] };
      localStorage.setItem(STORAGE_CURRENT, username);
      renderAll();
    }
    function logout(){
      currentUser=null; localStorage.removeItem(STORAGE_CURRENT); renderAll();
    }
    function persist(){
      if(!currentUser) return;
      const users=getUsers();
      users[currentUser.username]={ balance:currentUser.balance, inventory:currentUser.inventory };
      saveUsers(users);
    }

    function openCaseModal(caseData){
      if(!currentUser) return alert('Войдите');
      if(currentUser.balance < caseData.price) return alert('Недостаточно средств');
      activeCase = caseData;
      document.getElementById('modalCaseName').innerText = caseData.name;
      document.getElementById('resultText').innerText = '';
      document.getElementById('btnOpenCase').disabled = false;
      buildRouletteTrack(caseData);
      document.getElementById('caseModal').style.display = 'flex';
    }

    function buildRouletteTrack(caseData){
      const track = document.getElementById('rouletteTrack');
      // Генерируем полоску из предметов (много копий для анимации)
      let itemsHtml = '';
      for(let i=0;i<35;i++){
        caseData.items.forEach(entry=>{
          const item = getItem(entry.itemId);
          if(item) itemsHtml += `<div class="roulette-item"><span class="emoji">${item.emoji}</span>${item.name.split('|')[0]}</div>`;
        });
      }
      track.innerHTML = itemsHtml;
      track.style.transform = 'translateX(0px)';
    }

    function spinRoulette(){
      if(!activeCase || isSpinning) return;
      if(currentUser.balance < activeCase.price) return alert('Недостаточно средств');
      isSpinning = true;
      document.getElementById('btnOpenCase').disabled = true;
      document.getElementById('resultText').innerText = '⏳ Крутим...';

      // Списываем деньги
      currentUser.balance -= activeCase.price;
      persist();
      updateBalanceDisplay();

      // Выбираем победителя по весам
      const totalWeight = activeCase.items.reduce((s,it)=>s+it.weight,0);
      let rand = Math.random()*totalWeight;
      let winEntry = null;
      for(let e of activeCase.items){
        rand -= e.weight;
        if(rand <= 0){ winEntry = e; break; }
      }
      const winItem = getItem(winEntry.itemId);
      
      // Вычисляем позицию в полосе: находим индекс первого совпадения в треке
      const trackItems = document.querySelectorAll('.roulette-item');
      let targetIndex = -1;
      for(let i=0;i<trackItems.length;i++){
        if(trackItems[i].innerText.includes(winItem.name.split('|')[0].trim())){
          targetIndex = i;
          break;
        }
      }
      if(targetIndex===-1) targetIndex = Math.floor(Math.random()*trackItems.length);
      
      const itemWidth = 138; // ширина элемента + margin
      // Смещение чтобы выбранный элемент оказался по центру (под стрелкой)
      const containerWidth = document.getElementById('rouletteWrapper').clientWidth;
      const centerOffset = containerWidth/2 - itemWidth/2;
      let targetPosition = -(targetIndex * itemWidth) + centerOffset;
      
      // Добавляем несколько полных прокруток для эффекта
      const extraSpins = 3 * (trackItems.length * itemWidth);
      targetPosition -= extraSpins;

      const track = document.getElementById('rouletteTrack');
      track.style.transition = 'transform 4s cubic-bezier(0.12, 0.8, 0.2, 1)';
      track.style.transform = `translateX(${targetPosition}px)`;

      setTimeout(()=>{
        // Добавляем предмет в инвентарь
        currentUser.inventory.push({
          uid: Date.now()+Math.random().toString(36),
          itemId: winItem.id,
          acquired: new Date().toISOString()
        });
        persist();
        document.getElementById('resultText').innerHTML = `🎉 Вы выбили: ${winItem.emoji} <strong>${winItem.name}</strong> (${winItem.price} ₽)`;
        isSpinning = false;
        document.getElementById('btnOpenCase').disabled = false;
        renderInventoryView();
        updateBalanceDisplay();
      }, 4200);
    }

    function closeModal(){
      document.getElementById('caseModal').style.display = 'none';
      activeCase = null;
      renderCasesView();
    }

    function sellItem(uid){
      if(!currentUser) return;
      const idx = currentUser.inventory.findIndex(i=>i.uid===uid);
      if(idx===-1) return;
      const inv = currentUser.inventory[idx];
      const item = getItem(inv.itemId);
      currentUser.balance += item.price;
      currentUser.inventory.splice(idx,1);
      persist();
      renderInventoryView();
      updateBalanceDisplay();
    }

    function renderCasesView(){
      const container = document.getElementById('viewCases');
      container.innerHTML = `<div class="cases-grid">` + CASES.map(c=>`
        <div class="case-card" onclick="window.siteOpenCaseModal('${c.id}')">
          <div style="font-size:60px;">${c.image}</div>
          <h3>${c.name}</h3>
          <p>Цена: ${c.price} ₽</p>
        </div>
      `).join('') + `</div>`;
    }

    function renderInventoryView(){
      const invDiv = document.getElementById('viewInventory');
      if(!currentUser || currentUser.inventory.length===0){
        invDiv.innerHTML = '<p style="color:#888;">Инвентарь пуст</p>'; return;
      }
      invDiv.innerHTML = '<div class="inventory-list">' + currentUser.inventory.map(inv=>{
        const item = getItem(inv.itemId);
        return `<div class="item-card rarity-${item.rarity}">
          <span style="font-size:32px;">${item.emoji}</span>
          <div><strong>${item.name}</strong><br><span style="color:#f0b90b;">${item.price} ₽</span></div>
          <button style="margin-left:auto;" onclick="window.siteSellItem('${inv.uid}')">Продать</button>
        </div>`;
      }).join('') + '</div>';
    }

    function updateBalanceDisplay(){
      const el = document.getElementById('balDisplay');
      if(el && currentUser) el.innerText = currentUser.balance;
    }

    function renderAll(){
      const authBlock = document.getElementById('authBlock');
      const loginBox = document.getElementById('loginBox');
      const appContent = document.getElementById('appContent');
      if(currentUser){
        authBlock.innerHTML = `<span>👤 ${currentUser.username}</span> <button onclick="window.siteLogout()">Выйти</button>`;
        loginBox.style.display='none';
        appContent.style.display='block';
        updateBalanceDisplay();
        renderCasesView();
        renderInventoryView();
      } else {
        authBlock.innerHTML = '';
        loginBox.style.display='block';
        appContent.style.display='none';
        loginBox.innerHTML = `
          <input id="usernameInput" placeholder="Никнейм" maxlength="14">
          <button class="primary" onclick="window.siteLogin()">Войти / Регистрация</button>
          <p style="color:#aaa; margin-top:8px;">Новый аккаунт получит 5000 ₽</p>
        `;
      }
    }

    // Переключение вкладок
    document.getElementById('btnCases').addEventListener('click', ()=>{
      document.getElementById('viewCases').style.display='block';
      document.getElementById('viewInventory').style.display='none';
      document.getElementById('btnCases').classList.add('active');
      document.getElementById('btnInventory').classList.remove('active');
    });
    document.getElementById('btnInventory').addEventListener('click', ()=>{
      document.getElementById('viewCases').style.display='none';
      document.getElementById('viewInventory').style.display='block';
      document.getElementById('btnInventory').classList.add('active');
      document.getElementById('btnCases').classList.remove('active');
      renderInventoryView();
    });
    document.getElementById('btnCloseModal').addEventListener('click', closeModal);
    document.getElementById('btnOpenCase').addEventListener('click', spinRoulette);

    window.siteLogin = ()=>{
      const name = document.getElementById('usernameInput')?.value.trim();
      if(name && name.length>=2) login(name);
    };
    window.siteLogout = ()=> logout();
    window.siteOpenCaseModal = (caseId)=>{
      const c = CASES.find(c=>c.id===caseId);
      if(c) openCaseModal(c);
    };
    window.siteSellItem = (uid)=> sellItem(uid);

    // Восстановление сессии
    const saved = localStorage.getItem(STORAGE_CURRENT);
    if(saved){
      const users = getUsers();
      if(users[saved]){
        currentUser = { username:saved, balance:users[saved].balance, inventory:users[saved].inventory||[] };
      }
    }
    renderAll();
  })();
</script>
</body>
</html>
