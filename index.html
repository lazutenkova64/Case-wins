<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>CS2 Case Opening — Полный функционал</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: radial-gradient(circle at 20% 20%, #1a1f2b, #0a0d14);
      min-height: 100vh;
      color: #e0e0e0;
      font-family: 'Segoe UI', system-ui, sans-serif;
      display: flex;
      justify-content: center;
      padding: 20px 15px;
    }
    .app {
      max-width: 1100px;
      width: 100%;
      background: rgba(14, 17, 23, 0.85);
      backdrop-filter: blur(25px);
      border-radius: 40px;
      padding: 24px 22px 30px;
      box-shadow: 0 30px 45px rgba(0,0,0,0.8);
      border: 1px solid rgba(220,180,40,0.2);
    }
    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 18px;
      margin-bottom: 28px;
      border-bottom: 1px solid rgba(255,200,0,0.15);
      padding-bottom: 18px;
    }
    h1 {
      background: linear-gradient(180deg, #f9e076, #c5921a);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      font-weight: 900; font-size: 2rem; letter-spacing: 1px;
    }
    .nav { display: flex; gap: 8px; background: #151a24; border-radius: 50px; padding: 5px; flex-wrap: wrap; }
    .nav-btn {
      background: transparent; border: none; color: #aaa; font-weight: 700;
      padding: 12px 24px; border-radius: 40px; cursor: pointer; transition: 0.2s; font-size: 14px;
    }
    .nav-btn.active { background: #f0b90b; color: #0a0a0a; box-shadow: 0 0 20px rgba(240,185,11,0.5); }
    button {
      background: #232b38; border: none; color: #eee; padding: 10px 20px;
      border-radius: 30px; font-weight: 600; cursor: pointer; transition: 0.2s; font-size: 14px;
    }
    button:hover { filter: brightness(1.3); }
    button.primary { background: linear-gradient(180deg, #f5cb42, #c5851b); color: #111; font-weight: 800; }
    button.danger { background: #4a2e2e; color: #faa; }
    input, select {
      background: #151b25; border: 1px solid #3f4858; padding: 10px 16px;
      border-radius: 30px; color: white; outline: none;
    }
    .balance { font-size: 1.2rem; font-weight: bold; color: #f0b90b; background: #0f1219; padding: 8px 20px; border-radius: 30px; }
    .cases-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 20px; }
    .case-card {
      background: #181e29; border-radius: 24px; padding: 20px 12px; text-align: center;
      border: 1px solid #303a4c; cursor: pointer; transition: 0.25s;
    }
    .case-card:hover { border-color: #f0b90b; transform: translateY(-5px); }
    .case-img { font-size: 56px; margin-bottom: 6px; }

    .inventory-grid { display: flex; flex-wrap: wrap; gap: 12px; margin-top: 15px; }
    .item-card-compact {
      background: #1b2130; border-radius: 14px; padding: 8px 12px; display: flex;
      align-items: center; gap: 8px; border-left: 4px solid; font-size: 13px;
    }
    .rarity-common { border-left-color: #9e9e9e; } .rarity-mil { border-left-color: #4b69ff; }
    .rarity-restricted { border-left-color: #8845ff; } .rarity-classified { border-left-color: #d32ce6; }
    .rarity-covert { border-left-color: #eb4b4b; } .rarity-gold { border-left-color: #f3b23f; }

    .modal {
      position: fixed; top:0; left:0; right:0; bottom:0; background: rgba(0,0,0,0.92);
      backdrop-filter: blur(12px); display: flex; align-items: center; justify-content: center; z-index: 1000;
    }
    .modal-box {
      background: #111520; border: 2px solid #f0b90b; border-radius: 32px;
      padding: 22px 24px; width: 95%; max-width: 800px; text-align: center;
      box-shadow: 0 0 60px rgba(240,185,11,0.3); max-height: 90vh; overflow-y: auto;
    }
    .roulette-area {
      position: relative; height: 140px; background: #0a0d14; border-radius: 24px;
      margin: 15px 0; overflow: hidden; border: 1px solid #2f3745;
    }
    .pointer-arrow {
      position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%);
      width: 0; height: 0; border-left: 12px solid transparent; border-right: 12px solid transparent;
      border-top: 24px solid #f0b90b; z-index: 30; filter: drop-shadow(0 0 12px #f0b90b);
    }
    .pointer-line {
      position: absolute; left: 50%; top: 0; bottom: 0; width: 3px;
      background: #f0b90b; box-shadow: 0 0 20px #f0b90b; z-index: 20; transform: translateX(-50%);
    }
    .items-track {
      display: flex; align-items: center; height: 100%; will-change: transform;
    }
    .roulette-item {
      flex: 0 0 150px; display: flex; flex-direction: column; align-items: center;
      justify-content: center; padding: 8px 4px; color: #ddd; font-weight: 600;
      background: rgba(30,35,48,0.85); margin: 0 4px; border-radius: 18px; border: 1px solid #3e4657;
    }
    .roulette-item .emoji { font-size: 38px; display: block; }
    .controls { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; margin: 15px 0; }
    .quantity-selector { display: flex; align-items: center; justify-content: center; gap: 10px; margin: 15px 0; }
    .quantity-btn { font-size: 1.5rem; width: 42px; height: 42px; padding: 0; }
    .quantity-value { font-size: 1.8rem; font-weight: 800; color: #f0b90b; min-width: 45px; }
    .result-text { font-size: 1.1rem; margin-top: 12px; font-weight: bold; min-height: 28px; }
    .upgrade-chance { font-size: 1.2rem; color: #f0b90b; margin: 12px 0; }
    .filter-range { display: flex; align-items: center; gap: 10px; margin: 10px 0; flex-wrap: wrap; }
    .filter-range input { width: 100px; }
  </style>
</head>

  let upgradeSelectedItem = null;

  const ITEM_WIDTH = 158;
  const COPIES = 60;
  const SAFE_MARGIN = 8;

  function saveUsers(u) { localStorage.setItem(USERS_KEY, JSON.stringify(u)); }

    if (!username || username.length < 2) return alert('Введите никнейм (минимум 2 символа)');

    if (!users[username]) users[username] = { balance:5000, inventory:[] };
    saveUsers(users);
    currentUser = { username, balance:users[username].balance, inventory:users[username].inventory||[] };
    localStorage.setItem(CURRENT_KEY, username);
    refreshAll();
  }
  function logout() { currentUser = null; localStorage.removeItem(CURRENT_KEY); refreshAll(); }
  function persist() {
    if(!currentUser) return;
    const users = getUsers();
    users[currentUser.username] = { balance:currentUser.balance, inventory:currentUser.inventory };
    saveUsers(users);
  }

  function buildTrack(container, itemsArray) {
    container.innerHTML = '';
    const pointerLine = document.createElement('div');
    pointerLine.className = 'pointer-line';
    const pointerArrow = document.createElement('div');
    pointerArrow.className = 'pointer-arrow';
    container.appendChild(pointerLine);
    container.appendChild(pointerArrow);
    const track = document.createElement('div');
    track.className = 'items-track';
    let html = '';
    for (let i=0; i<COPIES; i++) {
      itemsArray.forEach(obj => {
        html += `<div class="roulette-item"><span class="emoji">${obj.emoji}</span>${obj.name.split('|')[0]}</div>`;
      });
    }
    track.innerHTML = html;
    container.appendChild(track);
    return track;
  }

  function animateTrack(track, targetIndex, itemsCount, durationSec, containerWidth) {
    const centerOffset = (containerWidth/2) - (ITEM_WIDTH/2);
    let targetPos = -(targetIndex * ITEM_WIDTH) + centerOffset;
    const oneSetWidth = itemsCount * ITEM_WIDTH;
    const extraTurns = 3 + Math.floor(Math.random()*2);
    let startPos = targetPos - extraTurns * oneSetWidth;
    const totalWidth = COPIES * itemsCount * ITEM_WIDTH;
    if (startPos > 0) startPos = -totalWidth + containerWidth;
    if (startPos < -(totalWidth - containerWidth)) startPos = -(totalWidth - containerWidth);
    track.style.transition = 'none';
    track.style.transform = `translateX(${startPos}px)`;
    track.offsetHeight;
    track.style.transition = `transform ${durationSec}s cubic-bezier(0.12,0.78,0.22,1)`;
    track.style.transform = `translateX(${targetPos}px)`;
  }

  function openCaseModal(caseData) {
    if(!currentUser) return alert('Войдите');
    if(isSpinning) return;
    activeCase = caseData;
    document.getElementById('modalTitle').textContent = caseData.name;
    document.getElementById('multiRouletteContainer').innerHTML = '';
    document.getElementById('resultMessage').textContent = '';
    selectedQuantity = 1;
    updateQuantityDisplay();
    document.getElementById('caseModal').style.display = 'flex';
    enableCaseButtons(true);
  }

  let selectedQuantity = 1;
  function updateQuantityDisplay() {
    document.getElementById('qtyValue').textContent = selectedQuantity;
    const total = activeCase ? activeCase.price * selectedQuantity : 0;
    document.getElementById('totalPriceDisplay').textContent = `Общая стоимость: ${total.toLocaleString()} ₽`;
  }

    if(!activeCase || isSpinning || !currentUser) return;

    document.getElementById('resultMessage').textContent = `Открываем ${selectedQuantity} кейс(ов)...`;

    persist();
    updateBalance();

    const winData = [];

      area.className = 'roulette-area';
      area.style.margin = '8px 0';
      container.appendChild(area);
      const items = activeCase.items.map(e => getItem(e.itemId)).filter(Boolean);
      const track = buildTrack(area, items);
      const win = getRandomWin(activeCase, track);
      tracks.push({ track, area });
      winData.push(win);
    }

    const containerWidth = container.clientWidth || 700;
    requestAnimationFrame(() => {
      requestAnimationFrame(() => {
        tracks.forEach((t, idx) => {
          animateTrack(t.track, winData[idx].targetIndex, activeCase.items.length, durationSec, containerWidth);
        });
      });
    });

    const timeoutMs = durationSec * 1000 + 300;
    await new Promise(res => { const t = setTimeout(() => { res(); spinTimers = spinTimers.filter(x=>x!==t); }, timeoutMs); spinTimers.push(t); });

    winData.forEach(d => {
      currentUser.inventory.push({ uid: Date.now()+Math.random().toString(36), itemId: d.winItem.id, acquired: new Date().toISOString() });
    });
    persist();
    document.getElementById('resultMessage').innerHTML = `✅ Открыто ${selectedQuantity} кейсов!`;
    isSpinning = false;
    enableCaseButtons(true);
    updateBalance();
    renderInventoryView();
  }

  function getRandomWin(caseData, trackElement) {
    const totalW = caseData.items.reduce((s,it)=>s+it.weight,0);
    let r = Math.random()*totalW;
    let entry = null;
    for(let e of caseData.items) { r-=e.weight; if(r<=0) { entry=e; break; } }
    const winItem = getItem(entry.itemId);
    const itemsCount = caseData.items.length;
    const totalElements = COPIES * itemsCount;
    const minIdx = SAFE_MARGIN * itemsCount;
    const maxIdx = totalElements - SAFE_MARGIN * itemsCount;
    const search = winItem.name.split('|')[0].trim();
    const children = trackElement ? trackElement.children : [];
    const possible = [];
    for(let i=minIdx; i<maxIdx; i++) {
      if(children[i] && children[i].textContent.includes(search)) possible.push(i);
    }
    const targetIndex = possible.length ? possible[Math.floor(Math.random()*possible.length)] : Math.floor(Math.random()*(maxIdx-minIdx))+minIdx;
    return { winItem, targetIndex };
  }

  function enableCaseButtons(enable) {
    document.getElementById('btnOpenNormal').disabled = !enable;
    document.getElementById('btnOpenFast').disabled = !enable;
    document.getElementById('qtyMinus').disabled = !enable;
    document.getElementById('qtyPlus').disabled = !enable;
  }

  function renderUpgradeView() {
    const view = document.getElementById('upgradeView');
    if(!currentUser || currentUser.inventory.length===0) {
      view.innerHTML = '<p style="color:#888; padding:20px;">Инвентарь пуст.</p>'; return;
    }
    let html = '<h3 style="margin-bottom:10px;">Выберите предмет для апгрейда</h3><div class="inventory-grid">';
    currentUser.inventory.forEach(inv => {
      const item = getItem(inv.itemId);
      html += `<div class="item-card-compact rarity-${item.rarity} selectable" data-uid="${inv.uid}" style="cursor:pointer;">
        <span style="font-size:24px;">${item.emoji}</span> <strong>${item.name}</strong> <span style="color:#f0b90b;">${item.price.toLocaleString()} ₽</span>
      </div>`;
    });
    html += '</div><div id="targetSelection" style="margin-top:20px;"></div>';
    html += '<div id="upgradeChanceDisplay" class="upgrade-chance"></div>';
    html += '<div class="controls"><button class="primary" id="startUpgradeNormal">🔄 Upgrade (3.5 сек)</button><button id="startUpgradeFast" style="background:#3a4050;">⚡ Fast (1 сек)</button></div>';
    view.innerHTML = html;
    document.querySelectorAll('#upgradeView .selectable').forEach(el => {
      el.addEventListener('click', function() { selectUpgradeItem(this.dataset.uid); });
    });
    if(upgradeSelectedItem) highlightSelected();
  }

  function selectUpgradeItem(uid) {
    upgradeSelectedItem = currentUser.inventory.find(i=>i.uid===uid);
    if(!upgradeSelectedItem) return;
    upgradeTargetItem = null;
    highlightSelected();
    const currentItem = getItem(upgradeSelectedItem.itemId);
    const allTargets = ITEMS.filter(it => it.price > currentItem.price).sort((a,b)=>a.price-b.price);
    const targetDiv = document.getElementById('targetSelection');
    if(allTargets.length === 0) {
      targetDiv.innerHTML = '<p style="color:#888;">Нет более дорогих предметов.</p>';
      document.getElementById('upgradeChanceDisplay').textContent = '';
      return;
    }
    const minPrice = allTargets[0].price;
    const maxPrice = allTargets[allTargets.length-1].price;
    targetDiv.innerHTML = `
      <h3>Выберите цель (сортировка по цене)</h3>
      <div class="filter-range">
        <label>Цена от:</label> <input type="number" id="filterPriceMin" value="${minPrice}" min="${minPrice}" max="${maxPrice}" step="100">
        <label>до:</label> <input type="number" id="filterPriceMax" value="${maxPrice}" min="${minPrice}" max="${maxPrice}" step="100">
        <button id="applyFilterBtn">🔍 Фильтр</button>
      </div>
      <div class="inventory-grid" id="filteredTargets"></div>
    `;
    const applyFilter = () => {
      const min = parseInt(document.getElementById('filterPriceMin').value) || minPrice;
      const max = parseInt(document.getElementById('filterPriceMax').value) || maxPrice;
      const filtered = allTargets.filter(t => t.price >= min && t.price <= max);
      document.getElementById('filteredTargets').innerHTML = filtered.map(t => `
        <div class="item-card-compact rarity-${t.rarity} selectable" data-targetid="${t.id}" style="cursor:pointer;">
          <span style="font-size:24px;">${t.emoji}</span> <strong>${t.name}</strong> <span style="color:#f0b90b;">${t.price.toLocaleString()} ₽</span>
        </div>
      `).join('') || '<p style="color:#888;">Нет предметов в диапазоне.</p>';
      document.querySelectorAll('#filteredTargets .selectable').forEach(el => {
        el.addEventListener('click', function() { selectUpgradeTarget(this.dataset.targetid); });
      });
    };
    applyFilter();
    document.getElementById('applyFilterBtn').addEventListener('click', applyFilter);
    document.getElementById('upgradeChanceDisplay').textContent = '';
  }

  function selectUpgradeTarget(itemId) {
    upgradeTargetItem = ITEMS.find(i=>i.id===itemId);
    document.querySelectorAll('#filteredTargets .selectable').forEach(el => el.style.borderColor = '');
    const selectedEl = document.querySelector(`#filteredTargets [data-targetid="${itemId}"]`);
    if(selectedEl) selectedEl.style.borderColor = '#f0b90b';
    updateChanceDisplay();
  }

  function highlightSelected() {
    document.querySelectorAll('#upgradeView .selectable[data-uid]').forEach(el => {
      el.style.borderColor = el.dataset.uid === upgradeSelectedItem.uid ? '#f0b90b' : '';
    });
  }

  function updateChanceDisplay() {
    const display = document.getElementById('upgradeChanceDisplay');
    if(!upgradeSelectedItem || !upgradeTargetItem) { display.textContent = ''; return; }
    const cur = getItem(upgradeSelectedItem.itemId);
    const chance = Math.min(100, Math.round((cur.price / upgradeTargetItem.price)*100));
    display.textContent = `Шанс успеха: ${chance}%`;
  }

  function startUpgrade(durationSec) {
    if(!upgradeSelectedItem || !upgradeTargetItem || upgradeActive || isSpinning) return;
    const curItem = getItem(upgradeSelectedItem.itemId);
    const ratio = curItem.price / upgradeTargetItem.price;
    const chance = Math.min(1, ratio);
    const successCount = Math.round(chance * 100);
    const failCount = 100 - successCount;
    const template = [];
    for(let i=0; i<successCount; i++) template.push({ emoji: upgradeTargetItem.emoji, name: 'WIN', id: upgradeTargetItem.id });
    for(let i=0; i<failCount; i++) template.push({ emoji: '💔', name: 'LOSE', id: null });

    document.getElementById('upgradeModal').style.display = 'flex';
    document.getElementById('upgradeResultMessage').textContent = '';
    const container = document.getElementById('upgradeRouletteContainer');
    const track = buildTrack(container, template);
    const containerWidth = container.clientWidth;
    const totalElements = COPIES * 100;
    const targetIndex = Math.floor(Math.random() * totalElements);
    upgradeActive = true;
    animateTrack(track, targetIndex, 100, durationSec, containerWidth);

    setTimeout(() => {
      const element = track.children[targetIndex % 100];
      const win = element && element.textContent.includes('WIN');
      if(win) {
        currentUser.inventory = currentUser.inventory.filter(i=>i.uid!==upgradeSelectedItem.uid);
        currentUser.inventory.push({ uid: Date.now()+Math.random().toString(36), itemId: upgradeTargetItem.id, acquired: new Date().toISOString() });
        document.getElementById('upgradeResultMessage').innerHTML = `✅ Успех! ${upgradeTargetItem.emoji} ${upgradeTargetItem.name}`;
      } else {
        currentUser.inventory = currentUser.inventory.filter(i=>i.uid!==upgradeSelectedItem.uid);
        document.getElementById('upgradeResultMessage').innerHTML = '💔 Неудача. Предмет потерян.';
      }
      persist();
      updateBalance();
      renderInventoryView();
      renderUpgradeView();
      upgradeActive = false;
      upgradeSelectedItem = null;
      upgradeTargetItem = null;
      setTimeout(() => { document.getElementById('upgradeModal').style.display = 'none'; }, 2000);
    }, durationSec*1000+300);
  }

  function closeUpgradeModal() { if(!upgradeActive) document.getElementById('upgradeModal').style.display = 'none'; }

  function sellItem(uid) {
    if(!currentUser || isSpinning || upgradeActive) return;
    const idx = currentUser.inventory.findIndex(i=>i.uid===uid);
    if(idx===-1) return;
    const item = getItem(currentUser.inventory[idx].itemId);
    currentUser.balance += item.price;
    currentUser.inventory.splice(idx,1);
    persist();
    updateBalance();
    renderInventoryView();
    renderUpgradeView();
  }

  function renderCasesView() {
    document.getElementById('casesView').innerHTML = '<div class="cases-grid">' + CASES.map(c=>`
      <div class="case-card" data-caseid="${c.id}">
        <div class="case-img">${c.image}</div><h3>${c.name}</h3><p>Цена: <strong>${c.price.toLocaleString()} ₽</strong></p>
      </div>
    `).join('') + '</div>';
    document.querySelectorAll('.case-card').forEach(el => {
      el.addEventListener('click', function() { const c = CASES.find(c=>c.id===this.dataset.caseid); if(c) openCaseModal(c); });
    });
  }

  function renderInventoryView() {
    const inv = document.getElementById('inventoryView');
    if(!currentUser || currentUser.inventory.length===0) { inv.innerHTML='<p style="color:#888; padding:20px;">🎒 Инвентарь пуст.</p>'; return; }
    inv.innerHTML = '<div class="inventory-grid">' + currentUser.inventory.map(inv=>{
      const item = getItem(inv.itemId);
      return `<div class="item-card-compact rarity-${item.rarity}">
        <span style="font-size:24px;">${item.emoji}</span> <strong>${item.name}</strong> <span style="color:#f0b90b;">${item.price.toLocaleString()} ₽</span>
        <button class="sell-btn" data-uid="${inv.uid}" style="margin-left:auto; padding:6px 14px; font-size:12px;">Продать</button>
      </div>`;
    }).join('') + '</div>';
    document.querySelectorAll('#inventoryView .sell-btn').forEach(btn => {
      btn.addEventListener('click', function(e) { e.stopPropagation(); sellItem(this.dataset.uid); });
    });
  }

  function updateBalance() { document.getElementById('balanceValue').textContent = currentUser ? currentUser.balance.toLocaleString() : 0; }

  function refreshAll() {
    document.getElementById('authBlock').innerHTML = currentUser ? `<span style="font-weight:bold;">👤 ${currentUser.username}</span> <button class="danger" id="logoutBtn">Выйти</button>` : '';
    document.getElementById('loginPanel').style.display = currentUser ? 'none' : 'block';
    document.getElementById('mainUI').style.display = currentUser ? 'block' : 'none';
    if(!currentUser) {
      document.getElementById('loginPanel').innerHTML = `
        <div style="display:flex; align-items:center; gap:10px; flex-wrap:wrap;">
          <input type="text" id="usernameInput" placeholder="Введите никнейм" maxlength="14">
          <button class="primary" id="loginBtn">Войти / Создать</button>
        </div>
        <p style="color:#aaa; margin-top:8px;">Новый аккаунт получит 5 000 ₽</p>
      `;
      document.getElementById('loginBtn').addEventListener('click', () => {
        const input = document.getElementById('usernameInput');
        if(input) login(input.value.trim());
      });
    } else {
      document.getElementById('logoutBtn').addEventListener('click', logout);
      updateBalance();
      renderCasesView();
      renderInventoryView();
      renderUpgradeView();
    }
  }

  document.getElementById('tabCases').addEventListener('click', ()=>{
    document.getElementById('casesView').style.display='block';
    document.getElementById('inventoryView').style.display='none';
    document.getElementById('upgradeView').style.display='none';
    document.getElementById('tabCases').classList.add('active');
    document.getElementById('tabInventory').classList.remove('active');
    document.getElementById('tabUpgrade').classList.remove('active');
  });
  document.getElementById('tabInventory').addEventListener('click', ()=>{
    document.getElementById('casesView').style.display='none';
    document.getElementById('inventoryView').style.display='block';
    document.getElementById('upgradeView').style.display='none';
    document.getElementById('tabInventory').classList.add('active');
    document.getElementById('tabCases').classList.remove('active');
    document.getElementById('tabUpgrade').classList.remove('active');
    renderInventoryView();
  });
  document.getElementById('tabUpgrade').addEventListener('click', ()=>{
    document.getElementById('casesView').style.display='none';
    document.getElementById('inventoryView').style.display='none';
    document.getElementById('upgradeView').style.display='block';
    document.getElementById('tabUpgrade').classList.add('active');
    document.getElementById('tabCases').classList.remove('active');
    document.getElementById('tabInventory').classList.remove('active');
    renderUpgradeView();
  });

  document.getElementById('qtyMinus').addEventListener('click', ()=>{ if(selectedQuantity>1 && !isSpinning) selectedQuantity--; updateQuantityDisplay(); });
  document.getElementById('qtyPlus').addEventListener('click', ()=>{ if(selectedQuantity<9 && !isSpinning) selectedQuantity++; updateQuantityDisplay(); });
  document.getElementById('btnOpenNormal').addEventListener('click', ()=> openMultiple(6));
  document.getElementById('btnOpenFast').addEventListener('click', ()=> openMultiple(2));
  document.getElementById('btnCloseModal').addEventListener('click', ()=>{ if(!isSpinning) document.getElementById('caseModal').style.display='none'; });
  document.getElementById('btnCloseUpgradeModal').addEventListener('click', closeUpgradeModal);
  document.addEventListener('click', e => {
    if(e.target.id === 'startUpgradeNormal') startUpgrade(3.5);
    if(e.target.id === 'startUpgradeFast') startUpgrade(1);
  });

  const saved = localStorage.getItem(CURRENT_KEY);
  if(saved) { const users = getUsers(); if(users[saved]) currentUser = { username:saved, balance:users[saved].balance, inventory:users[saved].inventory||[] }; }
  refreshAll();
})();
</script>
</body>
</html>
