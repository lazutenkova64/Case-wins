<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>case-wins · Классический раунд & 1 на 1</title>
  <style>
    :root {
      --bg: #06080c;
      --panel: #0f1219;
      --card: #161b24;
      --gold: #f0b34b;
      --accent: #252b38;
      --text: #c8cdd8;
    }
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      background: var(--bg);
      font-family: 'Segoe UI', 'Inter', system-ui, sans-serif;
      color: var(--text);
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      display: flex;
    }
    .app {
      display: flex;
      width: 100%;
      height: 100%;
      gap: 6px;
      padding: 6px;
    }
    .sidebar {
      width: 200px;
      background: var(--panel);
      border-radius: 18px;
      padding: 14px 10px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      border: 1px solid #252b38;
      flex-shrink: 0;
    }
    .profile {
      display: flex;
      align-items: center;
      gap: 10px;
      background: #1a1f2b;
      padding: 10px;
      border-radius: 24px;
    }
    .avatar-circle {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      background: var(--gold);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
    }
    .nav-btn {
      background: #1a1f2b;
      border: none;
      color: var(--text);
      padding: 10px 14px;
      border-radius: 22px;
      cursor: pointer;
      text-align: left;
      font-weight: 600;
      font-size: 13px;
    }
    .nav-btn.active {
      background: var(--gold);
      color: #000;
    }
    .main-area {
      flex: 1;
      display: flex;
      gap: 8px;
      min-width: 0;
    }
    .classic-section {
      flex: 1;
      background: var(--card);
      border-radius: 22px;
      padding: 14px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      border: 1px solid #2a3140;
    }
    .roulette-container {
      flex: 1;
      background: #0a0e15;
      border-radius: 18px;
      position: relative;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .ticker-track {
      display: flex;
      gap: 6px;
      position: absolute;
      left: 0;
      transition: transform 0.08s linear;
      will-change: transform;
    }
    .ticket-avatar {
      width: 64px;
      height: 64px;
      background: #1e2432;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 32px;
      border: 2px solid #3a4052;
      flex-shrink: 0;
    }
    .pointer {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 42px;
      color: #f0b34b;
      z-index: 10;
      filter: drop-shadow(0 0 8px black);
      pointer-events: none;
    }
    .classic-info {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-weight: bold;
    }
    .timer-badge {
      background: #f0b34b;
      color: #000;
      padding: 5px 16px;
      border-radius: 20px;
      font-weight: 800;
    }
    .onevsone-section {
      flex: 1;
      background: var(--card);
      border-radius: 22px;
      padding: 14px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      border: 1px solid #2a3140;
    }
    .rooms-scroll {
      flex: 1;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .room-card {
      background: #1a1f2b;
      border-radius: 16px;
      padding: 12px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border: 1px solid #2f3748;
    }
    .btn {
      background: #f0b34b;
      border: none;
      color: #000;
      font-weight: 700;
      padding: 7px 16px;
      border-radius: 20px;
      cursor: pointer;
      font-size: 12px;
    }
    .btn:disabled {
      background: #5c6170;
      color: #222;
    }
    .inventory-panel {
      width: 200px;
      background: var(--panel);
      border-radius: 18px;
      padding: 14px 10px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      border: 1px solid #252b38;
      flex-shrink: 0;
    }
    .inv-grid {
      display: grid;
      grid-template-columns: repeat(2,1fr);
      gap: 6px;
    }
    .inv-slot {
      aspect-ratio: 1;
      background: #1a1f2b;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
    }
    input {
      background: #1a1f2b;
      border: 1px solid #353d4e;
      padding: 8px;
      border-radius: 20px;
      color: white;
      text-align: center;
      width: 70px;
    }
    .spectator-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background: rgba(0,0,0,0.85);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
    }
    .spectator-card {
      background: #161b24;
      border-radius: 28px;
      padding: 24px;
      width: 500px;
      border: 2px solid #f0b34b;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    .ticket-row {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
    }
    .ticket-chip {
      background: #252b38;
      padding: 4px 8px;
      border-radius: 12px;
      font-size: 12px;
    }
  </style>
</head>
<body>
<div class="app" id="appRoot">
  <div class="sidebar">
    <div class="profile">
      <span class="avatar-circle" id="profileAvatar">🐺</span>
      <div><div id="profileName">PlayerOne</div><div style="color:#3acf6e;">● Онлайн</div></div>
    </div>
    <button class="nav-btn active">🏠 Главная</button>
    <button class="nav-btn" id="historyBtn">📜 История</button>
    <button class="nav-btn">❓ FAQ</button>
  </div>
  <div class="main-area" id="mainView">
    <div class="classic-section">
      <div class="classic-info"><span>🏆 КЛАССИЧЕСКИЙ РАУНД</span><span>Банк: <span id="classicBank">0</span>$</span></div>
      <div class="roulette-container" id="classicRoulette">
        <div class="ticker-track" id="classicTicker"></div>
        <div class="pointer">▼</div>
      </div>
      <div style="display:flex;justify-content:space-between;">
        <span class="timer-badge" id="classicTimer">⏳ 3</span>
        <span id="classicResult" style="color:#f0b34b;"></span>
      </div>
      <div style="display:flex;gap:8px;">
        <input type="number" id="classicBetInput" value="5" min="1">
        <button class="btn" id="placeClassicBtn">Поставить</button>
        <button class="btn" id="resetClassicBtn" style="background:#3e4455;">Сброс</button>
      </div>
    </div>
    <div class="onevsone-section" id="oneVsOneSection">
      <div style="display:flex;justify-content:space-between;"><h3>🎲 1 НА 1</h3><button class="btn" id="createRoomBtn">+ Создать</button></div>
      <div class="rooms-scroll" id="roomsList"></div>
    </div>
  </div>
  <div class="inventory-panel">
    <h3>🎒 Инвентарь</h3>
    <div class="inv-grid"><div class="inv-slot">🔹</div><div class="inv-slot">🔹</div><div class="inv-slot">🔹</div><div class="inv-slot">🔹</div></div>
    <div>💰 Скины: 0$</div>
    <button class="btn">Купить</button>
    <button class="btn" style="background:#3e4455;">Продать</button>
  </div>
</div>
<div id="spectatorContainer"></div>

<script>
  (() => {
    const avatars = ['🐺','🦊','🐸','🐷','🐙','🐲','🦅','🐼','🐨','🐯','🐮','🐭','🐹','🐰'];
    function rndAvatar() { return avatars[Math.floor(Math.random()*avatars.length)]; }
    const state = {
      user: { name: 'PlayerOne', balance: 1000, avatar: '🐺' },
      classicBets: [],
      classicTimer: 3,
      classicInterval: null,
      classicSpinning: false,
      rooms: [],
      nextRoomId: 1,
      activeSpectator: null
    };

    const profileAvatar = document.getElementById('profileAvatar');
    const profileName = document.getElementById('profileName');
    const classicBank = document.getElementById('classicBank');
    const classicTicker = document.getElementById('classicTicker');
    const classicTimerEl = document.getElementById('classicTimer');
    const classicResult = document.getElementById('classicResult');
    const roomsList = document.getElementById('roomsList');
    const spectatorContainer = document.getElementById('spectatorContainer');
    const mainView = document.getElementById('mainView');

    function updateUI() {
      profileAvatar.textContent = state.user.avatar;
      profileName.textContent = state.user.name;
      classicBank.textContent = state.classicBets.reduce((s,b)=>s+b.amount,0);
      renderRooms();
    }

    function buildTicketTrack(bets) {
      const allTickets = [];
      bets.forEach(b => { for(let i=0;i<b.amount;i++) allTickets.push(b.user.avatar); });
      return allTickets;
    }

    function animateClassicRoll(tickets, winnerAvatar, callback) {
      const track = classicTicker;
      let pos = 0;
      const speed = 18;
      const extended = [...tickets, ...tickets, ...tickets, ...tickets];
      track.innerHTML = extended.map(a => `<div class="ticket-avatar">${a}</div>`).join('');
      const itemWidth = 70;
      const totalWidth = extended.length * itemWidth;
      track.style.transform = `translateX(0px)`;
      const interval = setInterval(() => {
        pos -= speed;
        track.style.transform = `translateX(${pos}px)`;
        if (pos <= -totalWidth + 600) pos = 0;
      }, 30);
      setTimeout(() => {
        clearInterval(interval);
        track.innerHTML = `<div class="ticket-avatar" style="position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);">${winnerAvatar}</div>`;
        setTimeout(() => { if(callback) callback(); }, 3000);
      }, 4500);
    }

    function startClassicCountdown() {
      if (state.classicBets.length < 2) return;
      clearClassicInterval();
      state.classicTimer = 3;
      classicTimerEl.textContent = `⏳ ${state.classicTimer}`;
      state.classicInterval = setInterval(() => {
        state.classicTimer--;
        classicTimerEl.textContent = `⏳ ${state.classicTimer}`;
        if (state.classicTimer <= 0) { clearClassicInterval(); runClassicGame(); }
      }, 1000);
    }

    function runClassicGame() {
      if (state.classicSpinning) return;
      state.classicSpinning = true;
      const tickets = buildTicketTrack(state.classicBets);
      const allUsers = [];
      state.classicBets.forEach(b => { for(let i=0;i<b.amount;i++) allUsers.push(b.user); });
      const winner = allUsers.length ? allUsers[Math.floor(Math.random()*allUsers.length)] : null;
      const bank = state.classicBets.reduce((s,b)=>s+b.amount,0);
      animateClassicRoll(tickets, winner?.avatar||'❓', () => {
        if (winner) {
          winner.balance += bank;
          if (winner.name === state.user.name) state.user.balance = winner.balance;
          classicResult.textContent = `${winner.name} +${bank}$`;
        }
        state.classicBets = [];
        state.classicSpinning = false;
        classicTimerEl.textContent = '⏳ 3';
        updateUI();
        setTimeout(()=>{ classicResult.textContent=''; }, 3000);
      });
    }

    function clearClassicInterval() {
      if (state.classicInterval) { clearInterval(state.classicInterval); state.classicInterval = null; }
    }

    document.getElementById('placeClassicBtn').addEventListener('click', ()=>{
      const amt = parseInt(document.getElementById('classicBetInput').value,10);
      if (isNaN(amt)||amt<=0) return;
      if (state.user.balance < amt) return alert('Недостаточно монет');
      state.user.balance -= amt;
      state.classicBets.push({ user: {...state.user}, amount: amt });
      updateUI();
      if (state.classicBets.length >= 2 && !state.classicInterval && !state.classicSpinning) startClassicCountdown();
    });
    document.getElementById('resetClassicBtn').addEventListener('click', ()=>{
      if (state.classicSpinning) return;
      clearClassicInterval();
      state.classicBets = [];
      classicTimerEl.textContent = '⏳ 3';
      updateUI();
    });

    // 1 на 1
    function createRoom() {
      const bet = parseInt(prompt('Ставка монет:','20'),10);
      if (!bet || bet<=0 || state.user.balance < bet) return alert('Недостаточно средств');
      state.user.balance -= bet;
      state.rooms.push({
        id: state.nextRoomId++,
        creator: {...state.user},
        bet,
        opponent: null,
        status: 'waiting',
        timer: 3,
        intervalId: null,
        winner: null,
        ticketsCreator: Array.from({length: bet}, (_,i)=> i+1),
        ticketsOpponent: []
      });
      updateUI();
    }

    function joinRoom(roomId) {
      const room = state.rooms.find(r=>r.id===roomId);
      if (!room || room.status!=='waiting') return;
      if (state.user.balance < room.bet) return alert('Недостаточно монет');
      state.user.balance -= room.bet;
      room.opponent = {...state.user};
      room.ticketsOpponent = Array.from({length: room.bet}, (_,i)=> room.bet + i + 1);
      room.status = 'countdown';
      room.timer = 3;
      startRoomCountdown(room);
      updateUI();
    }

    function startRoomCountdown(room) {
      clearRoomInterval(room);
      room.intervalId = setInterval(() => {
        room.timer--;
        updateUI();
        if (room.timer <= 0) { clearRoomInterval(room); finishRoom(room); }
      }, 1000);
    }

    function finishRoom(room) {
      const allTickets = [];
      for(let i=0;i<room.bet;i++) allTickets.push(room.creator);
      for(let i=0;i<room.bet;i++) allTickets.push(room.opponent);
      room.winner = allTickets[Math.floor(Math.random()*allTickets.length)];
      room.status = 'finished';
      const prize = room.bet*2;
      if (room.winner.name === state.user.name) state.user.balance += prize;
      updateUI();
      setTimeout(()=>{ state.rooms = state.rooms.filter(r=>r.id!==room.id); updateUI(); }, 5000);
    }

    function clearRoomInterval(room) {
      if (room.intervalId) { clearInterval(room.intervalId); room.intervalId = null; }
    }

    function renderRooms() {
      roomsList.innerHTML = '';
      if (!state.rooms.length) { roomsList.innerHTML = '<div style="color:#7f8690;">Нет комнат</div>'; return; }
      state.rooms.forEach(room => {
        const d = document.createElement('div');
        d.className = 'room-card';
        const status = room.status==='waiting'?'Ожидание':(room.status==='countdown'?`Идет... ${room.timer}с`:'Завершено');
        d.innerHTML = `
          <div><span>${room.creator.avatar}</span> ${room.creator.name} (${room.bet}$) ${room.opponent?`VS ${room.opponent.avatar} ${room.opponent.name}`:''}</div>
          <div style="display:flex;gap:6px;align-items:center;">
            <span>${status}</span>
            <button class="btn join-btn" data-id="${room.id}" ${room.status!=='waiting'?'disabled':''}>Играть</button>
            <button class="btn watch-btn" data-id="${room.id}" style="background:#4a5068;">👁</button>
          </div>`;
        roomsList.appendChild(d);
      });
      document.querySelectorAll('.join-btn').forEach(b=>b.addEventListener('click',e=>joinRoom(parseInt(e.target.dataset.id))));
      document.querySelectorAll('.watch-btn').forEach(b=>b.addEventListener('click',e=>openSpectator(parseInt(e.target.dataset.id))));
    }

    function openSpectator(roomId) {
      const room = state.rooms.find(r=>r.id===roomId);
      if (!room) return;
      state.activeSpectator = roomId;
      renderSpectator(room);
    }

    function renderSpectator(room) {
      spectatorContainer.innerHTML = `
        <div class="spectator-overlay" id="specOverlay">
          <div class="spectator-card">
            <h2>👁 Комната #${room.id}</h2>
            <div><b>${room.creator.name}</b> (${room.creator.avatar}) vs ${room.opponent?room.opponent.name+' '+room.opponent.avatar:'ожидание...'}</div>
            <div>Ставка: ${room.bet}$ | Статус: ${room.status} ${room.timer?`(${room.timer}с)` : ''}</div>
            <div><b>Билеты ${room.creator.name}:</b> 1-${room.bet}</div>
            <div class="ticket-row">${room.ticketsCreator.map(n=>`<span class="ticket-chip">${n}</span>`).join('')}</div>
            ${room.opponent ? `<div><b>Билеты ${room.opponent.name}:</b> ${room.bet+1}-${room.bet*2}</div><div class="ticket-row">${room.ticketsOpponent.map(n=>`<span class="ticket-chip">${n}</span>`).join('')}</div>` : ''}
            <button class="btn" id="closeSpectator">Закрыть</button>
          </div>
        </div>`;
      document.getElementById('closeSpectator').addEventListener('click', ()=>{
        state.activeSpectator = null;
        spectatorContainer.innerHTML = '';
      });
    }

    document.getElementById('createRoomBtn').addEventListener('click', createRoom);
    updateUI();
    setInterval(()=>{
      if (state.activeSpectator) {
        const room = state.rooms.find(r=>r.id===state.activeSpectator);
        if (room) renderSpectator(room); else { state.activeSpectator=null; spectatorContainer.innerHTML=''; }
      }
    }, 500);
  })();
</script>
</body>
</html>
