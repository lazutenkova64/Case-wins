<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>CS2 Case Opening — Мульти-открытие</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      background: radial-gradient(circle at 20% 20%, #1a1f2b, #0a0d14);
      min-height: 100vh;
      color: #e0e0e0;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 30px 15px;
    }
    .app {
      max-width: 1050px;
      width: 100%;
      background: rgba(14, 17, 23, 0.85);
      backdrop-filter: blur(30px);
      border-radius: 40px;
      padding: 24px 22px 30px;
      box-shadow: 0 30px 45px rgba(0,0,0,0.8);
      border: 1px solid rgba(220, 180, 40, 0.2);
    }
    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 18px;
      margin-bottom: 28px;
      border-bottom: 1px solid rgba(255,200,0,0.15);
      padding-bottom: 18px;
    }
    h1 {
      background: linear-gradient(180deg, #f9e076, #c5921a);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      font-weight: 900;
      font-size: 2.2rem;
      letter-spacing: 1px;
    }
    .nav {
      display: flex;
      gap: 8px;
      background: #151a24;
      border-radius: 50px;
      padding: 5px;
    }
    .nav-btn {
      background: transparent;
      border: none;
      color: #aaa;
      font-weight: 700;
      padding: 13px 26px;
      border-radius: 40px;
      cursor: pointer;
      transition: 0.2s;
      font-size: 15px;
    }
    .nav-btn.active {
      background: #f0b90b;
      color: #0a0a0a;
      box-shadow: 0 0 20px rgba(240,185,11,0.5);
    }
    button {
      background: #232b38;
      border: none;
      color: #eee;
      padding: 11px 21px;
      border-radius: 30px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }
    button:hover {
      filter: brightness(1.3);
    }
    button.primary {
      background: linear-gradient(180deg, #f5cb42, #c5851b);
      color: #111;
      font-weight: 800;
    }
    button.danger {
      background: #4a2e2e;
      color: #faa;
    }
    input {
      background: #151b25;
      border: 1px solid #3f4858;
      padding: 12px 18px;
      border-radius: 30px;
      color: white;
      margin-right: 8px;
      outline: none;
    }
    .balance {
      font-size: 1.3rem;
      font-weight: bold;
      color: #f0b90b;
      background: #0f1219;
      padding: 8px 22px;
      border-radius: 30px;
    }
    .cases-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(230px, 1fr));
      gap: 25px;
    }
    .case-card {
      background: #181e29;
      border-radius: 28px;
      padding: 22px 12px;
      text-align: center;
      border: 1px solid #303a4c;
      cursor: pointer;
      transition: 0.25s;
    }
    .case-card:hover {
      border-color: #f0b90b;
      transform: translateY(-6px);
      box-shadow: 0 18px 30px rgba(0,0,0,0.6);
    }
    .case-img {
      font-size: 68px;
      margin-bottom: 6px;
    }
    .inventory-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 16px;
      margin-top: 15px;
    }
    .item-card {
      background: #1b2130;
      border-radius: 18px;
      padding: 12px 18px;
      display: flex;
      align-items: center;
      gap: 12px;
      border-left: 6px solid;
    }
    .rarity-common { border-left-color: #9e9e9e; }
    .rarity-mil { border-left-color: #4b69ff; }
    .rarity-restricted { border-left-color: #8845ff; }
    .rarity-classified { border-left-color: #d32ce6; }
    .rarity-covert { border-left-color: #eb4b4b; }
    .rarity-gold { border-left-color: #f3b23f; }

    /* Модалка */
    .modal {
      position: fixed;
      top:0; left:0; right:0; bottom:0;
      background: rgba(0,0,0,0.9);
      backdrop-filter: blur(12px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }
    .modal-box {
      background: #111520;
      border: 2px solid #f0b90b;
      border-radius: 36px;
      padding: 24px 28px;
      max-width: 780px;
      width: 95%;
      text-align: center;
      box-shadow: 0 0 60px rgba(240,185,11,0.3);
    }
    .roulette-area {
      position: relative;
      height: 140px;
      background: #0a0d14;
      border-radius: 24px;
      margin: 25px 0 15px;
      overflow: hidden;
      border: 1px solid #2f3745;
    }
    .pointer {
      position: absolute;
      left: 50%;
      top: 0;
      bottom: 0;
      width: 3px;
      background: #f0b90b;
      box-shadow: 0 0 30px #f0b90b, 0 0 10px #fff;
      z-index: 20;
      transform: translateX(-50%);
      border-radius: 3px;
    }
    .items-track {
      display: flex;
      align-items: center;
      height: 100%;
      transition: transform 0.8s cubic-bezier(0.15, 0.8, 0.2, 1);
      will-change: transform;
    }
    .roulette-item {
      flex: 0 0 150px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 8px 4px;
      color: #ddd;
      font-weight: 600;
      background: rgba(30,35,48,0.8);
      margin: 0 4px;
      border-radius: 18px;
      border: 1px solid #3e4657;
    }
    .roulette-item .emoji {
      font-size: 45px;
      display: block;
      line-height: 1;
    }
    .controls {
      display: flex;
      gap: 15px;
      justify-content: center;
      align-items: center;
      flex-wrap: wrap;
      margin-top: 10px;
    }
    .result-text {
      font-size: 1.2rem;
      margin-top: 12px;
      font-weight: bold;
      min-height: 30px;
    }
    .quantity-selector {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin: 15px 0;
      font-size: 1.2rem;
    }
    .quantity-selector button {
      font-size: 1.5rem;
      width: 45px;
      height: 45px;
      padding: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .quantity-value {
      font-size: 2rem;
      font-weight: 800;
      color: #f0b90b;
      min-width: 50px;
    }
    .total-price {
      font-size: 1.4rem;
      color: #f0b90b;
      margin: 10px 0;
    }
  </style>
</head>
<body>
<div class="app">
  <div class="top-bar">
    <h1>🔫 CASE OPENER</h1>
    <div id="authBlock" style="display: flex; gap: 10px; align-items: center;"></div>
  </div>

  <div id="loginPanel" style="display: none; margin-bottom: 25px; background:#151b26; border-radius: 24px; padding: 20px;"></div>

  <div id="mainUI" style="display: none;">
    <div style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap:15px;">
      <div class="nav">

        <button class="nav-btn" id="tabInventory">🎒 Инвентарь</button>
      </div>
      <div class="balance">💰 <span id="balanceValue">0</span> ₽</div>

    <div id="casesView" style="margin-top: 25px;"></div>
    <div id="inventoryView" style="display: none; margin-top: 25px;"></div>
  </div>
</div>

<!-- Модальное окно открытия кейса -->
<div class="modal" id="caseModal" style="display: none;">

    <h2 id="modalTitle" style="color:#f0b90b;"></h2>
    <div class="roulette-area" id="rouletteContainer">
      <div class="pointer"></div>
      <div class="items-track" id="rouletteTrack"></div>
    </div>

    <div class="quantity-selector">
      <button id="qtyMinus">−</button>
      <span class="quantity-value" id="qtyValue">1</span>
      <button id="qtyPlus">+</button>
    </div>
    <div class="total-price" id="totalPriceDisplay">Общая стоимость: 0 ₽</div>

    <div class="controls">
      <button class="primary" id="btnOpenNormal" style="font-size:18px; padding:14px 32px;">🔓 Открыть (6 сек)</button>
      <button id="btnOpenFast" style="font-size:16px; padding:12px 25px; background:#3a4050;">⚡ Fast (3.5 сек)</button>
      <button id="btnCloseModal" style="background:#2a2f3c;">Закрыть</button>
    </div>
    <div class="result-text" id="resultMessage"></div>
  </div>
</div>

    const USERS_KEY = 'cs2_users_multiopener';

    let activeCase = null;

    let spinTimer = null;
    let selectedQuantity = 1;
    let quantityMax = 9;

    const ITEM_WIDTH = 158;
    const COPIES = 60;
    const SAFE_MARGIN_COPIES = 8;

    function getUsers() { return JSON.parse(localStorage.getItem(USERS_KEY) || '{}'); }
    function saveUsers(u) { localStorage.setItem(USERS_KEY, JSON.stringify(u)); }
    function getItem(id) { return ITEMS.find(i => i.id === id); }

    function login(username) {
      const users = getUsers();
      if (!users[username]) users[username] = { balance: 5000, inventory: [] };
      saveUsers(users);
      currentUser = { username, balance: users[username].balance, inventory: users[username].inventory || [] };
      localStorage.setItem(CURRENT_KEY, username);
      refreshUI();
    }
    function logout() {
      currentUser = null;
      localStorage.removeItem(CURRENT_KEY);
      refreshUI();
    }
    function persistUser() {
      if (!currentUser) return;
      const users = getUsers();
      users[currentUser.username] = { balance: currentUser.balance, inventory: currentUser.inventory };
      saveUsers(users);
    }

    function openCaseModal(caseData) {
      if (!currentUser) return alert('Войдите в аккаунт');
      if (isSpinning) return;
      activeCase = caseData;
      selectedQuantity = 1;
      updateQuantityDisplay();
      document.getElementById('modalTitle').textContent = caseData.name;
      document.getElementById('resultMessage').textContent = '';
      buildRouletteTrack(caseData);
      document.getElementById('caseModal').style.display = 'flex';
      document.getElementById('btnOpenNormal').disabled = false;
      document.getElementById('btnOpenFast').disabled = false;
      document.getElementById('qtyMinus').disabled = false;
      document.getElementById('qtyPlus').disabled = false;
    }

    function buildRouletteTrack(caseData) {
      const track = document.getElementById('rouletteTrack');
      const itemsList = caseData.items.map(e => getItem(e.itemId)).filter(Boolean);
      let html = '';
      for (let i = 0; i < COPIES; i++) {
        itemsList.forEach(item => {
          html += `<div class="roulette-item"><span class="emoji">${item.emoji}</span><span>${item.name.split('|')[0].trim()}</span></div>`;
        });
      }
      track.innerHTML = html;
      track.style.transition = 'none';
      track.style.transform = 'translateX(0)';
      track.offsetHeight;
    }

    function getRandomWinItemAndIndex(caseData) {
      const totalWeight = caseData.items.reduce((s, it) => s + it.weight, 0);
      let rand = Math.random() * totalWeight;
      let winEntry = null;
      for (let e of caseData.items) {
        rand -= e.weight;
        if (rand <= 0) { winEntry = e; break; }
      }
      const winItem = getItem(winEntry.itemId);
      const itemsCount = caseData.items.length;
      const totalElements = COPIES * itemsCount;
      const minIndex = SAFE_MARGIN_COPIES * itemsCount;
      const maxIndex = totalElements - SAFE_MARGIN_COPIES * itemsCount;
      const trackItems = document.querySelectorAll('#rouletteTrack .roulette-item');
      const searchText = winItem.name.split('|')[0].trim();
      const possibleIndices = [];
      for (let i = minIndex; i < maxIndex; i++) {
        if (trackItems[i] && trackItems[i].textContent.includes(searchText)) {
          possibleIndices.push(i);
        }
      }
      if (possibleIndices.length === 0) {
        return { winItem, targetIndex: Math.floor(Math.random() * (maxIndex - minIndex)) + minIndex };
      }
      const targetIndex = possibleIndices[Math.floor(Math.random() * possibleIndices.length)];
      return { winItem, targetIndex };
    }

    function singleSpin(durationSec) {
      return new Promise((resolve) => {
        if (!activeCase) return resolve(null);
        const { winItem, targetIndex } = getRandomWinItemAndIndex(activeCase);
        const container = document.getElementById('rouletteContainer');
        const containerWidth = container.clientWidth;
        const centerOffset = (containerWidth / 2) - (ITEM_WIDTH / 2);
        let targetPos = -(targetIndex * ITEM_WIDTH) + centerOffset;
        const oneFullSetWidth = activeCase.items.length * ITEM_WIDTH;
        const extraTurns = 2 + Math.floor(Math.random() * 2);
        targetPos -= extraTurns * oneFullSetWidth;
        const totalTrackWidth = COPIES * activeCase.items.length * ITEM_WIDTH;
        if (targetPos < -(totalTrackWidth - containerWidth)) {
          targetPos = -(totalTrackWidth - containerWidth);
        }
        const track = document.getElementById('rouletteTrack');
        track.style.transition = `transform ${durationSec}s cubic-bezier(0.12, 0.78, 0.22, 1)`;
        track.style.transform = `translateX(${targetPos}px)`;

        spinTimer = setTimeout(() => {
          resolve(winItem);
          spinTimer = null;
        }, durationSec * 1000 + 150);
      });
    }

    async function openMultiple(durationSec) {
      if (!activeCase || isSpinning || !currentUser) return;
      const totalCost = activeCase.price * selectedQuantity;
      if (currentUser.balance < totalCost) {
        alert(`Недостаточно средств. Нужно ${totalCost} ₽, у вас ${currentUser.balance} ₽`);
        return;
      }

      isSpinning = true;
      document.getElementById('btnOpenNormal').disabled = true;
      document.getElementById('btnOpenFast').disabled = true;
      document.getElementById('qtyMinus').disabled = true;
      document.getElementById('qtyPlus').disabled = true;
      document.getElementById('resultMessage').textContent = `Открываем ${selectedQuantity} кейс(ов)...`;

      // Списываем всё сразу
      currentUser.balance -= totalCost;
      persistUser();
      updateBalance();

      const results = [];
      for (let i = 0; i < selectedQuantity; i++) {
        document.getElementById('resultMessage').textContent = `⏳ Кейс ${i+1} из ${selectedQuantity}...`;
        const winItem = await singleSpin(durationSec);
        if (winItem) {
          currentUser.inventory.push({
            uid: Date.now() + Math.random().toString(36),
            itemId: winItem.id,
            acquired: new Date().toISOString()
          });
          results.push(winItem);
          persistUser();
          renderInventoryView();
          updateBalance();
        }
        // Небольшая пауза между кейсами, чтобы пользователь увидел результат
        if (i < selectedQuantity - 1) {
          await new Promise(res => setTimeout(res, 400));
        }
      }

      // Финальный результат
      const totalWorth = results.reduce((sum, item) => sum + item.price, 0);
      document.getElementById('resultMessage').innerHTML = `✅ Открыто ${selectedQuantity} кейс(ов). Общая стоимость дропа: <strong>${totalWorth} ₽</strong>`;
      isSpinning = false;
      document.getElementById('btnOpenNormal').disabled = false;
      document.getElementById('btnOpenFast').disabled = false;
      document.getElementById('qtyMinus').disabled = false;
      document.getElementById('qtyPlus').disabled = false;
    }

    function closeModal() {
      if (isSpinning) return;
      document.getElementById('caseModal').style.display = 'none';
      activeCase = null;
      if (spinTimer) clearTimeout(spinTimer);
      renderCasesView();
    }

    function updateQuantityDisplay() {
      document.getElementById('qtyValue').textContent = selectedQuantity;
      const total = activeCase ? activeCase.price * selectedQuantity : 0;
      document.getElementById('totalPriceDisplay').textContent = `Общая стоимость: ${total} ₽`;
    }

    function sellItem(uid) {
      if (!currentUser) return;
      const idx = currentUser.inventory.findIndex(i => i.uid === uid);
      if (idx === -1) return;
      const invEntry = currentUser.inventory[idx];
      const item = getItem(invEntry.itemId);
      if (!item) return;
      currentUser.balance += item.price;
      currentUser.inventory.splice(idx, 1);
      persistUser();
      updateBalance();
      renderInventoryView();
    }

    function renderCasesView() {
      const container = document.getElementById('casesView');
      container.innerHTML = '<div class="cases-grid">' + CASES.map(c => `
        <div class="case-card" onclick="window.siteOpenCase('${c.id}')">
          <div class="case-img">${c.image}</div>
          <h3>${c.name}</h3>
          <p style="margin:5px 0;">Цена: <strong>${c.price.toLocaleString()} ₽</strong></p>
        </div>
      `).join('') + '</div>';
    }

    function renderInventoryView() {
      const invDiv = document.getElementById('inventoryView');
      if (!currentUser || currentUser.inventory.length === 0) {
        invDiv.innerHTML = '<p style="color:#888; padding:20px;">🎒 Инвентарь пуст. Откройте кейсы!</p>';
        return;
      }
      let html = '<div class="inventory-grid">';
      currentUser.inventory.forEach(inv => {
        const item = getItem(inv.itemId);
        if (!item) return;
        html += `
          <div class="item-card rarity-${item.rarity}">
            <span style="font-size:36px;">${item.emoji}</span>
            <div style="flex:1;">
              <strong>${item.name}</strong>
              <div style="color:#f0b90b; font-weight:bold;">${item.price.toLocaleString()} ₽</div>
            </div>
            <button onclick="window.siteSellItem('${inv.uid}')">Продать</button>
          </div>`;
      });
      html += '</div>';
      invDiv.innerHTML = html;
    }

    function updateBalance() {
      document.getElementById('balanceValue').textContent = currentUser ? currentUser.balance.toLocaleString() : 0;
    }

    function refreshUI() {
      const authBlock = document.getElementById('authBlock');
      const loginPanel = document.getElementById('loginPanel');
      const mainUI = document.getElementById('mainUI');

      if (currentUser) {
        authBlock.innerHTML = `
          <span style="font-weight:bold;">👤 ${currentUser.username}</span>
          <button class="danger" onclick="window.siteLogout()">Выйти</button>
        `;
        loginPanel.style.display = 'none';
        mainUI.style.display = 'block';
        updateBalance();
        renderCasesView();
        renderInventoryView();
      } else {
        authBlock.innerHTML = '';
        loginPanel.style.display = 'block';
        mainUI.style.display = 'none';
        loginPanel.innerHTML = `
          <div style="display:flex; align-items:center; gap:10px; flex-wrap:wrap;">
            <input type="text" id="usernameInput" placeholder="Введите никнейм" maxlength="14">
            <button class="primary" onclick="window.siteLogin()">Войти / Создать</button>
          </div>
          <p style="color:#aaa; margin-top:8px;">Новый аккаунт получит 5 000 ₽</p>
        `;
      }
    }

    // Переключение вкладок
    document.getElementById('tabCases').addEventListener('click', () => {
      document.getElementById('casesView').style.display = 'block';
      document.getElementById('inventoryView').style.display = 'none';
      document.getElementById('tabCases').classList.add('active');
      document.getElementById('tabInventory').classList.remove('active');
    });
    document.getElementById('tabInventory').addEventListener('click', () => {
      document.getElementById('casesView').style.display = 'none';
      document.getElementById('inventoryView').style.display = 'block';
      document.getElementById('tabInventory').classList.add('active');
      document.getElementById('tabCases').classList.remove('active');
      renderInventoryView();
    });

    // Модальное окно: кнопки количества
    document.getElementById('qtyMinus').addEventListener('click', () => {
      if (isSpinning) return;
      if (selectedQuantity > 1) {
        selectedQuantity--;
        updateQuantityDisplay();
      }
    });
    document.getElementById('qtyPlus').addEventListener('click', () => {
      if (isSpinning) return;
      if (selectedQuantity < quantityMax) {
        selectedQuantity++;
        updateQuantityDisplay();
      }
    });

    document.getElementById('btnCloseModal').addEventListener('click', closeModal);
    document.getElementById('btnOpenNormal').addEventListener('click', () => openMultiple(6));
    document.getElementById('btnOpenFast').addEventListener('click', () => openMultiple(3.5));

    window.siteLogin = () => {
      const input = document.getElementById('usernameInput');
      if (input && input.value.trim().length >= 2) login(input.value.trim());
    };
    window.siteLogout = () => logout();
    window.siteOpenCase = (caseId) => {
      const c = CASES.find(c => c.id === caseId);
      if (c) openCaseModal(c);
    };
    window.siteSellItem = (uid) => sellItem(uid);

    // Восстановление сессии
    const savedUser = localStorage.getItem(CURRENT_KEY);
    if (savedUser) {
      const users = getUsers();
      if (users[savedUser]) {
        currentUser = {
          username: savedUser,
          balance: users[savedUser].balance,
          inventory: users[savedUser].inventory || []
        };
      }
    }
    refreshUI();
  })();
</script>
</body>
</html>
