<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, shrink-to-fit=no">
  <title>case-wins · Классический раунд & 1 на 1</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      background: #0b0d13;
      font-family: 'Segoe UI', 'Inter', system-ui, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 0.8rem;
      color: #ddd;
    }
    .app-layout {
      display: grid;
      grid-template-columns: 220px 1fr 260px;
      gap: 1rem;
      width: 100%;
      max-width: 1400px;
      height: 95vh;
      background: #12151c;
      border-radius: 2rem;
      padding: 1.2rem;
      box-shadow: 0 20px 45px rgba(0,0,0,0.7);
      border: 1px solid #2b2f3a;
    }
    /* Левая панель */
    .left-panel {
      background: #1a1e27;
      border-radius: 1.8rem;
      padding: 1.5rem 1rem;
      display: flex;
      flex-direction: column;
      gap: 1.8rem;
      border: 1px solid #303541;
    }
    .profile-block {
      display: flex;
      align-items: center;
      gap: 0.7rem;
      background: #242935;
      padding: 0.8rem;
      border-radius: 2.5rem;
    }
    .profile-avatar {
      width: 42px;
      height: 42px;
      background: #f0b34b;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.5rem;
    }
    .online-indicator {
      display: flex;
      align-items: center;
      gap: 0.3rem;
      color: #3acf6e;
      font-weight: 600;
    }
    .nav-menu {
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }
    .nav-item {
      background: #242935;
      padding: 0.8rem 1.2rem;
      border-radius: 2rem;
      cursor: pointer;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      transition: 0.2s;
      border: 1px solid transparent;
    }
    .nav-item.active {
      background: #f0b34b;
      color: #0b0d13;
      border-color: #f0b34b;
    }
    .sub-menu {
      margin-left: 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
      font-size: 0.85rem;
    }
    .sub-item {
      cursor: pointer;
      padding: 0.3rem 0.8rem;
      border-radius: 1rem;
    }
    .sub-item:hover {
      background: #2e3545;
    }
    /* Центр */
    .center-panel {
      display: flex;
      flex-direction: column;
      gap: 1.2rem;
      overflow-y: auto;
      padding-right: 0.3rem;
    }
    .classic-card {
      background: linear-gradient(145deg, #1e222b, #171a22);
      border-radius: 2rem;
      padding: 1.2rem;
      border: 1px solid #3a4050;
    }
    .wheel-box {
      background: #0c0f17;
      border-radius: 1.8rem;
      padding: 1.2rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1rem;
    }
    .avatar-track {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 2rem;
      font-size: 2.8rem;
    }
    .avatar-circle {
      width: 80px;
      height: 80px;
      background: #2a3040;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 3px solid #f0b34b;
      transition: 0.1s;
    }
    .timer-box {
      background: #f5a623;
      color: #0b0d13;
      font-weight: 800;
      padding: 0.3rem 1.5rem;
      border-radius: 2rem;
    }
    .bet-row {
      display: flex;
      gap: 1rem;
      align-items: center;
      flex-wrap: wrap;
    }
    .bet-input {
      background: #2c3140;
      border: none;
      padding: 0.7rem 1rem;
      border-radius: 2rem;
      color: white;
      width: 100px;
      text-align: center;
      font-weight: bold;
    }
    .btn {
      background: #f5a623;
      border: none;
      color: #0a0c12;
      font-weight: 800;
      padding: 0.65rem 1.5rem;
      border-radius: 2.5rem;
      cursor: pointer;
    }
    .btn:disabled {
      background: #5a5f6b;
      color: #2a2a2a;
    }
    .games-list {
      display: flex;
      flex-direction: column;
      gap: 0.7rem;
    }
    .room-row {
      background: #1e222b;
      border-radius: 2rem;
      padding: 0.7rem 1.2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border: 1px solid #343a48;
    }
    /* Правая панель */
    .right-panel {
      background: #1a1e27;
      border-radius: 1.8rem;
      padding: 1.5rem 1rem;
      display: flex;
      flex-direction: column;
      gap: 1.2rem;
      border: 1px solid #303541;
    }
    .inventory-grid {
      display: grid;
      grid-template-columns: repeat(2,1fr);
      gap: 0.6rem;
    }
    .inv-slot {
      background: #242935;
      aspect-ratio: 1/1;
      border-radius: 1rem;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2rem;
      border: 1px solid #3d4352;
    }
    .total-value {
      background: #2c3140;
      padding: 0.6rem;
      border-radius: 2rem;
      text-align: center;
    }
    .hidden {
      display: none;
    }
  </style>
</head>
<body>
<div class="app-layout" id="appLayout">
  <!-- Левая панель -->
  <div class="left-panel">
    <div class="profile-block" id="profileWidget">
      <span class="profile-avatar" id="profileEmoji">🐺</span>
      <div>
        <div id="profileName">PlayerOne</div>
        <div class="online-indicator"><span>●</span> Онлайн</div>
      </div>
    </div>
    <div class="nav-menu">
      <div class="nav-item active" data-view="main">🏠 Главная</div>
      <div class="nav-item" id="historyToggle">📜 История игр</div>
      <div class="sub-menu" id="historySub" style="display: none;">
        <div class="sub-item" data-history="classic">Классические</div>
        <div class="sub-item" data-history="myClassic">Мои классические</div>
        <div class="sub-item" data-history="oneVsOne">1 на 1 (участвовал)</div>
      </div>
      <div class="nav-item">❓ FAQ</div>
    </div>
    <div style="margin-top: auto; color: #7f8690;">case-wins</div>
  </div>

  <!-- Центральная часть -->
  <div class="center-panel" id="centerPanel">
    <!-- Классический раунд -->
    <div class="classic-card" id="classicSection">
      <div style="display: flex; justify-content: space-between; font-weight: bold;">
        <span>🏆 КЛАССИЧЕСКИЙ РАУНД</span>
        <span>Банк: <span id="classicBank">0.00</span>$</span>
      </div>
      <div class="wheel-box" id="classicWheelBox">
        <div class="avatar-track" id="classicAvatarTrack">
          <div class="avatar-circle" id="classicLeft">❓</div>
          <span style="font-weight:800;">VS</span>
          <div class="avatar-circle" id="classicRight">❓</div>
        </div>
        <div class="timer-box" id="classicTimerLabel">⏳ 30</div>
        <div id="classicResultMsg"></div>
      </div>
      <div class="bet-row">
        <input type="number" id="classicBetInput" class="bet-input" value="5" min="1">
        <button id="placeClassicBetBtn" class="btn">🎯 Поставить</button>
        <button id="resetClassicBtn" class="btn" style="background:#3e4455;">Сброс</button>
      </div>
    </div>
    <!-- Игры 1 на 1 -->
    <div style="display: flex; justify-content: space-between; align-items: center;">
      <h3>🎲 ИГРА 1 НА 1</h3>
      <button id="createRoomBtn" class="btn">➕ Создать</button>
    </div>
    <div class="games-list" id="roomsContainer"></div>
  </div>

  <!-- Правая панель: инвентарь -->
  <div class="right-panel" id="inventoryPanel">
    <h3>🎒 Инвентарь</h3>
    <div class="inventory-grid" id="inventoryGrid">
      <div class="inv-slot">🔹</div><div class="inv-slot">🔹</div>
      <div class="inv-slot">🔹</div><div class="inv-slot">🔹</div>
    </div>
    <div class="total-value">💰 Скины: <span id="skinTotal">0</span>$</div>
    <button class="btn" style="width:100%;">🛒 Купить скины</button>
    <button class="btn" style="background:#3e4455; width:100%;">💸 Продать скины</button>
  </div>
</div>

<script>
  (() => {
    // Состояние
    const state = {
      user: { name: 'PlayerOne', balance: 200, avatar: '🐺' },
      classicBets: [],
      classicTimer: 30,
      classicInterval: null,
      classicSpinning: false,
      rooms: [],
      nextRoomId: 1,
      currentView: 'main', // main / spectatorRoomId
      historyLog: { classic: [], myClassic: [], oneVsOne: [] }
    };

    // DOM ссылки
    const profileEmoji = document.getElementById('profileEmoji');
    const profileName = document.getElementById('profileName');
    const classicBank = document.getElementById('classicBank');
    const classicLeft = document.getElementById('classicLeft');
    const classicRight = document.getElementById('classicRight');
    const classicTimerLabel = document.getElementById('classicTimerLabel');
    const classicResultMsg = document.getElementById('classicResultMsg');
    const classicBetInput = document.getElementById('classicBetInput');
    const placeClassicBetBtn = document.getElementById('placeClassicBetBtn');
    const resetClassicBtn = document.getElementById('resetClassicBtn');
    const roomsContainer = document.getElementById('roomsContainer');
    const createRoomBtn = document.getElementById('createRoomBtn');
    const inventoryGrid = document.getElementById('inventoryGrid');
    const skinTotalSpan = document.getElementById('skinTotal');
    const historyToggle = document.getElementById('historyToggle');
    const historySub = document.getElementById('historySub');
    const centerPanel = document.getElementById('centerPanel');

    // Аватарки
    const avatars = ['🐺','🦊','🐸','🐷','🐙','🐲','🦅','🐼','🐨','🐯'];

    function randomAvatar() { return avatars[Math.floor(Math.random()*avatars.length)]; }

    function updateUI() {
      profileEmoji.textContent = state.user.avatar;
      profileName.textContent = state.user.name;
      renderClassic();
      renderRooms();
      skinTotalSpan.textContent = '0';
    }

    // Классический раунд
    function renderClassic() {
      const total = state.classicBets.reduce((s,b)=>s+b.amount,0);
      classicBank.textContent = total.toFixed(2);
      if (!state.classicSpinning && state.classicBets.length===0) {
        classicLeft.textContent = '❓'; classicRight.textContent = '❓';
      }
    }

    function addClassicBet() {
      if (!state.user) return alert('Нет профиля');
      const amt = parseInt(classicBetInput.value,10);
      if (isNaN(amt) || amt<=0) return;
      if (state.user.balance < amt) return alert('Недостаточно монет');
      state.user.balance -= amt;
      state.classicBets.push({ user: {...state.user}, amount: amt });
      updateUI();
      if (state.classicBets.length >= 2 && !state.classicInterval && !state.classicSpinning) {
        startClassicCountdown();
      }
    }

    function startClassicCountdown() {
      clearClassicInterval();
      state.classicTimer = 30;
      state.classicInterval = setInterval(() => {
        state.classicTimer--;
        classicTimerLabel.textContent = `⏳ ${state.classicTimer}`;
        if (state.classicTimer <= 0) {
          clearClassicInterval();
          runClassicSpin();
        }
      }, 1000);
    }

    function runClassicSpin() {
      if (state.classicSpinning) return;
      state.classicSpinning = true;
      clearClassicInterval();
      // Анимация 4-5 сек
      const participants = [...new Set(state.classicBets.map(b=>b.user.name))];
      let tick = 0;
      const spinInterval = setInterval(() => {
        const r1 = avatars[Math.floor(Math.random()*avatars.length)];
        const r2 = avatars[Math.floor(Math.random()*avatars.length)];
        classicLeft.textContent = r1;
        classicRight.textContent = r2;
        tick++;
        if (tick >= 15) { // ~4-5 сек
          clearInterval(spinInterval);
          finalizeClassic();
        }
      }, 280);
    }

    function finalizeClassic() {
      const tickets = [];
      state.classicBets.forEach(b=>{ for(let i=0;i<b.amount;i++) tickets.push(b.user); });
      const winner = tickets.length ? tickets[Math.floor(Math.random()*tickets.length)] : null;
      if (winner) {
        const totalBank = state.classicBets.reduce((s,b)=>s+b.amount,0);
        winner.balance = (winner.balance||0) + totalBank;
        if (winner.name === state.user.name) state.user.balance = winner.balance;
        classicLeft.textContent = winner.avatar; classicRight.textContent = winner.avatar;
        classicResultMsg.textContent = `Победитель: ${winner.name} +${totalBank}$`;
        state.historyLog.classic.push({ winner: winner.name, bank: totalBank, time: Date.now() });
        state.historyLog.myClassic.push({ winner: winner.name, bank: totalBank });
      }
      setTimeout(() => {
        state.classicBets = [];
        state.classicSpinning = false;
        classicResultMsg.textContent = '';
        classicLeft.textContent = '❓'; classicRight.textContent = '❓';
        classicTimerLabel.textContent = '⏳ 30';
        updateUI();
      }, 3000);
    }

    function clearClassicInterval() {
      if (state.classicInterval) { clearInterval(state.classicInterval); state.classicInterval = null; }
    }

    // Комнаты 1 на 1
    function createRoom() {
      const bet = parseInt(prompt('Ставка (монеты):','10'),10);
      if (!bet || bet<=0 || state.user.balance < bet) return alert('Недостаточно средств');
      state.user.balance -= bet;
      const room = {
        id: state.nextRoomId++,
        creator: {...state.user},
        bet,
        opponent: null,
        status: 'waiting',
        timer: 10,
        intervalId: null,
        winner: null
      };
      state.rooms.push(room);
      updateUI();
    }

    function joinRoom(roomId) {
      const room = state.rooms.find(r=>r.id===roomId);
      if (!room || room.status!=='waiting') return;
      if (state.user.balance < room.bet) return alert('Недостаточно монет');
      state.user.balance -= room.bet;
      room.opponent = {...state.user};
      room.status = 'countdown';
      room.timer = 10;
      startRoomCountdown(room);
      updateUI();
    }

    function startRoomCountdown(room) {
      clearRoomInterval(room);
      room.intervalId = setInterval(() => {
        room.timer--;
        updateUI();
        if (room.timer <= 0) {
          clearRoomInterval(room);
          finishRoomGame(room);
        }
      }, 1000);
    }

    function finishRoomGame(room) {
      const tickets = [];
      for(let i=0;i<room.bet;i++) tickets.push(room.creator);
      for(let i=0;i<room.bet;i++) tickets.push(room.opponent);
      const winner = tickets[Math.floor(Math.random()*tickets.length)];
      room.winner = winner;
      room.status = 'finished';
      const prize = room.bet*2;
      if (winner.name === state.user.name) state.user.balance += prize;
      state.historyLog.oneVsOne.push({ vs: `${room.creator.name} vs ${room.opponent.name}`, winner: winner.name });
      updateUI();
      setTimeout(() => {
        state.rooms = state.rooms.filter(r=>r.id!==room.id);
        updateUI();
      }, 5000);
    }

    function clearRoomInterval(room) {
      if (room.intervalId) { clearInterval(room.intervalId); room.intervalId = null; }
    }

    function renderRooms() {
      roomsContainer.innerHTML = '';
      if (!state.rooms.length) {
        roomsContainer.innerHTML = '<div style="color:#7f8690;">Нет активных комнат</div>';
        return;
      }
      state.rooms.forEach(room => {
        const div = document.createElement('div');
        div.className = 'room-row';
        const statusText = room.status==='waiting'?'Ожидание':(room.status==='countdown'?`Идет... ${room.timer}s`:'Завершено');
        div.innerHTML = `
          <div><strong>${room.creator.name}</strong> ставка ${room.bet}$</div>
          <div style="display:flex; gap:0.5rem; align-items:center;">
            <span>${statusText}</span>
            <button class="btn join-btn" data-id="${room.id}" ${room.status!=='waiting'?'disabled':''}>Играть</button>
            <button class="btn spectate-btn" data-id="${room.id}" style="background:#4a5068;">👁</button>
          </div>
        `;
        roomsContainer.appendChild(div);
      });
      document.querySelectorAll('.join-btn').forEach(b=>b.addEventListener('click',e=>joinRoom(parseInt(e.target.dataset.id))));
      document.querySelectorAll('.spectate-btn').forEach(b=>b.addEventListener('click',e=>{
        const id = parseInt(e.target.dataset.id);
        enterSpectatorMode(id);
      }));
    }

    function enterSpectatorMode(roomId) {
      state.currentView = 'spectator';
      document.querySelector('.nav-item.active')?.classList.remove('active');
      // Скрываем список комнат, показываем только выбранную
      renderSpectatorRoom(roomId);
    }

    function renderSpectatorRoom(roomId) {
      const room = state.rooms.find(r=>r.id===roomId);
      if (!room) return;
      centerPanel.innerHTML = `
        <div class="classic-card">
          <h3>👁 Наблюдение за комнатой #${room.id}</h3>
          <p>${room.creator.name} vs ${room.opponent?.name||'???'} | Ставка ${room.bet}$</p>
          <button id="exitSpectateBtn" class="btn">Выйти из просмотра</button>
        </div>
      `;
      document.getElementById('exitSpectateBtn').addEventListener('click', ()=>{
        state.currentView = 'main';
        location.reload();
      });
    }

    // История
    historyToggle.addEventListener('click', ()=>{
      historySub.style.display = historySub.style.display==='none' ? 'flex' : 'none';
    });
    document.querySelectorAll('.sub-item').forEach(el=>{
      el.addEventListener('click', (e)=>{
        const type = e.target.dataset.history;
        alert(`История (${type}): ${JSON.stringify(state.historyLog[type]?.slice(-3) || [])}`);
      });
    });

    // Обработчики
    placeClassicBetBtn.addEventListener('click', addClassicBet);
    resetClassicBtn.addEventListener('click', ()=>{
      if (state.classicSpinning) return;
      clearClassicInterval();
      state.classicBets = [];
      classicTimerLabel.textContent = '⏳ 30';
      updateUI();
    });
    createRoomBtn.addEventListener('click', createRoom);

    // Инициализация
    updateUI();
  })();
</script>
</body>
</html>
